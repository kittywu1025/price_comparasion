<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>我的贡献</title>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #ffffff;
      --line: #dbe7e3;
      --text: #1f2a2b;
      --muted: #607270;
      --primary: #0d9a7d;
      --primary-soft: #e2f7f1;
      --shadow: 0 14px 28px rgba(14, 63, 56, 0.1);
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        calc(88px + env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
      background:
        radial-gradient(circle at 10% 0%, #d7f6ed 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #d8eef8 0, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "SF Pro Text", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(760px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .hero {
      border-radius: var(--radius-lg);
      background: linear-gradient(140deg, #1aaf90, #0a7f69);
      color: #fff;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .profile-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .profile-title {
      min-width: 0;
    }

    .hero h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.25;
      word-break: break-word;
    }

    .hero p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    .hero-action {
      height: 34px;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      padding: 0 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .hero-edit {
      display: none;
      margin-top: 12px;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .hero-edit.show {
      display: grid;
    }

    .hero-edit input {
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(255, 255, 255, 0.7);
    }

    .hero-edit button {
      background: #fff;
      color: #0b7f68;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .is-hidden {
      display: none !important;
    }

    .stat-card,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
      padding: 12px;
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.05);
    }

    .stat-label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .stat-value {
      margin: 5px 0 0;
      color: #0a826b;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .panel-body {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
    }

    .disabled-box {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 82px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      resize: vertical;
      color: var(--muted);
      background: #f8fbfa;
      font: inherit;
    }

    button {
      height: 40px;
      border: 0;
      border-radius: 12px;
      background: #edf6f3;
      color: #78908c;
      font-weight: 700;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-row {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 10px;
      background: #f8fbfa;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .link-button {
      margin-top: 10px;
      height: 42px;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 13px;
    }

    .dev-row {
      margin-top: 10px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px;
      border-radius: 12px;
      background: #f4faf8;
      border: 1px solid var(--line);
    }

    .dev-row.show {
      display: flex;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #d9e7e2;
      cursor: pointer;
      transition: background 0.16s ease;
    }

    .switch span::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(13, 60, 51, 0.18);
      transition: transform 0.16s ease;
    }

    .switch input:checked + span {
      background: var(--primary);
    }

    .switch input:checked + span::before {
      transform: translateX(22px);
    }

    .feedback-list {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .feedback-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbfa;
      padding: 10px;
    }

    .feedback-meta {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .feedback-message {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .inline-msg {
      min-height: 18px;
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    nav {
      --active-index: 4;
      position: fixed;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8e7e1;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(13, 60, 51, 0.1);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    nav::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 20%;
      border-radius: 999px;
      background: #e9f7f3;
      transform: translateX(calc(var(--active-index) * 100%));
      transition: transform 0.22s ease;
      z-index: 0;
    }

    nav[data-active="home"] { --active-index: 0; }
    nav[data-active="list"] { --active-index: 1; }
    nav[data-active="add"] { --active-index: 2; }
    nav[data-active="stores"] { --active-index: 3; }
    nav[data-active="profile"] { --active-index: 4; }

    nav a {
      position: relative;
      z-index: 1;
      text-align: center;
      text-decoration: none;
      color: #4f6562;
      font-size: 12px;
      line-height: 44px;
      height: 44px;
      font-weight: 600;
      transition: color 0.18s ease;
    }

    nav a.active {
      background: transparent;
      color: #0c8f72;
    }

    @media (max-width: 420px) {
      .hero {
        padding: 14px 12px;
      }

      .hero h1 {
        font-size: 19px;
      }

      .profile-head {
        gap: 8px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .hero-edit {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-require-auth="true">
  <div class="app">
    <section class="hero">
      <div class="profile-head">
        <div class="profile-title">
          <h1 id="profileName">我的贡献</h1>
          <p id="userLine">正在读取贡献数据...</p>
        </div>
        <button id="editProfileNameBtn" class="hero-action" type="button">修改用户名</button>
      </div>
      <div id="profileNameEditor" class="hero-edit">
        <input id="displayNameInput" maxlength="40" placeholder="例如：Kitty" />
        <button id="saveProfileBtn" type="button">保存</button>
      </div>
      <p id="profileMsg" class="inline-msg"></p>
    </section>

    <section class="stats-grid is-hidden">
      <div class="stat-card">
        <p class="stat-label">我添加的价格记录</p>
        <p id="myRecords" class="stat-value">-</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">我创建的商品</p>
        <p id="myProducts" class="stat-value">-</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">我创建的店铺</p>
        <p id="myStores" class="stat-value">-</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">我的修改次数</p>
        <p id="myEdits" class="stat-value">-</p>
      </div>
    </section>

    <section class="panel">
      <p class="panel-title">全站数据</p>
      <p id="totalLine" class="panel-body">正在读取...</p>
    </section>

    <div id="priceImportMount"></div>

    <section class="panel">
      <p class="panel-title">GitHub</p>
      <p class="panel-body">项目源码和发布记录在 GitHub 仓库中维护。</p>
      <a class="link-button" href="https://github.com/kittywu1025/price_comparasion.git" target="_blank" rel="noopener">访问 GitHub 仓库</a>
      <div id="devModeRow" class="dev-row">
        <div>
          <p class="panel-title">开发者模式</p>
          <p class="panel-body">打开后显示管理员工具、用户反馈和后续回退入口。</p>
        </div>
        <label class="switch" aria-label="开发者模式">
          <input id="devModeToggle" type="checkbox" />
          <span></span>
        </label>
      </div>
    </section>

    <section id="feedbackPanel" class="panel"></section>

    <nav data-active="profile">
      <a href="home.html">首页</a>
      <a href="products">清单</a>
      <a href="add.html">录入</a>
      <a href="stores.html">店铺</a>
      <a class="active" href="profile.html">我的</a>
    </nav>
  </div>

  <script src="toast.js"></script>
  <script src="import-records.js?v=20260430-blank-pack"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const devModeKey = "priceComparisonDevMode";
    let currentStats = null;

    function setText(id, value) {
      $(id).textContent = value == null ? "-" : String(value);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadStats() {
      try {
        const res = await fetch("/api/me/stats");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "读取失败");
        currentStats = data;

        const displayName = data.user?.displayName || "";
        renderUserLine(data.user);
        $("displayNameInput").value = displayName;
        setText("myRecords", data.mine?.priceRecords ?? 0);
        setText("myProducts", data.mine?.products ?? 0);
        setText("myStores", data.mine?.stores ?? 0);
        setText("myEdits", data.mine?.edits ?? 0);
        $("totalLine").textContent =
          `当前共有 ${data.totals?.priceRecords ?? 0} 条价格记录、${data.totals?.products ?? 0} 个商品、${data.totals?.stores ?? 0} 个店铺。` +
          (data.lastContributionDate ? ` 你最近一次贡献日期：${data.lastContributionDate}。` : "");
        setupDeveloperMode(data.user?.isAdmin);
        renderFeedbackPanel();
      } catch (err) {
        showToast(`贡献数据读取失败：${err.message || "请稍后重试"}`, { type: "error" });
        $("userLine").textContent = "贡献数据暂时无法读取。";
        $("totalLine").textContent = "如果你是本地打开，请确认使用 http://127.0.0.1:3000/profile.html，并且 npm start 正在运行。";
      }
    }

    loadStats();
    setupPriceImport("priceImportMount");

    $("editProfileNameBtn").onclick = () => {
      $("profileNameEditor").classList.toggle("show");
      if ($("profileNameEditor").classList.contains("show")) $("displayNameInput").focus();
    };

    $("saveProfileBtn").onclick = async () => {
      const button = $("saveProfileBtn");
      const msg = $("profileMsg");
      button.disabled = true;
      msg.textContent = "正在保存...";
      try {
        const res = await fetch("/api/me/profile", {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ displayName: $("displayNameInput").value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "保存失败");
        msg.textContent = "已保存。";
        if (currentStats?.user) {
          currentStats.user.displayName = data.displayName || "";
          renderUserLine(currentStats.user);
        }
        $("profileNameEditor").classList.remove("show");
      } catch (err) {
        msg.textContent = "";
        showToast(err.message || "保存失败", { type: "error" });
      } finally {
        button.disabled = false;
      }
    };

    function setupDeveloperMode(isAdmin) {
      const row = $("devModeRow");
      const toggle = $("devModeToggle");
      row.classList.toggle("show", Boolean(isAdmin));
      toggle.checked = localStorage.getItem(devModeKey) === "1";
      toggle.onchange = () => {
        localStorage.setItem(devModeKey, toggle.checked ? "1" : "0");
        renderFeedbackPanel();
      };
    }

    function renderFeedbackPanel() {
      const panel = $("feedbackPanel");
      const isAdmin = Boolean(currentStats?.user?.isAdmin);
      const devMode = $("devModeToggle")?.checked;
      if (isAdmin && devMode) {
        panel.innerHTML = `
          <div id="developerDataTools"></div>
          <p class="panel-title">用户反馈</p>
          <p class="panel-body">这里显示别人提交给开发者的建议。回退管理入口后续也放在开发者模式里。</p>
          <div id="feedbackList" class="feedback-list"><p class="panel-body">正在读取...</p></div>
        `;
        setupDeveloperDataTools("developerDataTools");
        loadAdminFeedback();
        return;
      }
      panel.innerHTML = `
        <p class="panel-title">联系开发者 / 提交建议</p>
        <p class="panel-body">建议会保存到 Cloudflare D1，只有开发者打开开发者模式后可以查看。</p>
        <div class="disabled-box">
          <textarea id="feedbackText" maxlength="1000" placeholder="可以在这里写建议、问题、想要的功能。"></textarea>
          <button id="submitFeedbackBtn" class="primary" type="button">提交建议</button>
          <p id="feedbackMsg" class="inline-msg"></p>
        </div>
      `;
      $("submitFeedbackBtn").onclick = submitFeedback;
    }

    async function submitFeedback() {
      const text = $("feedbackText").value.trim();
      const msg = $("feedbackMsg");
      if (!text) {
        showToast("请先写一点内容。", { type: "error" });
        return;
      }
      $("submitFeedbackBtn").disabled = true;
      msg.textContent = "正在提交...";
      try {
        const res = await fetch("/api/feedback", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "提交失败");
        $("feedbackText").value = "";
        msg.textContent = "已提交。";
      } catch (err) {
        msg.textContent = "";
        showToast(err.message || "提交失败", { type: "error" });
      } finally {
        $("submitFeedbackBtn").disabled = false;
      }
    }

    async function loadAdminFeedback() {
      const mount = $("feedbackList");
      try {
        const res = await fetch("/api/feedback");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "读取失败");
        if (!data.length) {
          mount.innerHTML = `<p class="panel-body">暂时还没有用户反馈。</p>`;
          return;
        }
        mount.innerHTML = data.map((item) => `
          <article class="feedback-item">
            <p class="feedback-meta">${escapeHtml(actorLabel(item.createdByName, item.createdBy, "未知用户"))} · ${escapeHtml(item.createdAt || "-")}</p>
            <p class="feedback-message">${escapeHtml(item.message || "")}</p>
          </article>
        `).join("");
      } catch (err) {
        mount.innerHTML = "";
        showToast(`反馈读取失败：${err.message || "请稍后重试"}`, { type: "error" });
      }
    }

    setupSwipeNav();

    window.addEventListener("profile-updated", (event) => {
      if (!currentStats?.user) return;
      currentStats.user.displayName = event.detail?.displayName || "";
      $("displayNameInput").value = currentStats.user.displayName;
      renderUserLine(currentStats.user);
    });

    function renderUserLine(user = {}) {
      const name = user.displayName || "未设置";
      const email = user.email || "未登录";
      $("profileName").textContent = name;
      $("userLine").innerHTML =
        `${user.isAdmin ? "管理员 · " : ""}${escapeHtml(email)}`;
    }

    function actorLabel(name, email, fallback = "-") {
      const cleanName = String(name || "").trim();
      const cleanEmail = String(email || "").trim();
      if (cleanName && cleanEmail && cleanName !== cleanEmail) return `${cleanName} / ${cleanEmail}`;
      return cleanName || cleanEmail || fallback;
    }

    function setupSwipeNav() {
      const nav = document.querySelector("nav[data-active]");
      if (!nav) return;
      let startX = 0;
      let startY = 0;
      nav.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        startX = touch.clientX;
        startY = touch.clientY;
      }, { passive: true });
      nav.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        if (Math.abs(dx) < 38 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
        const links = Array.from(nav.querySelectorAll("a"));
        const current = links.findIndex((link) => link.classList.contains("active"));
        const next = dx < 0 ? current + 1 : current - 1;
        if (next >= 0 && next < links.length) {
          location.href = links[next].getAttribute("href");
        }
      }, { passive: true });
    }
  </script>
  <script src="auth-nav.js"></script>
</body>
</html>
