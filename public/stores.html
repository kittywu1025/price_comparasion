<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>店铺管理</title>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #fff;
      --line: #dbe7e3;
      --text: #1f2a2b;
      --muted: #607270;
      --primary: #0d9a7d;
      --danger: #c93f3f;
      --shadow: 0 14px 28px rgba(14, 63, 56, 0.1);
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 14px 14px 76px;
      background:
        radial-gradient(circle at 10% 0%, #d7f6ed 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #d8eef8 0, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .hero {
      background: linear-gradient(140deg, #1aaf90, #0a7f69);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .hero-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .hero h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .add-btn {
      height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 12px;
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.05);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.2;
    }

    nav {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(520px, calc(100% - 28px));
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8e7e1;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(13, 60, 51, 0.1);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    nav a {
      text-align: center;
      text-decoration: none;
      color: #4f6562;
      font-size: 12px;
      line-height: 44px;
      height: 44px;
      font-weight: 600;
    }

    nav a.active {
      background: #e9f7f3;
      color: #0c8f72;
    }

    .form {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    input, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--line);
      height: 40px;
      padding: 0 12px;
    }

    input:focus {
      outline: none;
      border-color: #76c5b1;
      box-shadow: 0 0 0 3px rgba(13, 154, 125, 0.14);
    }

    button {
      cursor: pointer;
      background: #fff;
    }

    .btn-primary {
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    .btn-ghost {
      background: #edf6f3;
      color: #1a5950;
      border: 0;
      font-size: 13px;
      white-space: nowrap;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      min-height: 16px;
    }

    .status {
      color: #375a56;
      font-size: 13px;
      min-height: 18px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 6px;
      cursor: pointer;
    }

    .name {
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .actions button {
      width: auto;
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .btn-edit {
      border: 0;
      background: #e8f4ff;
      color: #1f5c98;
    }

    .btn-delete {
      border: 0;
      background: #feecec;
      color: var(--danger);
    }

    .btn-disabled {
      border: 0;
      background: #f2f5f4;
      color: #94a3a0;
      cursor: default;
    }

    .btn-undo {
      border: 0;
      background: #fff5e7;
      color: #9c6500;
      font-size: 13px;
      white-space: nowrap;
    }

    .editor-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.46);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 40;
    }

    .editor-mask.show {
      display: flex;
    }

    .editor-panel {
      width: min(680px, 100%);
      position: relative;
    }

    .editor-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: rgba(31, 42, 43, 0.68);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-bar">
        <h1>店铺管理</h1>
        <button id="addStoreBtn" class="add-btn" type="button">新增店铺</button>
      </div>
    </header>

    <div class="panel">
      <div id="listStatus" class="status">正在加载店铺...</div>
      <div id="list" class="list"></div>
    </div>

    <nav>
      <a href="/home.html">首页</a>
      <a href="/index.html">清单</a>
      <a href="/add.html">录入</a>
      <a class="active" href="/stores.html">店铺</a>
      <a href="/profile.html">我的</a>
    </nav>
  </div>

  <div id="editorMask" class="editor-mask">
    <div class="panel editor-panel">
      <button id="editorClose" class="editor-close" type="button" aria-label="关闭">×</button>
      <h1 id="formTitle">新增店铺</h1>
      <form id="form" class="form">
        <input id="name" placeholder="店铺名称" required />
        <input id="chainBrand" placeholder="连锁品牌（可选）" />
        <div class="row">
          <input id="location" placeholder="位置（默认尝试GPS）" />
          <button id="detectLocation" class="btn-ghost" type="button">使用当前位置</button>
        </div>
        <div id="geoStatus" class="hint"></div>
        <input id="note" placeholder="备注（可选）" />
        <div class="row">
          <button id="submitBtn" class="btn-primary" type="submit">新增店铺</button>
          <button id="cancelEditBtn" class="btn-ghost" type="button" style="display:none;">取消编辑</button>
        </div>
        <div id="editActionsRow" class="row" style="display:none;">
          <button id="undoEditBtn" class="btn-undo" type="button">撤回我的修改</button>
          <span class="hint">仅支持撤回你自己做的最后一次修改</span>
        </div>
      </form>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let editingId = null;
    let locationManuallyEdited = false;

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function fetchJson(url, options) {
      let res;
      try {
        res = await fetch(url, options);
      } catch (err) {
        if (location.protocol === "file:") {
          throw new Error("当前是 file:// 打开，无法读取 API。请用 http://127.0.0.1:3000/stores.html 打开。");
        }
        throw new Error("无法连接本地 API。请确认终端里 npm start 正在运行，并使用 http://127.0.0.1:3000/stores.html 打开。");
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    function setGeoStatus(text) {
      $("geoStatus").textContent = text;
    }

    function setStatus(text) {
      $("status").textContent = text;
    }

    function setListStatus(text) {
      $("listStatus").textContent = text;
    }

    function openEditor() {
      $("editorMask").classList.add("show");
    }

    function closeEditor() {
      $("editorMask").classList.remove("show");
    }

    function getCurrentPosition(options = {}) {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("当前浏览器不支持定位"));
          return;
        }
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 8000,
          maximumAge: 5 * 60 * 1000,
          ...options
        });
      });
    }

    function formatLocation(position) {
      const { latitude, longitude, accuracy } = position.coords;
      const lat = latitude.toFixed(6);
      const lng = longitude.toFixed(6);
      const acc = Math.round(accuracy || 0);
      return `GPS ${lat}, ${lng}${acc ? ` (±${acc}m)` : ""}`;
    }

    async function fillLocation(force = false) {
      setGeoStatus("正在定位...");
      try {
        const pos = await getCurrentPosition();
        if (force || (!locationManuallyEdited && !$("location").value.trim())) {
          $("location").value = formatLocation(pos);
        }
        setGeoStatus("已获取当前位置，可手动修改。");
      } catch (err) {
        if (err && err.code === 1) {
          setGeoStatus("你拒绝了定位权限，可手动填写位置。");
        } else if (err && err.code === 2) {
          setGeoStatus("无法获取定位信息，可手动填写位置。");
        } else if (err && err.code === 3) {
          setGeoStatus("定位超时，可重试或手动填写位置。");
        } else {
          setGeoStatus((err && err.message) ? `${err.message}，可手动填写位置。` : "定位失败，可手动填写位置。");
        }
      }
    }

    function resetForm() {
      editingId = null;
      $("form").reset();
      $("formTitle").textContent = "新增店铺";
      $("submitBtn").textContent = "新增店铺";
      $("cancelEditBtn").style.display = "none";
      $("editActionsRow").style.display = "none";
      locationManuallyEdited = false;
      setStatus("");
      setGeoStatus("");
      fillLocation(false);
      closeEditor();
    }

    function enterEdit(store) {
      editingId = store.id;
      $("formTitle").textContent = `编辑店铺 #${store.id}`;
      $("submitBtn").textContent = "保存修改";
      $("cancelEditBtn").style.display = "inline-block";
      $("editActionsRow").style.display = "grid";
      $("name").value = store.name || "";
      $("chainBrand").value = store.chainBrand || "";
      $("location").value = store.location || "";
      $("note").value = store.note || "";
      locationManuallyEdited = true;
      setGeoStatus("编辑模式：可手动修改位置，或点击“使用当前位置”覆盖。");
      setStatus("");
      openEditor();
    }

    async function removeStore(id) {
      const ok = confirm("确认删除这个店铺吗？");
      if (!ok) return;
      try {
        await fetchJson(`/api/stores/${id}`, { method: "DELETE" });
        setStatus("删除成功。");
        await load();
      } catch (err) {
        if (String(err.message).includes("related price records")) {
          setStatus("删除失败：该店铺已有关联价格记录，请先处理记录。");
        } else {
          setStatus(`删除失败：${err.message}`);
        }
      }
    }

    async function load() {
      const list = $("list");
      setListStatus("正在加载店铺...");
      list.innerHTML = "";
      try {
        const stores = await fetchJson("/api/stores");
        if (!stores.length) {
          setListStatus("暂无店铺");
          return;
        }

        setListStatus(`${stores.length} 个店铺`);
        list.innerHTML = stores.map((s) => `
          <article class="card" data-id="${s.id}" data-name="${escapeHtml(s.name)}">
            <div class="name">${escapeHtml(s.name)}</div>
            <div class="meta">品牌：${escapeHtml(s.chainBrand || "-")}</div>
            <div class="meta">位置：${escapeHtml(s.location || "-")}</div>
            <div class="meta">备注：${escapeHtml(s.note || "-")}</div>
            <div class="actions">
              <button class="btn-edit" data-action="edit" data-id="${s.id}">编辑</button>
              ${s.canDelete
                ? `<button class="btn-delete" data-action="delete" data-id="${s.id}">删除</button>`
                : `<button class="btn-disabled" type="button" disabled>不可删</button>`}
            </div>
          </article>
        `).join("");
      } catch (err) {
        setListStatus(`店铺加载失败：${err.message || "请刷新页面重试"}`);
      }
    }

    $("location").addEventListener("input", () => {
      locationManuallyEdited = true;
    });
    $("detectLocation").onclick = () => fillLocation(true);
    $("cancelEditBtn").onclick = resetForm;
    $("addStoreBtn").onclick = () => {
      editingId = null;
      $("form").reset();
      $("formTitle").textContent = "新增店铺";
      $("submitBtn").textContent = "新增店铺";
      $("cancelEditBtn").style.display = "none";
      $("editActionsRow").style.display = "none";
      setStatus("");
      fillLocation(false);
      openEditor();
    };
    $("editorClose").onclick = resetForm;
    $("editorMask").addEventListener("click", (e) => {
      if (e.target === $("editorMask")) resetForm();
    });
    $("undoEditBtn").onclick = async () => {
      if (!editingId) return;
      try {
        await fetchJson(`/api/stores/${editingId}/undo`, { method: "POST" });
        setStatus("已撤回你最后一次修改。");
        resetForm();
        await load();
      } catch (err) {
        setStatus(`撤回失败：${err.message}`);
      }
    };

    $("list").addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) {
        const card = e.target.closest(".card[data-id]");
        if (card) {
          location.href = `/index.html?storeId=${card.dataset.id}&storeName=${encodeURIComponent(card.dataset.name)}`;
        }
        return;
      }

      const id = Number(btn.dataset.id);
      if (!id) return;
      const action = btn.dataset.action;

      if (action === "edit") {
        e.stopPropagation();
        const stores = await fetchJson("/api/stores");
        const store = stores.find((x) => x.id === id);
        if (!store) {
          setStatus("未找到该店铺。");
          return;
        }
        enterEdit(store);
        return;
      }

      if (action === "delete") {
        e.stopPropagation();
        await removeStore(id);
        return;
      }
    });

    $("form").onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        name: $("name").value.trim(),
        chainBrand: $("chainBrand").value.trim(),
        location: $("location").value.trim(),
        note: $("note").value.trim()
      };
      if (!payload.name) {
        setStatus("店铺名称不能为空。");
        return;
      }

      try {
        if (editingId) {
          await fetchJson(`/api/stores/${editingId}`, {
            method: "PUT",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload)
          });
          setStatus("修改成功。");
        } else {
          await fetchJson("/api/stores", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload)
          });
          setStatus("新增成功。");
        }
        await load();
        resetForm();
      } catch (err) {
        setStatus(`保存失败：${err.message}`);
      }
    };

    load();
  </script>
</body>
</html>
