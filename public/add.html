<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>添加价格记录</title>
  <style>body{font-family:sans-serif;max-width:720px;margin:0 auto;padding:12px} input,select,button{width:100%;padding:8px;margin:6px 0} nav a{margin-right:10px}.muted{color:#666}</style>
</head>
<body>
  <nav><a href="/index.html">首页</a><a href="/add.html">添加</a><a href="/stores.html">店铺</a></nav>
  <h2>添加价格记录</h2>
  <p class="muted">数据库空也可以用：先在店铺页新增店铺、这里可新增分类。</p>
  <form id="form">
    <input id="nameZh" placeholder="商品中文名（必填其一）" />
    <input id="nameJa" placeholder="商品日文名（可选）" />
    <input id="brand" placeholder="品牌（可选）" />
    <input id="barcode" placeholder="条形码（可选）" />

    <select id="categoryId"></select>
    <button type="button" id="addCategoryBtn">+ 新增分类</button>

    <select id="storeId"></select>
    <input id="priceTaxIn" type="number" step="0.01" placeholder="税后价格（必填）" required />
    <input id="specValue" type="number" step="0.001" placeholder="规格数值（必填）" required />
    <select id="unit">
      <option>g</option><option>kg</option><option>ml</option><option>l</option>
      <option>个</option><option>袋</option><option>包</option><option>盒</option><option>枚</option><option>本</option><option>瓶</option><option>罐</option><option>卷</option>
    </select>
    <input id="recordDate" type="date" required />
    <input id="imageUrl" placeholder="图片URL（可选）" />
    <input id="note" placeholder="备注（可选）" />
    <div id="unitPreview" class="muted"></div>
    <button type="submit">保存</button>
  </form>
  <pre id="msg"></pre>

  <script>
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('recordDate').value = today;

    async function fetchJson(url, options){
      const res = await fetch(url, options);
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    async function loadCategories(){
      const categories = await fetchJson('/api/categories');
      const el = document.getElementById('categoryId');
      if(!categories.length){
        el.innerHTML = '<option value="">请先新增分类</option>';
      } else {
        el.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      }
    }

    async function loadStores(){
      const stores = await fetchJson('/api/stores');
      const el = document.getElementById('storeId');
      if(!stores.length){
        el.innerHTML = '<option value="">请先到店铺页新增店铺</option>';
      } else {
        el.innerHTML = stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      }
    }

    function preview(){
      const p = Number(document.getElementById('priceTaxIn').value);
      const v = Number(document.getElementById('specValue').value);
      const u = document.getElementById('unit').value;
      if(!(p>0 && v>0)) return;

      const weight = ['g','kg'], volume = ['ml','l'];
      let unitPrice = '-'; let label='';
      if(weight.includes(u)){ const grams = u==='kg'?v*1000:v; unitPrice=(p/(grams/100)).toFixed(4); label='/100g'; }
      else if(volume.includes(u)){ const ml=u==='l'?v*1000:v; unitPrice=(p/(ml/100)).toFixed(4); label='/100ml'; }
      else { unitPrice=(p/v).toFixed(4); label='/' + u; }
      document.getElementById('unitPreview').textContent = `预估单位价格：¥${unitPrice} ${label}`;
    }

    document.getElementById('addCategoryBtn').onclick = async ()=>{
      const name = prompt('输入分类名');
      if(!name) return;
      await fetchJson('/api/categories', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ name }) });
      await loadCategories();
    };

    ['priceTaxIn','specValue','unit'].forEach(id=>document.getElementById(id).addEventListener('input', preview));

    document.getElementById('form').onsubmit = async (e)=>{
      e.preventDefault();
      const payload = {
        product: {
          nameZh: document.getElementById('nameZh').value,
          nameJa: document.getElementById('nameJa').value,
          brand: document.getElementById('brand').value,
          barcode: document.getElementById('barcode').value,
          categoryId: document.getElementById('categoryId').value || null
        },
        storeId: Number(document.getElementById('storeId').value),
        priceTaxIn: Number(document.getElementById('priceTaxIn').value),
        specValue: Number(document.getElementById('specValue').value),
        unit: document.getElementById('unit').value,
        recordDate: document.getElementById('recordDate').value,
        imageUrl: document.getElementById('imageUrl').value || null,
        note: document.getElementById('note').value || null
      };
      try {
        const data = await fetchJson('/api/price-records', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(payload)});
        document.getElementById('msg').textContent = '保存成功：' + JSON.stringify(data, null, 2);
      } catch(err){
        document.getElementById('msg').textContent = '保存失败：' + err.message;
      }
    };

    loadCategories();
    loadStores();
  </script>
</body>
</html>
