<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品录入</title>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #ffffff;
      --surface-soft: #f7fbfa;
      --line: #dbe7e3;
      --text: #1f2a2b;
      --muted: #607270;
      --primary: #0d9a7d;
      --primary-strong: #0b7f68;
      --danger: #ca3f3f;
      --ok: #0a826b;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow: 0 14px 28px rgba(14, 63, 56, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 0%, #d7f6ed 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #d8eef8 0, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "SF Pro Text", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      padding: 14px 14px 76px;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 8px;
    }

    .hero {
      background: linear-gradient(140deg, #1aaf90, #0a7f69);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .hero-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .scan-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .quick-btn {
      height: 42px;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.05);
      padding: 14px;
    }

    .toolbar-note {
      margin: -2px 4px 0;
      font-size: 12px;
      color: #607270;
      text-align: left;
    }

    .upload {
      border: 1px dashed #b9cdc7;
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      min-height: 128px;
      display: grid;
      place-items: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      text-align: center;
      color: #708280;
      font-size: 14px;
    }

    .upload.has-image {
      border-style: solid;
    }

    .upload img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      background: #fff;
    }

    .replace-tip {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      color: #fff;
      background: rgba(21, 32, 32, 0.58);
      display: none;
      white-space: nowrap;
    }

    .upload.has-image .replace-tip {
      display: block;
    }

    .top-compact {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .upload.compact {
      min-height: 108px;
      height: 100%;
      font-size: 12px;
      border-radius: 12px;
    }

    .name-stack {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .fields {
      margin-top: 10px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .group {
      border: 1px solid #dcebe6;
      border-radius: 14px;
      background: #f8fcfb;
      padding: 9px;
      display: grid;
      gap: 8px;
    }

    .inline-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .group-title {
      margin: 0;
      font-size: 12px;
      color: #5f7370;
      font-weight: 700;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 12px;
      color: #183132;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #76c5b1;
      box-shadow: 0 0 0 3px rgba(13, 154, 125, 0.14);
    }

    .input-with-action {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .input-with-action button {
      height: 40px;
      border: 0;
      border-radius: var(--radius-sm);
      background: #edf6f3;
      color: #1a5950;
      font-size: 13px;
      font-weight: 700;
      padding: 0 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #priceAfterTaxInput {
      background: #eef4f2;
      color: #607270;
      border-color: #d4e1dd;
      font-weight: 700;
    }

    .segment {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 5px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f5f9f8;
    }

    .segment button {
      height: 32px;
      border-radius: 9px;
      border: 0;
      background: transparent;
      color: #4d6160;
      cursor: pointer;
      min-width: 0;
      font-size: 13px;
    }

    .segment button.active {
      background: #fff;
      color: var(--primary-strong);
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(17, 69, 60, 0.08);
    }

    .segment.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .result {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .metric {
      border: 1px solid #dcebe6;
      border-radius: 12px;
      background: #f8fcfb;
      padding: 10px;
    }

    .metric p {
      margin: 0;
    }

    .metric .k {
      color: #627674;
      font-size: 12px;
    }

    .metric .v {
      margin-top: 4px;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
      word-break: break-word;
    }

    .metric .v.red {
      color: var(--danger);
    }

    .metric .v.green {
      color: var(--ok);
    }

    .action-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .btn {
      height: 44px;
      border: 0;
      border-radius: 12px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
      min-width: 0;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-subtle {
      background: #edf6f3;
      color: #1a5950;
      font-size: 13px;
      white-space: nowrap;
    }

    .msg {
      margin: 10px 0 0;
      font-size: 13px;
      color: #435857;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .duplicate-panel {
      display: none;
      border: 1px solid #dcebe6;
      border-radius: 14px;
      background: #f8fcfb;
      padding: 9px;
      gap: 8px;
    }

    .duplicate-panel.show {
      display: grid;
    }

    .duplicate-title {
      margin: 0;
      font-size: 12px;
      color: #5f7370;
      font-weight: 700;
    }

    .duplicate-item {
      border: 1px solid #e1ece8;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .duplicate-name {
      font-size: 13px;
      font-weight: 700;
      color: #183132;
      word-break: break-word;
    }

    .duplicate-meta {
      font-size: 12px;
      color: #607270;
    }

    .duplicate-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .duplicate-actions button,
    .duplicate-actions a {
      height: 34px;
      border-radius: 9px;
      border: 0;
      display: grid;
      place-items: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .duplicate-use {
      background: #0d9a7d;
      color: #fff;
    }

    .duplicate-view {
      background: #edf6f3;
      color: #1a5950;
    }

    nav {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(460px, calc(100% - 28px));
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8e7e1;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(13, 60, 51, 0.1);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    nav a {
      text-align: center;
      text-decoration: none;
      color: #4f6562;
      font-size: 13px;
      line-height: 44px;
      height: 44px;
      font-weight: 600;
    }

    nav a.active {
      background: #e9f7f3;
      color: #0c8f72;
    }

    .sheet-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 30;
      padding: 12px;
    }

    .sheet {
      width: min(520px, 100%);
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      padding: 10px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
    }

    .sheet button {
      height: 44px;
      border-radius: 12px;
      border: 0;
      font-weight: 700;
      cursor: pointer;
      background: #edf6f3;
      color: #1a5950;
    }

    .sheet button:last-child {
      background: #f8f8f8;
      color: #485554;
    }

    .scanner-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.68);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 35;
      padding: 12px;
    }

    .scanner {
      width: min(520px, 100%);
      background: #0f1616;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #243433;
    }

    .scanner-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #e5f2ef;
      padding: 10px 12px;
      font-size: 13px;
    }

    .scanner-head button {
      border: 0;
      border-radius: 8px;
      background: #223332;
      color: #e5f2ef;
      height: 30px;
      padding: 0 10px;
      cursor: pointer;
    }

    .scanner video {
      display: block;
      width: 100%;
      max-height: 58vh;
      object-fit: cover;
      background: #000;
    }

    .scanner-foot {
      color: #bdd3cf;
      font-size: 12px;
      padding: 10px 12px 12px;
    }

    .quick-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 34;
      padding: 12px;
    }

    .quick-panel {
      width: min(520px, 100%);
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .quick-panel h2 {
      margin: 0;
      font-size: 16px;
    }

    .quick-panel textarea {
      width: 100%;
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      resize: vertical;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .calc-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 36;
      padding: 12px;
    }

    .calc-panel {
      width: min(420px, 100%);
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .calc-panel h2 {
      margin: 0;
      font-size: 16px;
    }

    .calc-display {
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 18px;
      text-align: right;
    }

    .calc-result {
      min-height: 18px;
      color: #607270;
      font-size: 13px;
      text-align: right;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .calc-grid button {
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: #f2f7f5;
      color: #1f2a2b;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .calc-grid button[data-calc-op],
    .calc-grid button[data-calc-action] {
      background: #e8f5f1;
      color: #0b7f68;
    }

    .calc-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    @media (min-width: 720px) {
      body {
        padding: 20px;
      }

      .fields {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field.span-2,
      .span-2 {
        grid-column: 1 / -1;
      }

    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>商品录入</h1>
      <div class="hero-actions">
        <button id="quickFillBtn" class="quick-btn" type="button">快速填入</button>
        <button id="scanBtn" class="scan-btn" aria-label="扫码">⌁</button>
      </div>
    </header>
    <div id="barcodeNote" class="toolbar-note">条码：未扫码</div>

    <section class="card">
      <form id="form">
        <input id="imageFile" type="file" accept="image/*" capture="environment" style="display:none" />

        <div class="fields">
          <div class="top-compact span-2">
            <div id="uploadBox" class="upload compact" role="button" tabindex="0" aria-label="上传图片">
              <div id="uploadText">拍照/上传</div>
              <img id="previewImg" alt="商品图预览" />
              <div class="replace-tip">更换图片</div>
            </div>
            <div class="name-stack">
              <div class="field">
                <label for="nameZh">中文名称</label>
                <input id="nameZh" placeholder="例如：片栗粉" required />
              </div>
              <div class="field">
                <label for="nameJa">日文名称</label>
                <input id="nameJa" placeholder="可选" />
              </div>
            </div>
          </div>

          <div id="duplicatePanel" class="duplicate-panel span-2"></div>

          <div class="group span-2">
            <p class="group-title">价格与规格</p>
            <div class="field">
              <label>税率</label>
              <div id="taxSegment" class="segment">
                <button type="button" data-tax="8" class="active">8%</button>
                <button type="button" data-tax="10">10%</button>
                <button type="button" data-tax="0">0%</button>
              </div>
            </div>

            <div class="inline-grid">
              <div class="field">
                <label for="priceBeforeTax">税前价格</label>
                <input id="priceBeforeTax" type="number" step="0.01" placeholder="0" required />
              </div>

              <div class="field">
                <label for="priceAfterTaxInput">税后价格</label>
                <input id="priceAfterTaxInput" type="text" value="¥0.0" readonly />
              </div>
            </div>

            <div class="inline-grid">
              <div class="field">
                <label for="spec">规格数值</label>
                <div class="input-with-action">
                  <input id="spec" type="number" step="0.01" placeholder="400" required />
                  <button id="openSpecCalc" type="button">计算</button>
                </div>
              </div>

              <div class="field">
                <label>规格单位</label>
                <div id="unitSegment" class="segment">
                  <button type="button" data-unit="g" class="active">g</button>
                  <button type="button" data-unit="ml">ml</button>
                  <button type="button" data-unit="个">个</button>
                </div>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="storeSearch">购买店铺</label>
            <input id="storeSearch" list="storeOptions" placeholder="输入店铺名或直接选择" autocomplete="off" />
            <datalist id="storeOptions"></datalist>
            <select id="storeId" style="display:none;"></select>
            <div id="storeHint" class="toolbar-note" style="margin:6px 0 0;">可输入关键词匹配现有店铺</div>
          </div>

          <div class="field">
            <label for="recordDate">记录日期</label>
            <input id="recordDate" type="date" required />
          </div>

          <div class="field span-2">
            <label for="note">备注</label>
            <input id="note" placeholder="可选" />
          </div>

          <div class="field">
            <label>限时优惠</label>
            <div id="promoSegment" class="segment two">
              <button type="button" data-promo="0" class="active">否</button>
              <button type="button" data-promo="1">是</button>
            </div>
          </div>

          <div class="field">
            <label for="promoUntil">优惠截止日期</label>
            <input id="promoUntil" type="date" />
          </div>
        </div>

        <div class="result">
          <div class="metric">
            <p class="k">对比单价</p>
            <p id="unitPrice" class="v green">¥0.0</p>
          </div>
        </div>

        <div class="action-row">
          <button class="btn btn-primary" type="submit">确认记录</button>
          <button class="btn btn-subtle" type="button" id="rescanBtn">重新扫码</button>
        </div>
        <p id="msg" class="msg"></p>
      </form>
    </section>

    <nav>
      <a href="/index.html">清单</a>
      <a class="active" href="/add.html">录入</a>
      <a href="/stores.html">店铺</a>
    </nav>
  </div>

  <div id="sheetMask" class="sheet-mask">
    <div class="sheet">
      <button id="takePhoto" type="button">拍照</button>
      <button id="pickPhoto" type="button">从相册选择</button>
      <button id="cancelSheet" type="button">取消</button>
    </div>
  </div>

  <div id="scannerMask" class="scanner-mask">
    <div class="scanner">
      <div class="scanner-head">
        <span>摄像头扫码</span>
        <button id="closeScanner" type="button">关闭</button>
      </div>
      <video id="scannerVideo" autoplay playsinline muted></video>
      <div id="scannerHint" class="scanner-foot">将条码放入画面中央</div>
    </div>
  </div>

  <div id="quickMask" class="quick-mask">
    <div class="quick-panel">
      <h2>快速填入</h2>
      <textarea id="quickText" placeholder="例：牛奶 198円 Cosmos 1000ml"></textarea>
      <div class="quick-actions">
        <button id="applyQuickFill" class="btn btn-primary" type="button">解析填入</button>
        <button id="closeQuickFill" class="btn btn-subtle" type="button">取消</button>
      </div>
      <div id="quickHint" class="toolbar-note">支持商品名、价格、店铺关键词、规格，如 400g / 1000ml / 6个。</div>
    </div>
  </div>

  <div id="calcMask" class="calc-mask">
    <div class="calc-panel">
      <h2>规格计算</h2>
      <input id="calcExpression" class="calc-display" inputmode="decimal" placeholder="例：100*3 或 100g*3" />
      <div id="calcResult" class="calc-result">输入算式后应用到规格数值</div>
      <div class="calc-grid">
        <button type="button" data-calc-key="7">7</button>
        <button type="button" data-calc-key="8">8</button>
        <button type="button" data-calc-key="9">9</button>
        <button type="button" data-calc-op="/">÷</button>
        <button type="button" data-calc-key="4">4</button>
        <button type="button" data-calc-key="5">5</button>
        <button type="button" data-calc-key="6">6</button>
        <button type="button" data-calc-op="*">×</button>
        <button type="button" data-calc-key="1">1</button>
        <button type="button" data-calc-key="2">2</button>
        <button type="button" data-calc-key="3">3</button>
        <button type="button" data-calc-op="-">−</button>
        <button type="button" data-calc-key="0">0</button>
        <button type="button" data-calc-key=".">.</button>
        <button type="button" data-calc-action="back">⌫</button>
        <button type="button" data-calc-op="+">+</button>
      </div>
      <div class="calc-actions">
        <button id="applySpecCalc" class="btn btn-primary" type="button">应用结果</button>
        <button id="closeSpecCalc" class="btn btn-subtle" type="button">取消</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      taxMode: 8,
      unit: "g",
      isPromo: false,
      imageDataUrl: null,
      barcode: "",
      stores: [],
      selectedProductId: null,
      selectedProductName: "",
      duplicateTimer: null,
      scanTimer: null,
      scanStream: null,
      scanner: null
    };
    const $ = (id) => document.getElementById(id);

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function round1(n) {
      return Math.round(n * 10) / 10;
    }

    function buildPromoNote(note, isPromo, promoUntil) {
      const plain = String(note || "").trim().replace(/^\[\[promo(?::\d{4}-\d{2}-\d{2})?\]\]\s*/i, "");
      if (!isPromo) return plain || null;
      const prefix = promoUntil ? `[[promo:${promoUntil}]]` : "[[promo]]";
      return plain ? `${prefix} ${plain}` : prefix;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function clearSelectedProduct() {
      state.selectedProductId = null;
      state.selectedProductName = "";
    }

    function selectExistingProduct(product) {
      state.selectedProductId = Number(product.productId);
      state.selectedProductName = product.nameZh || product.nameJa || "未命名商品";
      $("nameZh").value = product.nameZh || "";
      $("nameJa").value = product.nameJa || "";
      $("duplicatePanel").classList.add("show");
      $("duplicatePanel").innerHTML = `
        <p class="duplicate-title">将作为已有商品继续记录：${escapeHtml(state.selectedProductName)}</p>
        <div class="duplicate-actions">
          <button class="duplicate-use" type="button" id="clearSelectedProduct">改为新建商品</button>
          <a class="duplicate-view" href="/index.html?q=${encodeURIComponent(state.selectedProductName)}">查看清单</a>
        </div>
      `;
      $("clearSelectedProduct").onclick = () => {
        clearSelectedProduct();
        $("duplicatePanel").classList.remove("show");
        $("duplicatePanel").innerHTML = "";
      };
    }

    async function checkBarcodeProduct() {
      const barcode = String(state.barcode || "").trim();
      if (!barcode) return;
      try {
        const res = await fetch(`/api/products?q=${encodeURIComponent(barcode)}`);
        const products = await res.json();
        const exact = products.find((item) => String(item.barcode || "").trim() === barcode);
        if (!exact) return;
        selectExistingProduct(exact);
        $("msg").textContent = "已识别到同条码商品，本次会作为该商品的新价格记录。";
      } catch (_) {
        // Barcode reuse is also enforced by the API; this only improves the form hint.
      }
    }

    async function checkDuplicateProducts() {
      const keyword = ($("nameZh").value.trim() || $("nameJa").value.trim()).trim();
      if (!keyword || keyword.length < 2) {
        $("duplicatePanel").classList.remove("show");
        $("duplicatePanel").innerHTML = "";
        return;
      }

      const res = await fetch(`/api/products?q=${encodeURIComponent(keyword)}`);
      const products = await res.json();
      const candidates = products
        .filter((item) => Number(item.productId) !== Number(state.selectedProductId))
        .slice(0, 3);

      if (!candidates.length) {
        $("duplicatePanel").classList.remove("show");
        $("duplicatePanel").innerHTML = "";
        return;
      }

      $("duplicatePanel").classList.add("show");
      $("duplicatePanel").innerHTML = `
        <p class="duplicate-title">可能已经录入过，确认后可直接给已有商品新增价格</p>
        ${candidates.map((item) => `
          <div class="duplicate-item">
            <div class="duplicate-name">${escapeHtml(item.nameZh || item.nameJa || "未命名商品")}</div>
            <div class="duplicate-meta">最近价格 ¥${Number(item.latestPriceTaxIn || 0).toFixed(0)} · ${escapeHtml(item.latestRecordDate || "-")}</div>
            <div class="duplicate-actions">
              <button class="duplicate-use" type="button" data-use-product="${item.productId}">使用此商品</button>
              <a class="duplicate-view" href="/index.html?q=${encodeURIComponent(item.nameZh || item.nameJa || "")}">查看</a>
            </div>
          </div>
        `).join("")}
        <button class="btn btn-subtle" type="button" id="continueNewProduct">继续新建商品</button>
      `;
      $("duplicatePanel").querySelectorAll("[data-use-product]").forEach((btn) => {
        btn.onclick = () => {
          const product = candidates.find((item) => Number(item.productId) === Number(btn.dataset.useProduct));
          if (product) selectExistingProduct(product);
        };
      });
      $("continueNewProduct").onclick = () => {
        clearSelectedProduct();
        $("duplicatePanel").classList.remove("show");
        $("duplicatePanel").innerHTML = "";
      };
    }

    function scheduleDuplicateCheck() {
      if (!state.barcode) clearSelectedProduct();
      if (state.duplicateTimer) clearTimeout(state.duplicateTimer);
      state.duplicateTimer = setTimeout(checkDuplicateProducts, 260);
    }

    function calc() {
      const before = Number($("priceBeforeTax").value || 0);
      const spec = Number($("spec").value || 0);
      const taxRate = state.taxMode / 100;
      const after = before * (state.taxMode === 0 ? 1 : (1 + taxRate));

      let unitPrice = 0;
      let unitLabel = " / 100g";
      if (spec > 0) {
        if (state.unit === "g" || state.unit === "ml") {
          unitPrice = (after / spec) * 100;
          unitLabel = state.unit === "g" ? " / 100g" : " / 100ml";
        } else {
          unitPrice = after / spec;
          unitLabel = " / 个";
        }
      }

      $("priceAfterTaxInput").value = `¥${round1(after).toFixed(1)}`;
      $("unitPrice").textContent = `¥${round1(unitPrice).toFixed(1)}${unitLabel}`;
      return { before, after: round1(after) };
    }

    function normalizeExpression(value) {
      return String(value || "")
        .replace(/[×xX]/g, "*")
        .replace(/[÷]/g, "/")
        .replace(/[（）]/g, (ch) => ch === "（" ? "(" : ")")
        .replace(/(kg|g|克|ml|毫升|個|个)/gi, "")
        .replace(/,/g, "")
        .trim();
    }

    function evaluateExpression(value) {
      const expression = normalizeExpression(value);
      if (!expression) throw new Error("请输入算式");
      if (!/^[0-9+\-*/().\s]+$/.test(expression)) {
        throw new Error("只支持数字和 + - × ÷ ( )");
      }
      const result = Function(`"use strict"; return (${expression});`)();
      if (!Number.isFinite(result) || result <= 0) throw new Error("结果必须大于 0");
      return result;
    }

    function formatNumber(value) {
      return Number.isInteger(value)
        ? String(value)
        : String(Math.round(value * 100) / 100).replace(/\.?0+$/, "");
    }

    function updateCalcResult() {
      try {
        const value = evaluateExpression($("calcExpression").value);
        $("calcResult").textContent = `结果：${formatNumber(value)}`;
      } catch (err) {
        $("calcResult").textContent = err.message || "输入算式后应用到规格数值";
      }
    }

    function openSpecCalculator() {
      $("calcExpression").value = $("spec").value || "";
      updateCalcResult();
      $("calcMask").style.display = "flex";
      $("calcExpression").focus();
    }

    function closeSpecCalculator() {
      $("calcMask").style.display = "none";
    }

    function applySpecCalculator() {
      try {
        const value = evaluateExpression($("calcExpression").value);
        $("spec").value = formatNumber(value);
        calc();
        closeSpecCalculator();
      } catch (err) {
        $("calcResult").textContent = err.message || "无法计算";
      }
    }

    function setTaxMode(nextTaxMode) {
      const tax = Number(nextTaxMode);
      state.taxMode = tax;
      $("taxSegment").querySelectorAll("button").forEach((b) => {
        b.classList.toggle("active", Number(b.dataset.tax) === tax);
      });
      calc();
    }

    function findCosmosStoreId() {
      const hit = state.stores.find((store) => {
        const t = String(store.name || "").toLowerCase();
        return t.includes("cosmos") || t.includes("コスモス");
      });
      return hit ? Number(hit.id) : null;
    }

    function applyTaxStoreLinkByTax() {
      if (state.taxMode !== 0) return;
      const cosmosId = findCosmosStoreId();
      if (!cosmosId) return;
      $("storeId").value = String(cosmosId);
      const store = state.stores.find((item) => Number(item.id) === cosmosId);
      if (store) {
        $("storeSearch").value = store.name;
        $("storeHint").textContent = `已匹配：${store.name}`;
      }
    }

    function applyTaxStoreLinkByStore() {
      const selectedText = $("storeSearch").value || $("storeId").selectedOptions?.[0]?.textContent || "";
      const isCosmos = selectedText.toLowerCase().includes("cosmos") || selectedText.includes("コスモス");
      setTaxMode(isCosmos ? 0 : 8);
    }

    function matchStoreByInput() {
      const keyword = $("storeSearch").value.trim().toLowerCase();
      if (!keyword) {
        $("storeId").value = "";
        $("storeHint").textContent = "可输入关键词匹配现有店铺";
        return null;
      }
      const exact = state.stores.find((store) => String(store.name || "").toLowerCase() === keyword);
      const matched = exact || state.stores.find((store) => String(store.name || "").toLowerCase().includes(keyword));
      if (!matched) {
        $("storeId").value = "";
        $("storeHint").textContent = "没有匹配到店铺，请继续输入或先去店铺页新增";
        return null;
      }
      $("storeId").value = String(matched.id);
      $("storeHint").textContent = `已匹配：${matched.name}`;
      return matched;
    }

    function normalizeQuickText(value) {
      return String(value || "").replace(/[，、。]/g, " ").replace(/\s+/g, " ").trim();
    }

    function parseQuickFill(text) {
      const raw = normalizeQuickText(text);
      if (!raw) throw new Error("请输入商品、价格、店铺和规格。");

      const specMatch = raw.match(/(\d+(?:\.\d+)?)\s*(kg|g|克|ml|毫升|個|个)/i);
      const textWithoutSpec = specMatch ? raw.replace(specMatch[0], " ") : raw;
      const priceMatch = textWithoutSpec.match(/(?:¥|￥)?\s*(\d+(?:\.\d+)?)\s*(?:円|日元|元)?/);
      const store = state.stores.find((item) => {
        const name = String(item.name || "").toLowerCase();
        const chain = String(item.chainBrand || "").toLowerCase();
        const lowered = raw.toLowerCase();
        return lowered.includes(name) || (chain && lowered.includes(chain));
      });

      let name = raw;
      if (specMatch) name = name.replace(specMatch[0], " ");
      if (priceMatch) name = name.replace(priceMatch[0], " ");
      if (store) {
        name = name.replace(new RegExp(store.name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i"), " ");
        if (store.chainBrand) {
          name = name.replace(new RegExp(String(store.chainBrand).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i"), " ");
        }
      }
      name = normalizeQuickText(name).replace(/多少钱|价格|店铺|规格/g, "").trim();

      if (!name) throw new Error("没有识别到商品名。");
      if (!priceMatch) throw new Error("没有识别到价格。");
      if (!specMatch) throw new Error("没有识别到规格。");

      let specValue = Number(specMatch[1]);
      let unit = specMatch[2].toLowerCase();
      if (unit === "kg") {
        specValue *= 1000;
        unit = "g";
      }
      if (unit === "克") unit = "g";
      if (unit === "毫升") unit = "ml";
      if (unit === "個") unit = "个";

      return {
        name,
        priceTaxIn: Number(priceMatch[1]),
        specValue,
        unit,
        store
      };
    }

    function applyQuickFillText() {
      try {
        const parsed = parseQuickFill($("quickText").value);
        $("nameZh").value = parsed.name;
        $("spec").value = parsed.specValue;
        state.unit = parsed.unit;
        $("unitSegment").querySelectorAll("button").forEach((b) => {
          b.classList.toggle("active", b.dataset.unit === parsed.unit);
        });

        if (parsed.store) {
          $("storeId").value = String(parsed.store.id);
          $("storeSearch").value = parsed.store.name;
          $("storeHint").textContent = `已匹配：${parsed.store.name}`;
          applyTaxStoreLinkByStore();
        }

        const taxFactor = state.taxMode === 0 ? 1 : 1 + state.taxMode / 100;
        $("priceBeforeTax").value = (parsed.priceTaxIn / taxFactor).toFixed(1);
        calc();
        scheduleDuplicateCheck();
        $("quickHint").textContent = "已填入，可继续修改或补照片。";
        $("quickMask").style.display = "none";
      } catch (err) {
        $("quickHint").textContent = err.message || "解析失败，请换成更明确的格式。";
      }
    }

    function bindSegment(containerId, key) {
      const box = $(containerId);
      box.querySelectorAll("button").forEach((btn) => {
        btn.onclick = () => {
          box.querySelectorAll("button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          state[key] = key === "taxMode" ? Number(btn.dataset.tax) : btn.dataset.unit;
          if (key === "taxMode") {
            applyTaxStoreLinkByTax();
          }
          calc();
        };
      });
    }

    function setPromoMode(isPromo) {
      state.isPromo = Boolean(isPromo);
      $("promoSegment").querySelectorAll("button").forEach((b) => {
        b.classList.toggle("active", b.dataset.promo === (state.isPromo ? "1" : "0"));
      });
      $("promoUntil").disabled = !state.isPromo;
      if (!state.isPromo) $("promoUntil").value = "";
    }

    function openSheet() {
      $("sheetMask").style.display = "flex";
    }

    function closeSheet() {
      $("sheetMask").style.display = "none";
    }

    function pickImage() {
      $("imageFile").click();
      closeSheet();
    }

    async function loadStores() {
      const stores = await fetch("/api/stores").then((r) => r.json());
      state.stores = stores;
      $("storeOptions").innerHTML = stores.length
        ? stores.map((s) => `<option value="${s.name}"></option>`).join("")
        : "";
      $("storeId").innerHTML = stores.length
        ? stores.map((s) => `<option value="${s.id}">${s.name}</option>`).join("")
        : '<option value="">请先到店铺页新增店铺</option>';
      if (stores.length) {
        $("storeSearch").value = stores[0].name;
        $("storeHint").textContent = `已匹配：${stores[0].name}`;
        applyTaxStoreLinkByStore();
      }
    }

    function updateBarcodeNote() {
      $("barcodeNote").textContent = state.barcode ? `条码：${state.barcode}` : "条码：未扫码";
    }

    function stopScanner() {
      if (state.scanTimer) {
        clearInterval(state.scanTimer);
        state.scanTimer = null;
      }
      if (state.scanStream) {
        state.scanStream.getTracks().forEach((t) => t.stop());
        state.scanStream = null;
      }
      $("scannerVideo").srcObject = null;
      $("scannerMask").style.display = "none";
    }

    async function openScanner() {
      if (!("BarcodeDetector" in window)) {
        $("msg").textContent = "当前浏览器不支持扫码，请使用 Chrome 或 Edge。";
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        state.scanStream = stream;
        $("scannerVideo").srcObject = stream;
        $("scannerMask").style.display = "flex";
        $("scannerHint").textContent = "将条码放入画面中央";

        if (!state.scanner) {
          state.scanner = new BarcodeDetector({
            formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128", "code_39"]
          });
        }

        state.scanTimer = setInterval(async () => {
          if (!$("scannerVideo").srcObject) return;
          try {
            const codes = await state.scanner.detect($("scannerVideo"));
            if (!codes.length) return;
            state.barcode = String(codes[0].rawValue || "").trim();
            if (!state.barcode) return;
            updateBarcodeNote();
            checkBarcodeProduct();
            $("scannerHint").textContent = `已识别：${state.barcode}`;
            stopScanner();
          } catch (_) {
            // ignore scanning frame errors
          }
        }, 280);
      } catch (err) {
        $("msg").textContent = `无法打开摄像头：${err.message || "请检查权限"}`;
        stopScanner();
      }
    }

    function handleScanClick() {
      openScanner();
    }

    $("quickFillBtn").onclick = () => {
      $("quickMask").style.display = "flex";
      $("quickHint").textContent = "支持商品名、价格、店铺关键词、规格，如 400g / 1000ml / 6个。";
      $("quickText").focus();
    };
    $("closeQuickFill").onclick = () => {
      $("quickMask").style.display = "none";
    };
    $("applyQuickFill").onclick = applyQuickFillText;
    $("openSpecCalc").onclick = openSpecCalculator;
    $("closeSpecCalc").onclick = closeSpecCalculator;
    $("applySpecCalc").onclick = applySpecCalculator;
    $("calcExpression").addEventListener("input", updateCalcResult);
    $("calcExpression").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        applySpecCalculator();
      }
    });
    $("calcMask").addEventListener("click", (e) => {
      if (e.target === $("calcMask")) closeSpecCalculator();
    });
    $("calcMask").querySelectorAll("[data-calc-key], [data-calc-op], [data-calc-action]").forEach((btn) => {
      btn.onclick = () => {
        const action = btn.dataset.calcAction;
        if (action === "back") {
          $("calcExpression").value = $("calcExpression").value.slice(0, -1);
        } else {
          $("calcExpression").value += btn.dataset.calcKey || btn.dataset.calcOp || "";
        }
        updateCalcResult();
        $("calcExpression").focus();
      };
    });
    $("quickMask").addEventListener("click", (e) => {
      if (e.target === $("quickMask")) $("quickMask").style.display = "none";
    });
    $("scanBtn").onclick = handleScanClick;
    $("rescanBtn").onclick = handleScanClick;
    $("closeScanner").onclick = stopScanner;
    $("scannerMask").addEventListener("click", (e) => {
      if (e.target === $("scannerMask")) stopScanner();
    });
    $("uploadBox").onclick = openSheet;
    $("storeId").addEventListener("change", applyTaxStoreLinkByStore);
    $("storeSearch").addEventListener("input", () => {
      const matched = matchStoreByInput();
      if (matched) applyTaxStoreLinkByStore();
    });
    $("storeSearch").addEventListener("blur", () => {
      const matched = matchStoreByInput();
      if (matched) {
        $("storeSearch").value = matched.name;
        applyTaxStoreLinkByStore();
      }
    });
    $("promoSegment").querySelectorAll("button").forEach((btn) => {
      btn.onclick = () => setPromoMode(btn.dataset.promo === "1");
    });
    $("uploadBox").addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openSheet();
      }
    });

    $("sheetMask").addEventListener("click", (e) => {
      if (e.target === $("sheetMask")) closeSheet();
    });
    $("cancelSheet").onclick = closeSheet;
    $("takePhoto").onclick = pickImage;
    $("pickPhoto").onclick = pickImage;

    $("imageFile").onchange = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.imageDataUrl = String(reader.result || "");
        $("previewImg").src = state.imageDataUrl;
        $("previewImg").style.display = "block";
        $("uploadText").style.display = "none";
        $("uploadBox").classList.add("has-image");
      };
      reader.readAsDataURL(file);
    };

    $("nameZh").addEventListener("input", scheduleDuplicateCheck);
    $("nameJa").addEventListener("input", scheduleDuplicateCheck);
    ["priceBeforeTax", "spec"].forEach((id) => $(id).addEventListener("input", calc));
    bindSegment("taxSegment", "taxMode");
    bindSegment("unitSegment", "unit");

    $("form").onsubmit = async (e) => {
      e.preventDefault();
      const { before, after } = calc();
      const matchedStore = matchStoreByInput();

      if (!matchedStore || !$("storeId").value) {
        $("msg").textContent = "请先选择购买店铺。";
        return;
      }
      if (!$("nameZh").value.trim() && !$("nameJa").value.trim()) {
        $("msg").textContent = "请至少填写中文名或日文名。";
        return;
      }

      const payload = {
        product: state.selectedProductId
          ? { id: state.selectedProductId }
          : {
            nameZh: $("nameZh").value.trim(),
            nameJa: $("nameJa").value.trim(),
            barcode: state.barcode
          },
        storeId: Number($("storeId").value),
        priceTaxEx: before,
        taxRate: state.taxMode,
        priceTaxIn: after,
        specValue: Number($("spec").value),
        unit: state.unit,
        imageUrl: state.imageDataUrl,
        recordDate: $("recordDate").value,
        note: buildPromoNote($("note").value, state.isPromo, $("promoUntil").value)
      };

      const res = await fetch("/api/price-records", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        $("msg").textContent = `保存失败：${data.error || "未知错误"}`;
        return;
      }

      $("msg").textContent = "保存成功，正在返回清单页...";
      setTimeout(() => {
        location.href = "/index.html";
      }, 700);
    };

    $("recordDate").value = today();
    setPromoMode(false);
    loadStores();
    updateBarcodeNote();
    calc();
  </script>
</body>
</html>
