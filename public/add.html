<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛒 商品录入</title>
  <style>
    :root {
      --primary: #00b894;
      --bg: #f4f7f6;
      --text: #2d3436;
      --muted: #94a3b8;
      --danger: #ff7675;
      --card: #fff;
      --line: #eee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }
    .app { max-width: 460px; margin: 0 auto; }
    .header {
      background: var(--primary);
      color: #fff;
      border-radius: 18px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 24px rgba(0, 184, 148, .22);
    }
    .scan-btn {
      border: none;
      border-radius: 999px;
      width: 42px; height: 42px;
      background: #fff;
      color: var(--primary);
      font-size: 18px;
      cursor: pointer;
    }
    .card {
      margin-top: 12px;
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, .06);
      padding: 16px;
    }
    .upload-box {
      border: 2px dashed #d9e4e1;
      border-radius: 16px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      overflow: hidden;
      position: relative;
      background: #fafdfc;
      cursor: pointer;
    }
    .upload-box img {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #fff;
    }
    .replace-tip {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.5);
      color: #fff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      display: none;
    }
    .upload-box.has-image .replace-tip { display: block; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,184,148,.15);
    }
    .segment {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #f8faf9;
    }
    .segment button {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px 0;
      color: #4b5563;
      cursor: pointer;
    }
    .segment button.active {
      background: #fff;
      color: var(--primary);
      font-weight: 700;
    }
    .result {
      margin-top: 12px;
      background: #f0fff4;
      border-radius: 12px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .value-red { color: var(--danger); font-weight: 700; font-size: 20px; }
    .value-green { color: var(--primary); font-weight: 700; font-size: 20px; }
    .save-btn {
      width: 100%;
      margin-top: 12px;
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 13px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .muted { color: var(--muted); font-size: 12px; }
    .msg { white-space: pre-wrap; font-size: 12px; color: #475569; }

    .sheet-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: flex-end;
      z-index: 20;
    }
    .sheet {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 10px 12px 18px;
    }
    .sheet button {
      width: 100%;
      border: none;
      background: #f8fafc;
      padding: 12px;
      border-radius: 12px;
      margin-top: 8px;
      font-size: 14px;
    }
    nav { margin-top: 10px; text-align: center; font-size: 13px; }
    nav a { color: #64748b; margin: 0 10px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <strong>🛒 商品录入</strong>
      <button id="scanBtn" class="scan-btn">📷</button>
    </div>

    <div class="card">
      <form id="form">
        <div id="uploadBox" class="upload-box">
          <div id="uploadText">点击拍照 / 上传图片</div>
          <img id="previewImg" style="display:none" alt="商品图" />
          <div class="replace-tip">点击更换图片</div>
        </div>

        <input id="imageFile" type="file" accept="image/*" capture="environment" style="display:none" />

        <div class="grid">
          <div class="field" style="grid-column:1 / -1;">
            <label>中文名称</label>
            <input id="nameCn" placeholder="例如：片栗粉" required />
          </div>

          <div class="field">
            <label>税前价格</label>
            <input id="priceBeforeTax" type="number" step="0.01" placeholder="0" required />
          </div>
          <div class="field">
            <label>税率</label>
            <div id="taxSegment" class="segment">
              <button type="button" data-tax="8" class="active">8%</button>
              <button type="button" data-tax="10">10%</button>
              <button type="button" data-tax="0">=</button>
            </div>
          </div>

          <div class="field">
            <label>规格</label>
            <input id="spec" type="number" step="0.1" placeholder="400" required />
          </div>
          <div class="field">
            <label>单位</label>
            <div id="unitSegment" class="segment">
              <button type="button" data-unit="g" class="active">g</button>
              <button type="button" data-unit="ml">ml</button>
              <button type="button" data-unit="个">个</button>
            </div>
          </div>

          <div class="field">
            <label>购买超市</label>
            <select id="store"></select>
          </div>
          <div class="field">
            <label>条码</label>
            <input id="barcode" placeholder="可选" />
          </div>
        </div>

        <div class="result">
          <div>
            <div class="muted">税后总价</div>
            <div id="priceAfterTax" class="value-red">¥0.0</div>
          </div>
          <div>
            <div class="muted">对比单价</div>
            <div id="unitPrice" class="value-green">¥0.0</div>
          </div>
        </div>

        <button class="save-btn" type="submit">确认记录</button>
        <p id="msg" class="msg"></p>
      </form>
    </div>

    <nav>
      <a href="/index.html">📋 比价清单</a>
      <a href="/add.html">🛒 商品录入</a>
      <a href="/stores.html">🏬 店铺</a>
    </nav>
  </div>

  <div id="sheetMask" class="sheet-mask">
    <div class="sheet">
      <button id="takePhoto">📷 拍照</button>
      <button id="pickPhoto">🖼️ 从相册选择</button>
      <button id="cancelSheet">取消</button>
    </div>
  </div>

  <script>
    const state = {
      taxMode: 8,
      unit: 'g',
      imageDataUrl: null,
    };

    const $ = (id) => document.getElementById(id);

    $('scanBtn').onclick = () => alert('扫码功能下一版接入，当前可手动输入条码');

    function bindSegment(containerId, key) {
      const box = $(containerId);
      box.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          box.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state[key] = key === 'taxMode' ? Number(btn.dataset.tax) : btn.dataset.unit;
          calc();
        };
      });
    }

    bindSegment('taxSegment', 'taxMode');
    bindSegment('unitSegment', 'unit');

    async function loadStores() {
      const stores = await fetch('/api/stores').then(r => r.json());
      if (!stores.length) {
        $('store').innerHTML = '<option value="">请先去店铺页新增</option>';
      } else {
        $('store').innerHTML = stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      }
    }

    function round1(n) { return Math.round(n * 10) / 10; }

    function calc() {
      const before = Number($('priceBeforeTax').value || 0);
      const spec = Number($('spec').value || 0);
      const taxRate = state.taxMode / 100;
      const after = before * (state.taxMode === 0 ? 1 : (1 + taxRate));

      let unitPrice = 0;
      if (spec > 0) {
        if (state.unit === 'g' || state.unit === 'ml') {
          unitPrice = after / spec * 100;
        } else {
          unitPrice = after / spec;
        }
      }

      $('priceAfterTax').textContent = `¥${round1(after).toFixed(1)}`;
      $('unitPrice').textContent = `¥${round1(unitPrice).toFixed(1)} / ${state.unit === '个' ? '个' : ('100' + state.unit)}`;

      return {
        before,
        after: round1(after),
        unitPrice: round1(unitPrice),
      };
    }

    ['priceBeforeTax', 'spec'].forEach(id => $(id).addEventListener('input', calc));

    $('uploadBox').onclick = () => $('sheetMask').style.display = 'flex';
    $('cancelSheet').onclick = () => $('sheetMask').style.display = 'none';
    $('takePhoto').onclick = () => { $('imageFile').click(); $('sheetMask').style.display = 'none'; };
    $('pickPhoto').onclick = () => { $('imageFile').click(); $('sheetMask').style.display = 'none'; };

    $('imageFile').onchange = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.imageDataUrl = reader.result;
        $('previewImg').src = state.imageDataUrl;
        $('previewImg').style.display = 'block';
        $('uploadText').style.display = 'none';
        $('uploadBox').classList.add('has-image');
      };
      reader.readAsDataURL(file);
    };

    $('form').onsubmit = async (e) => {
      e.preventDefault();

      const { before, after } = calc();
      if (!$('store').value) {
        $('msg').textContent = '请先选择购买超市（可先去店铺页新增）';
        return;
      }

      const payload = {
        product: {
          nameZh: $('nameCn').value,
          barcode: $('barcode').value,
        },
        storeId: Number($('store').value),
        priceTaxEx: before,
        taxRate: state.taxMode,
        priceTaxIn: after,
        specValue: Number($('spec').value),
        unit: state.unit,
        imageUrl: state.imageDataUrl,
        recordDate: new Date().toISOString().slice(0, 10),
        note: `taxMode=${state.taxMode}%`
      };

      const res = await fetch('/api/price-records', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        $('msg').textContent = `保存失败：${data.error || '未知错误'}`;
        return;
      }

      $('msg').textContent = '保存成功 ✅\n' + JSON.stringify(data, null, 2);
      setTimeout(() => location.href = '/index.html', 800);
    };

    loadStores();
    calc();
  </script>
</body>
</html>
