<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>商品录入</title>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #ffffff;
      --surface-soft: #f7fbfa;
      --line: #dbe7e3;
      --text: #1f2a2b;
      --muted: #607270;
      --primary: #0d9a7d;
      --primary-strong: #0b7f68;
      --danger: #ca3f3f;
      --ok: #0a826b;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow: 0 14px 28px rgba(14, 63, 56, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 10% 0%, #d7f6ed 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #d8eef8 0, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "SF Pro Text", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        calc(88px + env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
    }

    .app {
      width: min(960px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      margin: 0 auto;
      display: grid;
      gap: 8px;
    }

    .hero {
      background: linear-gradient(140deg, #1aaf90, #0a7f69);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .hero-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .scan-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .quick-btn {
      height: 42px;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.05);
      padding: 14px;
    }

    .toolbar-note {
      margin: -2px 4px 0;
      font-size: 12px;
      color: #607270;
      text-align: left;
    }

    .upload {
      border: 1px dashed #b9cdc7;
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      min-height: 128px;
      display: grid;
      place-items: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      text-align: center;
      color: #708280;
      font-size: 14px;
    }

    .upload.has-image {
      border-style: solid;
    }

    .upload img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      background: #fff;
    }

    .replace-tip {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      color: #fff;
      background: rgba(21, 32, 32, 0.58);
      display: none;
      white-space: nowrap;
    }

    .upload.has-image .replace-tip {
      display: block;
    }

    .top-compact {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .upload.compact {
      min-height: 108px;
      height: 100%;
      font-size: 12px;
      border-radius: 12px;
    }

    .name-stack {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .fields {
      margin-top: 10px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .group {
      border: 1px solid #dcebe6;
      border-radius: 14px;
      background: #f8fcfb;
      padding: 9px;
      display: grid;
      gap: 8px;
    }

    .inline-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .group-title {
      margin: 0;
      font-size: 12px;
      color: #5f7370;
      font-weight: 700;
    }

    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .req {
      display: inline-block;
      margin-left: 5px;
      border-radius: 999px;
      background: #fff0e6;
      color: #b85711;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 700;
      vertical-align: 1px;
    }

    .required-note {
      margin: 0 0 10px;
      border: 1px solid #f4dcc8;
      border-radius: 12px;
      background: #fff8f2;
      color: #81512e;
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 12px;
      color: #183132;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #76c5b1;
      box-shadow: 0 0 0 3px rgba(13, 154, 125, 0.14);
    }

    .input-with-action {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .input-with-action button {
      height: 40px;
      border: 0;
      border-radius: var(--radius-sm);
      background: #edf6f3;
      color: #1a5950;
      font-size: 13px;
      font-weight: 700;
      padding: 0 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #priceAfterTaxInput {
      background: #eef4f2;
      color: #607270;
      border-color: #d4e1dd;
      font-weight: 700;
    }

    .segment {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 5px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f5f9f8;
    }

    .segment button {
      height: 32px;
      border-radius: 9px;
      border: 0;
      background: transparent;
      color: #4d6160;
      cursor: pointer;
      min-width: 0;
      font-size: 13px;
    }

    .segment button.active {
      background: #fff;
      color: var(--primary-strong);
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(17, 69, 60, 0.08);
    }

    .segment.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .result {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .metric {
      border: 1px solid #dcebe6;
      border-radius: 12px;
      background: #f8fcfb;
      padding: 10px;
    }

    .metric p {
      margin: 0;
    }

    .metric .k {
      color: #627674;
      font-size: 12px;
    }

    .metric .v {
      margin-top: 4px;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
      word-break: break-word;
    }

    .metric .v.red {
      color: var(--danger);
    }

    .metric .v.green {
      color: var(--ok);
    }

    .action-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .btn {
      height: 44px;
      border: 0;
      border-radius: 12px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
      min-width: 0;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-subtle {
      background: #edf6f3;
      color: #1a5950;
      font-size: 13px;
      white-space: nowrap;
    }

    .msg {
      margin: 10px 0 0;
      font-size: 13px;
      color: #435857;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .import-card {
      display: grid;
      gap: 10px;
    }

    .import-title {
      margin: 0;
      color: #607270;
      font-size: 12px;
      font-weight: 700;
    }

    .import-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .import-action {
      height: 48px;
      border: 0;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.07);
      color: #166659;
      cursor: pointer;
      font-weight: 800;
    }

    .import-action:first-child {
      color: #b86c12;
    }

    .import-help {
      margin: 0;
      color: #607270;
      font-size: 12px;
      line-height: 1.45;
    }

    .import-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 39;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .import-mask.show {
      display: flex;
    }

    .import-panel {
      width: min(960px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      max-height: min(760px, calc(100dvh - 40px));
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
    }

    .import-head,
    .import-foot {
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid #e6efec;
    }

    .import-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .import-close {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: #edf6f3;
      color: #1a5950;
      cursor: pointer;
      font-size: 18px;
    }

    .import-summary {
      margin: 0;
      padding: 10px 12px;
      color: #607270;
      font-size: 12px;
      line-height: 1.45;
      border-bottom: 1px solid #e6efec;
    }

    .import-table-wrap {
      overflow: auto;
      background: #f8fcfb;
    }

    .import-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      font-size: 12px;
    }

    .import-table th,
    .import-table td {
      border-bottom: 1px solid #e2ece9;
      padding: 7px;
      text-align: left;
      vertical-align: top;
    }

    .import-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef7f4;
      color: #465f5c;
      font-weight: 800;
    }

    .import-table input,
    .import-table select {
      height: 34px;
      min-width: 88px;
      border-radius: 9px;
      font-size: 12px;
    }

    .import-row-error {
      margin-top: 4px;
      color: var(--danger);
      font-size: 11px;
      line-height: 1.35;
    }

    .import-foot {
      border-top: 1px solid #e6efec;
      border-bottom: 0;
      background: #fff;
    }

    .import-foot-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .duplicate-panel {
      display: none;
      border: 1px solid #dcebe6;
      border-radius: 14px;
      background: #f8fcfb;
      padding: 9px;
      gap: 8px;
    }

    .duplicate-panel.show {
      display: grid;
    }

    .duplicate-title {
      margin: 0;
      font-size: 12px;
      color: #5f7370;
      font-weight: 700;
    }

    .duplicate-item {
      border: 1px solid #e1ece8;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .duplicate-name {
      font-size: 13px;
      font-weight: 700;
      color: #183132;
      word-break: break-word;
    }

    .duplicate-meta {
      font-size: 12px;
      color: #607270;
    }

    .duplicate-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .duplicate-actions button,
    .duplicate-actions a {
      height: 34px;
      border-radius: 9px;
      border: 0;
      display: grid;
      place-items: center;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .duplicate-use {
      background: #0d9a7d;
      color: #fff;
    }

    .duplicate-view {
      background: #edf6f3;
      color: #1a5950;
    }

    .promo-date-field.is-hidden {
      display: none;
    }

    nav {
      --active-index: 2;
      position: fixed;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8e7e1;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(13, 60, 51, 0.1);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    nav::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 20%;
      border-radius: 999px;
      background: #e9f7f3;
      transform: translateX(calc(var(--active-index) * 100%));
      transition: transform 0.22s ease;
      z-index: 0;
    }

    nav[data-active="home"] { --active-index: 0; }
    nav[data-active="list"] { --active-index: 1; }
    nav[data-active="add"] { --active-index: 2; }
    nav[data-active="stores"] { --active-index: 3; }
    nav[data-active="profile"] { --active-index: 4; }

    nav a {
      position: relative;
      z-index: 1;
      text-align: center;
      text-decoration: none;
      color: #4f6562;
      font-size: 12px;
      line-height: 44px;
      height: 44px;
      font-weight: 600;
      transition: color 0.18s ease;
    }

    nav a.active {
      background: transparent;
      color: #0c8f72;
    }

    .sheet-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 30;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .sheet {
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      padding: 10px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
    }

    .sheet button {
      height: 44px;
      border-radius: 12px;
      border: 0;
      font-weight: 700;
      cursor: pointer;
      background: #edf6f3;
      color: #1a5950;
    }

    .sheet button:last-child {
      background: #f8f8f8;
      color: #485554;
    }

    .scanner-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.68);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 35;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .scanner {
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      background: #0f1616;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #243433;
    }

    .scanner-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #e5f2ef;
      padding: 10px 12px;
      font-size: 13px;
    }

    .scanner-head button {
      border: 0;
      border-radius: 8px;
      background: #223332;
      color: #e5f2ef;
      height: 30px;
      padding: 0 10px;
      cursor: pointer;
    }

    .scanner video {
      display: block;
      width: 100%;
      max-height: 58vh;
      object-fit: cover;
      background: #000;
    }

    .scanner-foot {
      color: #bdd3cf;
      font-size: 12px;
      padding: 10px 12px 12px;
    }

    .quick-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 34;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .quick-panel {
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .quick-panel h2 {
      margin: 0;
      font-size: 16px;
    }

    .quick-panel textarea {
      width: 100%;
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      resize: vertical;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .calc-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 36;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .calc-panel {
      width: min(420px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .calc-panel h2 {
      margin: 0;
      font-size: 16px;
    }

    .calc-display {
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      font-size: 18px;
      text-align: right;
    }

    .calc-result {
      min-height: 18px;
      color: #607270;
      font-size: 13px;
      text-align: right;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .calc-grid button {
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: #f2f7f5;
      color: #1f2a2b;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .calc-grid button[data-calc-op],
    .calc-grid button[data-calc-action] {
      background: #e8f5f1;
      color: #0b7f68;
    }

    .calc-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .existing-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 37;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .existing-panel {
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid #dceae6;
      padding: 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .existing-panel h2 {
      margin: 0;
      font-size: 16px;
    }

    .existing-body {
      color: #435857;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
    }

    .existing-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    @media (min-width: 720px) {
      body {
        padding: 20px;
      }

      .fields {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field.span-2,
      .span-2 {
        grid-column: 1 / -1;
      }

    }

    @media (max-width: 420px) {
      .hero {
        padding: 12px;
        gap: 8px;
      }

      .hero h1 {

  </style>

        </div>
      </div>

  <script src="toast.js"></script>
  <script src="image-cropper.js"></script>
  <script>
    const state = {
      taxMode: 8,
      unit: "g",
      isPromo: false,
      imageDataUrls: [],
      barcode: "",
      stores: [],
      selectedProductId: null,
      selectedProductName: "",
      pendingExistingProduct: null,
      pendingExistingDetail: null,
      duplicateTimer: null,
      scanTimer: null,
      scanStream: null,
      scanner: null,
      zxingControls: null,
      zxingPromise: null,
      importRows: []
    };
    const $ = (id) => document.getElementById(id);

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function round1(n) {
      return Math.round(n * 10) / 10;
    }

    function buildPromoNote(note, isPromo, promoUntil) {
      const plain = String(note || "").trim().replace(/^\[\[promo(?::\d{4}-\d{2}-\d{2})?\]\]\s*/i, "");
      if (!isPromo) return plain || null;
      const prefix = promoUntil ? `[[promo:${promoUntil}]]` : "[[promo]]";
      return plain ? `${prefix} ${plain}` : prefix;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function notify(message, type = "info", options = {}) {
      if (window.showToast) window.showToast(message, { type, ...options });
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    function downloadImportTemplate() {
      const ok = window.confirm("确认下载价格导入模板文件吗？");
      if (!ok) return;
      const rows = [
        ["中文名", "日文名", "条码", "店铺", "税后价", "税前价", "税率", "规格", "单位", "日期", "备注"],
        ["牛奶", "牛乳", "4900000000000", state.stores[0]?.name || "请填写已有店铺名", "198", "", "8", "1000", "ml", today(), "可选"]
      ];
      const csv = `\uFEFF${rows.map((row) => row.map(csvEscape).join(",")).join("\n")}`;
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "price-import-template.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      notify("模板文件已下载。", "success");
    }

    function splitDelimitedLine(line, delimiter) {
      const cells = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        if (ch === '"') {
          if (quoted && line[i + 1] === '"') {
            cell += '"';
            i += 1;
          } else {
            quoted = !quoted;
          }
        } else if (ch === delimiter && !quoted) {
          cells.push(cell);
          cell = "";
        } else {
          cell += ch;
        }
      }
      cells.push(cell);
      return cells.map((x) => x.trim());
    }

    function hasUserData(row) {
      return row.some((cell) => String(cell ?? "").trim());
    }

    function isValidIsoDate(value) {
      const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return false;
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(Date.UTC(year, month - 1, day));
      return date.getUTCFullYear() === year && date.getUTCMonth() === month - 1 && date.getUTCDate() === day;
    }

    function normalizeDateInput(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      const ymd = text.match(/^(\d{4})[\/.-](\d{1,2})[\/.-](\d{1,2})$/);
      if (ymd) {
        const normalized = `${ymd[1]}-${ymd[2].padStart(2, "0")}-${ymd[3].padStart(2, "0")}`;
        return isValidIsoDate(normalized) ? normalized : text;
      }
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
      if (/^\d{5,6}$/.test(text)) {
        const serial = Number(text);
        const date = new Date(Date.UTC(1899, 11, 30 + serial));
        const normalized = date.toISOString().slice(0, 10);
        return isValidIsoDate(normalized) ? normalized : text;
      }
      return text;
    }

    function parseDelimitedText(text) {
      const cleanText = String(text || "").replace(/^\uFEFF/, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
      if (!cleanText) throw new Error("文件里没有可导入的数据");
      const lines = cleanText.split("\n").filter((line) => line.trim());
      const delimiter = lines[0].includes("\t") ? "\t" : ",";
      const rawRows = lines.map((line) => splitDelimitedLine(line, delimiter));
      const headers = rawRows[0].map((x) => x.trim());
      const dataRows = rawRows.slice(1);
      const aliases = {
        nameZh: ["中文名", "商品中文名", "nameZh", "name_zh"],
        nameJa: ["日文名", "商品日文名", "nameJa", "name_ja"],
        barcode: ["条码", "barcode", "JAN"],
        storeName: ["店铺", "店铺名", "购买店铺", "store", "storeName"],
        priceTaxIn: ["税后价", "税后价格", "含税价格", "priceTaxIn"],
        priceTaxEx: ["税前价", "税前价格", "不含税价格", "priceTaxEx"],
        taxRate: ["税率", "taxRate"],
        specValue: ["规格", "规格数值", "spec", "specValue"],
        unit: ["单位", "规格单位", "unit"],
        recordDate: ["日期", "记录日期", "recordDate"],
        note: ["备注", "note"]
      };
      const indexOf = (keys) => headers.findIndex((header) => keys.some((key) => header.toLowerCase() === String(key).toLowerCase()));
      const indexes = Object.fromEntries(Object.entries(aliases).map(([key, keys]) => [key, indexOf(keys)]));
      return dataRows.flatMap((row, index) => {
        if (!hasUserData(row)) return [];
        return [{
          selected: true,
          sourceIndex: index + 2,
          nameZh: row[indexes.nameZh] || "",
          nameJa: row[indexes.nameJa] || "",
          barcode: row[indexes.barcode] || "",
          storeName: row[indexes.storeName] || "",
          priceTaxIn: row[indexes.priceTaxIn] || "",
          priceTaxEx: row[indexes.priceTaxEx] || "",
          taxRate: row[indexes.taxRate] || "8",
          specValue: row[indexes.specValue] || "",
          unit: row[indexes.unit] || "g",
          recordDate: normalizeDateInput(row[indexes.recordDate]) || today(),
          note: row[indexes.note] || ""
        }];
      });
    }

    function findStoreByName(name) {
      const keyword = String(name || "").trim().toLowerCase();
      if (!keyword) return null;
      const exact = state.stores.find((store) => String(store.name || "").toLowerCase() === keyword);
      return exact || state.stores.find((store) => String(store.name || "").toLowerCase().includes(keyword));
    }

    function toNumberOrNull(value) {
      const cleaned = String(value ?? "").replace(/[¥￥円,\s]/g, "");
      if (!cleaned) return null;
      const number = Number(cleaned);
      return Number.isFinite(number) ? number : null;
    }

    function validateImportRow(row) {
      const errors = [];
      if (!String(row.nameZh || "").trim() && !String(row.nameJa || "").trim()) {
        errors.push("商品名必填");
      }
      const store = findStoreByName(row.storeName);
      if (!store) errors.push("店铺未匹配");
      const priceTaxIn = toNumberOrNull(row.priceTaxIn);
      const priceTaxEx = toNumberOrNull(row.priceTaxEx);
      if ((!priceTaxIn || priceTaxIn <= 0) && (!priceTaxEx || priceTaxEx <= 0)) errors.push("价格必填");
      const specValue = toNumberOrNull(row.specValue);
      if (!specValue || specValue <= 0) errors.push("规格必填");
      if (!["g", "ml", "个", "pack"].includes(String(row.unit || "").trim())) errors.push("单位需为 g/ml/个/pack");
      if (!isValidIsoDate(row.recordDate)) errors.push("日期格式 YYYY-MM-DD");
      return { errors, store };
    }

    function renderImportPreview() {
      const body = $("importPreviewBody");
      body.innerHTML = state.importRows.map((row, index) => {
        const { errors } = validateImportRow(row);
        return `
          <tr data-index="${index}">
            <td><input type="checkbox" data-field="selected" ${row.selected ? "checked" : ""} /></td>
            <td><input data-field="nameZh" value="${escapeHtml(row.nameZh)}" /></td>
            <td><input data-field="nameJa" value="${escapeHtml(row.nameJa)}" /></td>
            <td><input data-field="barcode" value="${escapeHtml(row.barcode)}" /></td>
            <td><input data-field="storeName" list="storeOptions" value="${escapeHtml(row.storeName)}" /></td>
            <td><input data-field="priceTaxIn" inputmode="decimal" value="${escapeHtml(row.priceTaxIn)}" /></td>
            <td><input data-field="priceTaxEx" inputmode="decimal" value="${escapeHtml(row.priceTaxEx)}" /></td>
            <td><input data-field="taxRate" inputmode="decimal" value="${escapeHtml(row.taxRate)}" /></td>
            <td><input data-field="specValue" inputmode="decimal" value="${escapeHtml(row.specValue)}" /></td>
            <td>
              <select data-field="unit">
                ${["g", "ml", "个", "pack"].map((unit) => `<option value="${unit}" ${row.unit === unit ? "selected" : ""}>${unit}</option>`).join("")}
              </select>
            </td>
            <td><input data-field="recordDate" type="date" value="${escapeHtml(row.recordDate)}" /></td>
            <td><input data-field="note" value="${escapeHtml(row.note)}" /></td>
            <td>${errors.length ? `<div class="import-row-error">${escapeHtml(errors.join("；"))}</div>` : "可导入"}</td>
          </tr>
        `;
      }).join("");
      updateImportCount();
    }

    function updateImportCount() {
      const selected = state.importRows.filter((row) => row.selected).length;
      const invalid = state.importRows.filter((row) => row.selected && validateImportRow(row).errors.length).length;
      $("importCountText").textContent = `已选择 ${selected} 条${invalid ? `，其中 ${invalid} 条需要修改` : ""}`;
      $("selectAllImportRows").checked = selected > 0 && selected === state.importRows.length;
    }

    function openImportPreview(rows, fileName) {
      state.importRows = rows;
      $("importSummary").textContent = `已解析 ${rows.length} 条记录：${fileName || "导入文件"}。请检查店铺、价格、规格和日期，确认无误后再导入。`;
      renderImportPreview();
      $("importMask").classList.add("show");
    }

    function closeImportPreview() {
      $("importMask").classList.remove("show");
    }

    async function handleImportFile(file) {
      if (!file) return;
      if (/\.(xlsx|xls)$/i.test(file.name)) {
        notify("当前浏览器端导入请把 Excel 另存为 CSV 后再上传。模板会下载为 CSV。", "error", { sticky: true });
        return;
      }
      try {
        const text = await file.text();
        const rows = parseDelimitedText(text);
        if (!rows.length) throw new Error("没有解析到有效记录");
        openImportPreview(rows, file.name);
        notify("解析完成，请先预览确认。", "success");
      } catch (err) {
        notify(`导入解析失败：${err.message || "请检查模板格式"}`, "error");
      }
    }

    function buildImportPayload(row, store) {
      const taxRate = Number(toNumberOrNull(row.taxRate) ?? 8);
      const priceTaxIn = toNumberOrNull(row.priceTaxIn);
      const priceTaxEx = toNumberOrNull(row.priceTaxEx);
      const after = priceTaxIn || (priceTaxEx ? Math.round(priceTaxEx * (taxRate === 0 ? 1 : 1 + taxRate / 100) * 10) / 10 : null);
      const before = priceTaxEx || (priceTaxIn ? Math.round(priceTaxIn / (taxRate === 0 ? 1 : 1 + taxRate / 100) * 10) / 10 : null);
      return {
        product: {
          nameZh: String(row.nameZh || "").trim(),
          nameJa: String(row.nameJa || "").trim(),
          barcode: String(row.barcode || "").trim()
        },
        storeId: Number(store.id),
        priceTaxEx: before,
        taxRate,
        priceTaxIn: after,
        specValue: Number(toNumberOrNull(row.specValue)),
        unit: String(row.unit || "g").trim(),
        imageUrls: [],
        recordDate: row.recordDate,
        note: String(row.note || "").trim()
      };
    }

    async function commitImportRows() {
      const selected = state.importRows.filter((row) => row.selected);
      if (!selected.length) {
        notify("请至少选择一条记录。", "error");
        return;
      }
      const checks = selected.map((row) => ({ row, ...validateImportRow(row) }));
      const invalid = checks.filter((item) => item.errors.length);
      if (invalid.length) {
        renderImportPreview();
        notify(`还有 ${invalid.length} 条记录需要修改后才能导入。`, "error");
        return;
      }

      $("commitImportRows").disabled = true;
      let success = 0;
      try {
        for (const item of checks) {
          const res = await fetch("/api/price-records", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(buildImportPayload(item.row, item.store))
          });
          const data = await res.json();
          if (!res.ok) throw new Error(`第 ${item.row.sourceIndex} 行导入失败：${data.error || "未知错误"}`);
          success += 1;
        }
        closeImportPreview();
        notify(`已导入 ${success} 条价格记录。`, "success", { duration: 3600 });
      } catch (err) {
        notify(err.message || "导入失败", "error", { sticky: true });
      } finally {
        $("commitImportRows").disabled = false;
      }
    }

    async function compressImageFile(file) {
      if (!file || !file.type.startsWith("image/")) throw new Error("请选择图片文件");
      if (file.size > 8 * 1024 * 1024) throw new Error("原图超过 8MB，请先裁剪或压缩后再上传");
      const bitmap = await createImageBitmap(file);
      const maxSide = 900;
      const scale = Math.min(1, maxSide / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * scale));
      const height = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0, width, height);
      for (const quality of [0.78, 0.68, 0.58]) {
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        if (dataUrl.length < 900 * 1024) return dataUrl;
      }
      throw new Error("压缩后仍然太大，请裁剪图片后再上传");
    }

    function calc() {
      const before = Number($("priceBeforeTax").value || 0);
      const spec = Number($("spec").value || 0);
      const taxRate = state.taxMode / 100;
      const after = before * (state.taxMode === 0 ? 1 : (1 + taxRate));

      let unitPrice = 0;
      let unitLabel = " / 100g";
      if (spec > 0) {
        if (state.unit === "g" || state.unit === "ml") {
          unitPrice = (after / spec) * 100;
          unitLabel = state.unit === "g" ? " / 100g" : " / 100ml";
        } else {
          unitPrice = after / spec;
          unitLabel = ` / ${state.unit}`;
        }
      }

      $("priceAfterTaxInput").value = `¥${round1(after).toFixed(1)}`;
      $("unitPrice").textContent = `¥${round1(unitPrice).toFixed(1)}${unitLabel}`;
      return { before, after: round1(after) };
    }

    function normalizeExpression(value) {
      return String(value || "")
        .replace(/[×xX]/g, "*")
        .replace(/[÷]/g, "/")
        .replace(/[（）]/g, (ch) => ch === "（" ? "(" : ")")
        .replace(/(pack|kg|g|克|ml|毫升|個|个)/gi, "")
        .replace(/,/g, "")
        .trim();
    }

    function evaluateExpression(value) {
      const expression = normalizeExpression(value);
      if (!expression) throw new Error("请输入算式");
      if (!/^[0-9+\-*/().\s]+$/.test(expression)) {
        throw new Error("只支持数字和 + - × ÷ ( )");
      }
      const result = Function(`"use strict"; return (${expression});`)();
      if (!Number.isFinite(result) || result <= 0) throw new Error("结果必须大于 0");
      return result;
    }

    function formatNumber(value) {
      return Number.isInteger(value)
        ? String(value)
        : String(Math.round(value * 100) / 100).replace(/\.?0+$/, "");
    }

    function updateCalcResult() {
      try {
        const value = evaluateExpression($("calcExpression").value);
        $("calcResult").textContent = `结果：${formatNumber(value)}`;
      } catch (err) {
        $("calcResult").textContent = err.message || "输入算式后应用到规格数值";
      }
    }

    function openSpecCalculator() {

      } catch (err) {
        $("calcResult").textContent = err.message || "无法计算";
      }
    }

    function matchStoreByInput() {

      if (!matched) {

    function normalizeQuickText(value) {
      return String(value || "").replace(/[，、。]/g, " ").replace(/\s+/g, " ").trim();
    }

    function parseQuickFill(text) {
      const raw = normalizeQuickText(text);
      if (!raw) throw new Error("请输入商品、价格、店铺和规格。");

      const specMatch = raw.match(/(\d+(?:\.\d+)?)\s*(pack|kg|g|克|ml|毫升|個|个)/i);
      const textWithoutSpec = specMatch ? raw.replace(specMatch[0], " ") : raw;
      const priceMatch = textWithoutSpec.match(/(?:¥|￥)?\s*(\d+(?:\.\d+)?)\s*(?:円|日元|元)?/);
      const store = state.stores.find((item) => {
        const name = String(item.name || "").toLowerCase();
        const chain = String(item.chainBrand || "").toLowerCase();
        const lowered = raw.toLowerCase();
        return lowered.includes(name) || (chain && lowered.includes(chain));
      });

      let name = raw;
      if (specMatch) name = name.replace(specMatch[0], " ");
      if (priceMatch) name = name.replace(priceMatch[0], " ");
      if (store) {
        name = name.replace(new RegExp(store.name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i"), " ");
        if (store.chainBrand) {
          name = name.replace(new RegExp(String(store.chainBrand).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i"), " ");
        }
      }
      name = normalizeQuickText(name).replace(/多少钱|价格|店铺|规格/g, "").trim();

      if (!name) throw new Error("没有识别到商品名。");
      if (!priceMatch) throw new Error("没有识别到价格。");
      if (!specMatch) throw new Error("没有识别到规格。");

      let specValue = Number(specMatch[1]);
      let unit = specMatch[2].toLowerCase();
      if (unit === "kg") {
        specValue *= 1000;
        unit = "g";
      }
      if (unit === "克") unit = "g";
      if (unit === "毫升") unit = "ml";
      if (unit === "個") unit = "个";

      return {
        name,
        priceTaxIn: Number(priceMatch[1]),
        specValue,
        unit,
        store
      };
    }

    function applyQuickFillText() {
      try {
        const parsed = parseQuickFill($("quickText").value);
        $("nameZh").value = parsed.name;
        $("spec").value = parsed.specValue;
        state.unit = parsed.unit;
        $("unitSegment").querySelectorAll("button").forEach((b) => {

        const taxFactor = state.taxMode === 0 ? 1 : 1 + state.taxMode / 100;
        $("priceBeforeTax").value = (parsed.priceTaxIn / taxFactor).toFixed(1);
        calc();
        scheduleDuplicateCheck();
        $("quickHint").textContent = "已填入，可继续修改或补照片。";

      }
    }

    function stopScanner() {
      if (state.scanTimer) {
        clearInterval(state.scanTimer);
        state.scanTimer = null;
      }
      if (state.zxingControls) {
        try {
          state.zxingControls.stop();
        } catch (_) {
          // ignore cleanup errors
        }
        state.zxingControls = null;
      }
      if (state.scanStream) {
        state.scanStream.getTracks().forEach((t) => t.stop());
        state.scanStream = null;
      }
      $("scannerVideo").srcObject = null;
      $("scannerMask").style.display = "none";
    }

    async function openScanner() {
      if (!navigator.mediaDevices?.getUserMedia) {
        notify("当前浏览器无法调用摄像头。请确认使用 https 页面，并允许相机权限。", "error");
        return;
      }
      if (!("BarcodeDetector" in window)) {
        await openZxingScanner();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        state.scanStream = stream;
        $("scannerVideo").srcObject = stream;
        $("scannerMask").style.display = "flex";
        $("scannerHint").textContent = "将条码放入画面中央";

        if (!state.scanner) {
          state.scanner = new BarcodeDetector({
            formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128", "code_39"]
          });
        }

        state.scanTimer = setInterval(async () => {
          if (!$("scannerVideo").srcObject) return;
          try {
            const codes = await state.scanner.detect($("scannerVideo"));
            if (!codes.length) return;
            state.barcode = String(codes[0].rawValue || "").trim();
            if (!state.barcode) return;
            updateBarcodeNote();
            checkBarcodeProduct();
            $("scannerHint").textContent = `已识别：${state.barcode}`;
            stopScanner();
          } catch (_) {
            // ignore scanning frame errors
          }
        }, 280);
      } catch (err) {
        notify(`无法打开摄像头：${err.message || "请检查权限"}`, "error");
        stopScanner();
      }
    }

    async function openZxingScanner() {
      try {
        $("scannerMask").style.display = "flex";
        $("scannerHint").textContent = "正在加载扫码组件...";
        await loadZxing();
        if (!window.ZXingBrowser?.BrowserMultiFormatReader) {
          throw new Error("扫码组件加载失败");
        }

        const reader = new window.ZXingBrowser.BrowserMultiFormatReader();
        const video = $("scannerVideo");
        $("scannerHint").textContent = "将条码放入画面中央，尽量横向对齐";

        const onResult = (result) => {
          const value = String(result?.getText?.() || result?.text || "").trim();
          if (!value) return;
          state.barcode = value;
          updateBarcodeNote();
          checkBarcodeProduct();
          $("scannerHint").textContent = `已识别：${state.barcode}`;
          stopScanner();
        };

        if (reader.decodeFromConstraints) {
          state.zxingControls = await reader.decodeFromConstraints(
            {
              video: {
                facingMode: { ideal: "environment" },
                width: { ideal: 1280 },
                height: { ideal: 720 }
              },
              audio: false
            },
            video,
            (result) => {
              if (result) onResult(result);
            }
          );
        } else {
          state.zxingControls = await reader.decodeFromVideoDevice(
            undefined,
            video,
            (result) => {
              if (result) onResult(result);
            }
          );
        }
      } catch (err) {
        notify(`无法启动扫码：${err.message || "请检查相机权限"}`, "error");
        stopScanner();
      }
    }

    function loadZxing() {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return Promise.resolve();
      if (state.zxingPromise) return state.zxingPromise;
      state.zxingPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "/vendor/zxing-browser.min.js";
        script.async = true;
        script.onload = () => {
          if (window.ZXingBrowser?.BrowserMultiFormatReader) {
            resolve();
          } else {
            reject(new Error("扫码组件加载异常"));
          }
        };
        script.onerror = () => reject(new Error("无法加载本地扫码组件"));
        document.head.append(script);
      });
      return state.zxingPromise;
    }

    $("closeExistingProduct").onclick = () => {
      $("msg").textContent = "未带入旧规格，但同条码保存时仍会归到已有商品。";
      closeExistingProductPrompt();
    };
    $("existingMask").addEventListener("click", (e) => {
      if (e.target === $("existingMask")) closeExistingProductPrompt();
    });
    $("openSpecCalc").onclick = openSpecCalculator;
    $("closeSpecCalc").onclick = closeSpecCalculator;
    $("applySpecCalc").onclick = applySpecCalculator;
    $("calcExpression").addEventListener("input", updateCalcResult);
    $("calcExpression").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        applySpecCalculator();
      }
    });
    $("calcMask").addEventListener("click", (e) => {
      if (e.target === $("calcMask")) closeSpecCalculator();
    });
    $("calcMask").querySelectorAll("[data-calc-key], [data-calc-op], [data-calc-action]").forEach((btn) => {
      btn.onclick = () => {
        const action = btn.dataset.calcAction;
        if (action === "back") {
          $("calcExpression").value = $("calcExpression").value.slice(0, -1);
        } else {
          $("calcExpression").value += btn.dataset.calcKey || btn.dataset.calcOp || "";
        }
        updateCalcResult();
        $("calcExpression").focus();
      };
    });
    $("quickMask").addEventListener("click", (e) => {
      if (e.target === $("quickMask")) $("quickMask").style.display = "none";
    });
    $("scanBtn").onclick = handleScanClick;
    $("rescanBtn").onclick = handleScanClick;
    $("closeScanner").onclick = stopScanner;
    $("scannerMask").addEventListener("click", (e) => {
      if (e.target === $("scannerMask")) stopScanner();
    });
    $("uploadBox").onclick = openSheet;
    $("storeId").addEventListener("change", applyTaxStoreLinkByStore);
    $("storeSearch").addEventListener("input", () => {
      const matched = matchStoreByInput();
      if (matched) applyTaxStoreLinkByStore();
    });
    $("storeSearch").addEventListener("blur", () => {
      const matched = matchStoreByInput();
      if (matched) {
        $("storeSearch").value = matched.name;
        applyTaxStoreLinkByStore();
      }
    });
    $("promoSegment").querySelectorAll("button").forEach((btn) => {
      btn.onclick = () => setPromoMode(btn.dataset.promo === "1");
    });
    $("uploadBox").addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openSheet();
      }
    });

    $("sheetMask").addEventListener("click", (e) => {
      if (e.target === $("sheetMask")) closeSheet();
    });
    $("cancelSheet").onclick = closeSheet;
    $("takePhoto").onclick = () => pickImage("camera");
    $("pickPhoto").onclick = () => pickImage("album");

    $("imageFile").onchange = async (e) => {
      const files = Array.from(e.target.files || []).slice(0, 4);
      if (!files.length) return;
      $("msg").textContent = "正在压缩图片...";
      try {
        state.imageDataUrls = [];
        for (const file of files) {
          state.imageDataUrls.push(window.cropAndCompressImageFile ? await window.cropAndCompressImageFile(file) : await compressImageFile(file));
        }
        $("previewImg").src = state.imageDataUrls[0];
        $("previewImg").style.display = "block";
        $("uploadText").style.display = "none";
        $("uploadBox").classList.add("has-image");
        $("msg").textContent = `已选择 ${state.imageDataUrls.length} 张图片。`;
      } catch (err) {
        notify(`图片处理失败：${err.message || "请重试"}`, "error");
      } finally {
        e.target.value = "";
      }
    };

    $("nameZh").addEventListener("input", scheduleDuplicateCheck);
    $("nameJa").addEventListener("input", scheduleDuplicateCheck);
    ["priceBeforeTax", "spec"].forEach((id) => $(id).addEventListener("input", calc));
    bindSegment("taxSegment", "taxMode");
    bindSegment("unitSegment", "unit");

    $("form").onsubmit = async (e) => {
      e.preventDefault();
      const { before, after } = calc();
      const matchedStore = matchStoreByInput();

      if (!matchedStore || !$("storeId").value) {
        notify("请先选择购买店铺。", "error");
        return;
      }
      if (!$("nameZh").value.trim() && !$("nameJa").value.trim()) {
        notify("请至少填写中文名或日文名。", "error");
        return;
      }

      const payload = {
        product: state.selectedProductId
          ? { id: state.selectedProductId }
          : {
            nameZh: $("nameZh").value.trim(),
            nameJa: $("nameJa").value.trim(),
            barcode: state.barcode
          },
        storeId: Number($("storeId").value),
        priceTaxEx: before,
        taxRate: state.taxMode,
        priceTaxIn: after,
        specValue: Number($("spec").value),
        unit: state.unit,
        imageUrls: state.imageDataUrls,
        recordDate: $("recordDate").value,
        note: buildPromoNote($("note").value, state.isPromo, $("promoUntil").value)
      };

      const res = await fetch("/api/price-records", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        notify(`保存失败：${data.error || "未知错误"}`, "error");
        return;
      }

      $("msg").textContent = "保存成功，正在返回清单页...";
      notify("保存成功，正在返回清单页...", "success");
      setTimeout(() => {
        location.href = "products";
      }, 700);
    };

    $("recordDate").value = today();
    setPromoMode(false);
    loadStores();
    updateBarcodeNote();
    calc();

    setupSwipeNav();

    function setupSwipeNav() {
      const nav = document.querySelector("nav[data-active]");
      if (!nav) return;
      let startX = 0;
      let startY = 0;
      nav.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        startX = touch.clientX;
        startY = touch.clientY;
      }, { passive: true });
      nav.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        if (Math.abs(dx) < 38 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
        const links = Array.from(nav.querySelectorAll("a"));
        const current = links.findIndex((link) => link.classList.contains("active"));
        const next = dx < 0 ? current + 1 : current - 1;
        if (next >= 0 && next < links.length) {
          location.href = links[next].getAttribute("href");
        }
      }, { passive: true });
    }
  </script>
  <script src="auth-nav.js"></script>
</body>
</html>
