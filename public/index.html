<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📋 商品比价清单</title>
  <style>
    :root {
      --primary: #00b894;
      --bg: #f4f7f6;
      --danger: #ff7675;
      --warn: #ffce00;
      --text: #2d3436;
      --muted: #b2bec3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 12px;
    }
    .app { max-width: 460px; margin: 0 auto; }
    .header {
      background: var(--primary);
      color: #fff;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,184,148,.2);
      font-weight: 700;
    }
    .search-row { display: grid; grid-template-columns: 1fr 44px; gap: 8px; margin-top: 10px; }
    .search-row input {
      border: none; border-radius: 999px; padding: 12px 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,.06); outline: none;
    }
    .scan {
      border: none; border-radius: 999px;
      background: #fff; box-shadow: 0 6px 16px rgba(0,0,0,.06);
      font-size: 18px;
    }
    .list { margin-top: 10px; }
    .card {
      position: relative;
      display: flex;
      gap: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0 6px 16px rgba(15,23,42,.05);
      cursor: pointer;
    }
    .card.lowest { border: 2px solid var(--primary); }
    .crown {
      position: absolute; left: -6px; top: -6px;
      background: var(--warn);
      border-radius: 999px;
      font-size: 12px;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .img {
      width: 80px; height: 80px;
      border-radius: 12px;
      background: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      color: #94a3b8;
      font-size: 24px;
    }
    .img img { width: 100%; height: 100%; object-fit: contain; }
    .content { flex: 1; min-width: 0; }
    .title { font-weight: 700; font-size: 15px; }
    .sub { color: #64748b; font-size: 12px; margin-top: 2px; }
    .price { font-size: 22px; color: var(--danger); font-weight: 700; margin-top: 6px; }
    .unit-price { font-size: 14px; margin-top: 2px; }
    .unit-price.low { color: var(--primary); font-weight: 700; }
    .unit-price.high { color: var(--danger); font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .promo {
      position: absolute;
      right: 10px; top: 10px;
      background: var(--danger);
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
    }
    nav { margin-top: 6px; text-align: center; font-size: 13px; }
    nav a { color: #64748b; margin: 0 10px; text-decoration: none; }

    .modal-mask {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 10px;
      z-index: 20;
    }
    .modal {
      width: 92%; max-width: 420px;
      background: #fff;
      border-radius: 30px;
      overflow: hidden;
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal-img {
      height: 240px;
      background: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8;
      font-size: 30px;
      position: relative;
    }
    .close {
      position: absolute; right: 10px; top: 10px;
      border: none; border-radius: 999px;
      width: 34px; height: 34px;
      background: rgba(0,0,0,.4); color: #fff;
    }
    .modal-body { padding: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item { background: #f8fafc; border-radius: 10px; padding: 8px; }
    .label { color: #94a3b8; font-size: 12px; }
    .value { font-weight: 700; margin-top: 2px; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn { border: none; border-radius: 10px; padding: 11px; font-weight: 700; }
    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .btn-primary { background: #dcfce7; color: #047857; }
    .empty { text-align: center; color: #94a3b8; padding: 36px 0; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">📋 商品比价清单</div>

    <div class="search-row">
      <input id="q" placeholder="搜索名称、超市或条码" />
      <button id="scanSearch" class="scan">📷</button>
    </div>

    <div id="list" class="list"></div>

    <nav>
      <a href="/index.html">📋 清单</a>
      <a href="/add.html">🛒 录入</a>
      <a href="/stores.html">🏬 店铺</a>
    </nav>
  </div>

  <div id="mask" class="modal-mask">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let cache = [];

    $('scanSearch').onclick = () => alert('扫码搜索下一版接入，当前可用文本搜索');

    function unitPriceClass(price, minPrice) {
      if (price === minPrice) return 'low';
      if (price > minPrice * 1.3) return 'high';
      return '';
    }

    async function load() {
      const q = $('q').value.trim();
      const data = await fetch('/api/products' + (q ? `?q=${encodeURIComponent(q)}` : '')).then(r => r.json());
      cache = data.slice().sort((a, b) => (a.lowestUnitPrice ?? Infinity) - (b.lowestUnitPrice ?? Infinity));

      const list = $('list');
      if (!cache.length) {
        list.innerHTML = `<div class="empty">未找到商品，去录入第一条价格记录吧</div>`;
        return;
      }

      const globalMin = Math.min(...cache.map(x => x.lowestUnitPrice || Infinity));

      list.innerHTML = cache.map((item, idx) => {
        const isLowest = item.lowestUnitPrice === globalMin;
        const promo = (item.latestPriceTaxIn || 0) < 200;
        return `
          <div class="card ${isLowest ? 'lowest' : ''}" onclick="openDetail(${item.productId})">
            ${isLowest ? '<div class="crown">👑</div>' : ''}
            ${promo ? '<div class="promo">优惠</div>' : ''}
            <div class="img">
              ${item.defaultImageUrl ? `<img src="${item.defaultImageUrl}" alt="商品图" />` : '📷'}
            </div>
            <div class="content">
              <div class="title">${item.nameZh || item.nameJa || '未命名商品'}</div>
              <div class="sub">最低店铺：${item.lowestStoreName || '-'}</div>
              <div class="price">¥${(item.latestPriceTaxIn ?? '-')}</div>
              <div class="unit-price ${unitPriceClass(item.lowestUnitPrice || 0, globalMin)}">${item.lowestUnitPrice ?? '-'} ${item.lowestUnitPriceLabel || ''}</div>
              <div class="meta">${item.latestRecordDate || '-'} </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function openDetail(id) {
      const res = await fetch('/api/products/' + id);
      const data = await res.json();
      if (!res.ok) return alert(data.error || '加载失败');

      const top = data.records?.[0] || {};
      const modal = $('modal');
      modal.innerHTML = `
        <div class="modal-img">
          ${data.product.defaultImageUrl ? `<img src="${data.product.defaultImageUrl}" style="max-width:100%;max-height:100%;object-fit:contain" />` : '无图片展示'}
          <button class="close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <h3 style="margin:0 0 10px">${data.product.nameZh || data.product.nameJa || '未命名商品'} ${data.overview.lowestUnitPrice ? '👑 全场最省' : ''}</h3>
          <div class="grid">
            <div class="item"><div class="label">税后总价</div><div class="value">¥${top.priceTaxIn ?? '-'}</div></div>
            <div class="item"><div class="label">对比单价</div><div class="value">${top.unitPrice ?? '-'} ${top.unitPriceLabel ?? ''}</div></div>
            <div class="item"><div class="label">规格</div><div class="value">${top.specValue ?? '-'} ${top.unit ?? ''}</div></div>
            <div class="item"><div class="label">购买超市</div><div class="value">${top.storeName ?? '-'}</div></div>
            <div class="item"><div class="label">条码</div><div class="value">${data.product.barcode || '-'}</div></div>
            <div class="item"><div class="label">记录时间</div><div class="value">${top.recordDate || '-'}</div></div>
          </div>

          <div class="actions">
            <button class="btn btn-danger" onclick="alert('删除功能下一版开放')">🗑️ 删除</button>
            <button class="btn btn-primary" onclick="alert('编辑功能下一版开放')">✏️ 编辑资料</button>
          </div>
        </div>
      `;
      $('mask').style.display = 'flex';
    }

    function closeModal() { $('mask').style.display = 'none'; }
    window.openDetail = openDetail;
    window.closeModal = closeModal;

    $('q').addEventListener('input', load);
    load();
  </script>
</body>
</html>
