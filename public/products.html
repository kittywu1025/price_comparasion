<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>价格比价清单</title>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #ffffff;
      --surface-soft: #f8fbfa;
      --line: #dce7e3;
      --text: #1f2a2b;
      --muted: #637674;
      --primary: #0d9a7d;
      --primary-soft: #e2f7f1;
      --danger: #d84343;
      --warning: #bf7f00;
      --shadow: 0 14px 28px rgba(14, 63, 56, 0.1);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 0%, #d7f6ed 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #d8eef8 0, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "SF Pro Text", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        calc(88px + env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
    }

    .app {
      width: min(960px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .hero {
      background: linear-gradient(140deg, #1aaf90, #0a7f69);
      border-radius: var(--radius-lg);
      color: #fff;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }

    .scan-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .batch-entry {
      height: 42px;
      border: 0;
      border-radius: 999px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .search-wrap {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search-wrap input {
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    .search-wrap input::placeholder {
      color: rgba(255, 255, 255, 0.75);
    }

    .search-scope {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      border-radius: 999px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .search-scope button {
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .search-scope button.active {
      background: #fff;
      color: #0b7d67;
    }

    .chip {
      height: 44px;
      border-radius: 999px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      min-width: 0;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 10px;
      box-shadow: 0 6px 12px rgba(12, 48, 42, 0.05);
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .card:active {
      transform: translateY(1px);
    }

    .card.best {
      border-color: #9dd8c9;
      box-shadow: 0 8px 18px rgba(12, 107, 89, 0.16);
      background: linear-gradient(180deg, #ffffff, #f3fbf8);
    }

    .card.selecting {
      padding-left: 42px;
    }

    .card.selected {
      border-color: #0d9a7d;
      box-shadow: 0 10px 22px rgba(13, 154, 125, 0.18);
    }

    .select-dot {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid #b9c9c5;
      background: #fff;
      display: none;
      place-items: center;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      z-index: 3;
    }

    .card.selecting .select-dot {
      display: grid;
    }

    .card.selected .select-dot {
      border-color: #0d8f76;
      background: #0d8f76;
    }

    .flags {
      position: absolute;
      top: 10px;
      right: 10px;
      display: grid;
      gap: 4px;
      justify-items: end;
      z-index: 2;
    }

    .flag {
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      line-height: 1.2;
    }

    .flag.best {
      background: var(--primary-soft);
      color: #04664f;
    }

    .flag.same {
      background: #eef4ff;
      color: #265f9a;
    }

    .flag.low {
      background: #fff4da;
      color: var(--warning);
    }

    .thumb {
      width: 78px;
      height: 78px;
      border-radius: var(--radius-sm);
      border: 1px solid #e6efec;
      background: #fbfefd;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #95a6a2;
      font-size: 13px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .info {
      min-width: 0;
    }

    .name {
      font-size: 16px;
      line-height: 1.3;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .name-sub {
      margin-top: 2px;
      color: #5c706d;
      font-size: 12px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .price-row {
      margin-top: 7px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .price {
      color: var(--danger);
      font-size: 23px;
      font-weight: 700;
      line-height: 1;
    }

    .unit {
      font-size: 13px;
      font-weight: 600;
      color: #4f605f;
      word-break: break-word;
    }

    .unit.best {
      color: #0d7a63;
    }

    .unit.bad {
      color: #b43f3f;
    }

    .empty {
      position: relative;
      text-align: center;
      font-size: 14px;
      color: #4d6762;
      padding: 40px 12px;
      background: var(--surface);
      border: 1px dashed #c8d8d3;
      border-radius: var(--radius-md);
      cursor: pointer;
      overflow: hidden;
      min-height: 104px;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.04);
    }

    .empty::before {
      content: "+";
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -52%);
      color: rgba(13, 154, 125, 0.08);
      font-size: 96px;
      line-height: 1;
      font-weight: 800;
      z-index: 0;
    }

    .empty span {
      position: relative;
      z-index: 1;
      font-weight: 700;
    }

    .empty:active {
      transform: translateY(1px);
    }

    nav {
      --active-index: 1;
      position: fixed;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8e7e1;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(13, 60, 51, 0.1);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    nav::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 20%;
      border-radius: 999px;
      background: #e9f7f3;
      transform: translateX(calc(var(--active-index) * 100%));
      transition: transform 0.22s ease;
      z-index: 0;
    }

    nav[data-active="home"] { --active-index: 0; }
    nav[data-active="list"] { --active-index: 1; }
    nav[data-active="add"] { --active-index: 2; }
    nav[data-active="stores"] { --active-index: 3; }
    nav[data-active="profile"] { --active-index: 4; }

    nav a {
      position: relative;
      z-index: 1;
      text-align: center;
      text-decoration: none;
      color: #4f6562;
      font-size: 12px;
      line-height: 44px;
      height: 44px;
      font-weight: 600;
      transition: color 0.18s ease;
    }

    nav a.active {
      background: transparent;
      color: #0c8f72;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(7, 19, 18, 0.46);
      backdrop-filter: blur(6px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 30;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .modal {
      position: relative;
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      max-height: calc(100vh - 24px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      max-height: calc(100dvh - 24px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      overflow-y: auto;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .modal-close-fixed {
      position: sticky;
      top: 10px;
      margin: 10px 10px -42px auto;
      z-index: 5;
      display: block;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: rgba(31, 42, 43, 0.68);
      color: #fff;
      font-size: 18px;
      line-height: 32px;
      cursor: pointer;
    }

    .modal-head {
      position: relative;
      padding: 14px 14px 0;
    }

    .modal-head-actions {
      position: absolute;
      top: 14px;
      right: 58px;
      z-index: 4;
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
    }

    .modal-icon-btn {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 999px;
      background: #eef7f4;
      color: #0c765f;
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.08);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 19px;
      font-weight: 900;
      line-height: 1;
    }

    .modal-icon-btn.primary {
      background: #0d9a7d;
      color: #fff;
    }

    .modal-icon-btn svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-product-head {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 96px;
    }

    .modal-head.hidden,
    .detail-view.hidden {
      display: none;
    }

    .modal-img {
      height: 132px;
      border: 1px solid #e4efeb;
      border-radius: 14px;
      background: #f5faf8;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #8ca09c;
      font-size: 14px;
    }

    .modal-img.compact {
      width: 96px;
      height: 96px;
      margin: 0;
    }

    .modal-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: rgba(31, 42, 43, 0.56);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .modal-body {
      padding: 14px;
    }

    .modal-title {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.3;
      word-break: break-word;
    }

    .modal-name-stack {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .modal-name-zh {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 800;
      word-break: break-word;
    }

    .modal-name-ja {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
      font-weight: 700;
      word-break: break-word;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid #e4efeb;
      border-radius: 12px;
      padding: 10px;
      background: var(--surface-soft);
    }

    .stat-k {
      margin: 0;
      font-size: 12px;
      color: #607371;
    }

    .stat-v {
      margin: 4px 0 0;
      font-size: 14px;
      color: #183132;
      font-weight: 700;
      word-break: break-word;
    }

    .detail-section {
      margin-top: 12px;
    }

    .detail-section-title {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: #4f6562;
    }

    .detail-note {
      border: 1px solid #e4efeb;
      border-radius: 12px;
      background: #f8fcfb;
      padding: 11px 12px;
      color: #314748;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .detail-note.empty {
      color: #7a8b89;
    }

    .trend-card {
      border: 1px solid #e4efeb;
      border-radius: 12px;
      background: #f8fcfb;
      padding: 10px;
    }

    .trend-card svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .trend-empty {
      color: #708280;
      font-size: 13px;
      padding: 16px 0;
      text-align: center;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-row {
      border: 1px solid #e4efeb;
      border-radius: 12px;
      background: #fff;
      padding: 9px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .history-row[data-record-id] {
      cursor: pointer;
    }

    .history-date {
      font-size: 13px;
      font-weight: 700;
      color: #1f2a2b;
    }

    .history-actor {
      margin-top: 3px;
      color: #607371;
      font-size: 12px;
      word-break: break-word;
    }

    .history-meta {
      margin-top: 3px;
      color: #607371;
      font-size: 12px;
      word-break: break-word;
    }

    .history-price {
      text-align: right;
      color: #0a826b;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .history-total {
      margin-top: 3px;
      color: #607371;
      font-size: 12px;
      font-weight: 600;
    }

    .store-rank-list {
      display: grid;
      gap: 8px;
    }

    .store-rank-row {
      border: 1px solid #e4efeb;
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      cursor: pointer;
    }

    .store-rank-row.best {
      border-color: #9dd8c9;
      background: #f4fbf8;
    }

    .store-rank-name {
      font-size: 14px;
      font-weight: 700;
      color: #1f2a2b;
      word-break: break-word;
    }

    .store-rank-meta {
      margin-top: 4px;
      color: #607371;
      font-size: 12px;
      word-break: break-word;
    }

    .store-rank-price {
      text-align: right;
      color: #0a826b;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }

    .rank-badge {
      display: inline-block;
      margin-left: 6px;
      border-radius: 999px;
      background: #e2f7f1;
      color: #04664f;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      vertical-align: middle;
    }

    .trend-filter-row {
      margin-bottom: 8px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .trend-filter {
      height: 32px;
      border: 1px solid #dce7e3;
      border-radius: 999px;
      background: #fff;
      color: #4f6562;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .trend-filter.active {
      border-color: #9dd8c9;
      background: #e9f7f3;
      color: #0c765f;
    }

    .edit-grid {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .edit-form {
      display: none;
    }

    .edit-form.active {
      display: block;
    }

    .edit-mode-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
      color: #1f2a2b;
    }

    .edit-top {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .edit-photo {
      min-height: 108px;
      border: 1px dashed #b9cdc7;
      border-radius: 12px;
      background: #f7fbfa;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      color: #708280;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
    }

    .edit-photo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    .edit-photo.has-image {
      border-style: solid;
    }

    .edit-photo-tip {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      color: #fff;
      background: rgba(21, 32, 32, 0.58);
      white-space: nowrap;
    }

    .edit-photo-tools {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .edit-photo-tools button {
      height: 34px;
      border: 1px solid #d4e4df;
      border-radius: 10px;
      background: #fff;
      color: #185d52;
      font-weight: 700;
      cursor: pointer;
    }

    .edit-photo-strip {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }

    .edit-photo-strip img {
      width: 46px;
      height: 46px;
      border: 1px solid #dcebe6;
      border-radius: 8px;
      object-fit: cover;
      background: #fff;
      flex: 0 0 auto;
    }

    .edit-name-stack {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .edit-group {
      margin-top: 10px;
      border: 1px solid #dcebe6;
      border-radius: 14px;
      background: #f8fcfb;
      padding: 9px;
      display: grid;
      gap: 8px;
    }

    .edit-group-title {
      margin: 0;
      font-size: 12px;
      color: #5f7370;
      font-weight: 700;
    }

    .edit-inline-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .edit-field label {
      display: block;
      margin: 0 0 4px;
      color: #607371;
      font-size: 12px;
    }

    .edit-field input,
    .edit-field select {
      width: 100%;
      height: 36px;
      border: 1px solid #d7e5e1;
      border-radius: 9px;
      padding: 0 10px;
      font-size: 13px;
      color: #163031;
      background: #fff;
      outline: none;
    }

    .edit-field input[readonly] {
      background: #f7fbfa;
    }

    .edit-barcode-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .edit-barcode-display {
      min-width: 0;
      height: 36px;
      border: 1px solid #d7e5e1;
      border-radius: 9px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      color: #163031;
      background: #f7fbfa;
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .edit-barcode-scan {
      height: 36px;
      border: 0;
      border-radius: 9px;
      padding: 0 12px;
      background: var(--primary-soft);

      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .edit-segment {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 5px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f5f9f8;
    }

    .edit-segment button {
      height: 32px;
      border-radius: 9px;
      border: 0;
      background: transparent;
      color: #4d6160;
      cursor: pointer;
      min-width: 0;
      font-size: 13px;
    }

    .edit-segment button.active {
      background: #fff;
      color: #0b7f68;
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(17, 69, 60, 0.08);
    }

    .edit-unit-preview {
      margin-top: 10px;
      border: 1px solid #dcebe6;
      border-radius: 12px;
      background: #f8fcfb;
      padding: 10px;
    }

    .edit-unit-preview p {
      margin: 0;
    }

    .edit-unit-preview .k {
      color: #627674;
      font-size: 12px;
    }

    .edit-unit-preview .v {
      margin-top: 4px;
      color: #0a826b;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      word-break: break-word;
    }

    .modal-actions {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }

    .btn {
      height: 38px;
      border: 0;
      border-radius: 10px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .btn-primary {
      background: #0d9a7d;
      color: #fff;
    }

    .btn-light {
      background: #edf6f3;
      color: #1b5c51;
    }

    .btn-danger {
      background: #feecec;
      color: #b53939;
    }

    .btn:disabled {

      opacity: 0.52;
    }

    .modal-msg {
      margin-top: 8px;
      font-size: 12px;

    .scanner-mask {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(6, 18, 17, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .scanner {
      width: min(420px, 100%);
      border-radius: 18px;

      background: #10211f;

      box-shadow: var(--shadow);
    }

    .scanner-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      font-weight: 700;
    }

    .scanner-head button {
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      width: 32px;
      height: 32px;
      cursor: pointer;
    }

    .scanner video {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #000;
      display: block;
    }

    .scanner-foot {
      padding: 10px 14px 14px;

    .batch-bar {
      position: fixed;
      left: 50%;
      bottom: calc(74px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 30;
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      min-height: 54px;
      border: 1px solid #d8e7e1;

      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 14px 28px rgba(12, 48, 42, 0.12);
      padding: 8px;
      display: none;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .batch-bar.show {
      display: grid;
    }

    .batch-bar button {
      height: 38px;
      border: 0;
      border-radius: 12px;
      padding: 0 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .batch-count {
      color: #607371;
      font-size: 12px;
      font-weight: 700;
      min-width: 0;
    }

    .batch-select-all,
    .batch-cancel {
      background: #edf6f3;
      color: #185d52;
    }

    .batch-edit {
      background: #0d9a7d;
      color: #fff;
    }

    .batch-edit:disabled,
    .batch-form-apply:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .batch-sheet-mask {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(7, 19, 18, 0.45);
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .batch-sheet-mask.show {
      display: flex;
    }

    .batch-sheet {
      width: min(420px, 100%);
      border-radius: 20px 20px 0 0;
      border: 1px solid #dceae6;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 18px 38px rgba(8, 46, 40, 0.22);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .batch-sheet h2 {
      margin: 0;
      font-size: 16px;

    .batch-options {
      display: grid;
      gap: 8px;
    }

    .batch-options button,
    .batch-form button {
      min-height: 42px;
      border: 0;
      border-radius: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .batch-options button {
      background: #edf3f1;
      color: #1f2a2b;
    }

    .batch-form {
      display: grid;
      gap: 10px;
    }

    .batch-form label {
      display: grid;
      gap: 5px;
      color: #607371;

    }

    .batch-form input,
    .batch-form select {
      width: 100%;
      height: 40px;
      border: 1px solid #d7e5e1;
      border-radius: 10px;
      padding: 0 10px;
      font: inherit;
      color: #163031;

    .batch-form-actions {

    @media (min-width: 720px) {
      body {

      .list {

      .hero {

    @media (max-width: 420px) {

      .modal-product-head {
        grid-template-columns: 82px 1fr;

      }

      .modal-img.compact {
        width: 82px;
        height: 82px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-top">
        <h1 class="title">价格比价清单</h1>
        <div class="hero-actions">
          <button id="batchEntry" class="batch-entry" type="button" style="display:none;">批量修改</button>
          <button id="scanSearch" class="scan-btn" aria-label="扫码搜索">⌁</button>
        </div>
      </div>
      <div class="search-wrap">
        <input id="q" placeholder="搜索名称、品牌、条码" />
        <div id="summaryChip" class="chip">0 条记录</div>
        <div id="searchScope" class="search-scope" aria-label="搜索范围">
          <button class="active" type="button" data-scope="all">全部</button>
          <button type="button" data-scope="name">只搜名称</button>
          <button type="button" data-scope="store">只搜店铺</button>
        </div>
      </div>
    </section>

    <main id="list" class="list"></main>

    <nav data-active="list">
      <a href="home.html">首页</a>
      <a class="active" href="products">清单</a>
      <a href="add.html">录入</a>
      <a href="stores.html">店铺</a>
      <a href="profile.html">我的</a>
    </nav>
  </div>

  <div id="batchBar" class="batch-bar" aria-live="polite">
    <button id="batchSelectAll" class="batch-select-all" type="button">全选</button>
    <span id="batchCount" class="batch-count">已选择 0 条</span>
    <button id="batchEdit" class="batch-edit" type="button">操作编辑</button>
    <button id="batchCancel" class="batch-cancel" type="button">取消</button>
  </div>

  <div id="batchSheetMask" class="batch-sheet-mask">
    <section id="batchSheet" class="batch-sheet" role="dialog" aria-modal="true" aria-label="批量修改"></section>
  </div>

  <div id="mask" class="modal-mask" role="dialog" aria-modal="true">
    <article class="modal" id="modal"></article>
  </div>
  <div id="scannerMask" class="scanner-mask">
    <div class="scanner">
      <div class="scanner-head">
        <span>扫描条形码</span>
        <button type="button" onclick="stopBarcodeScanner()" aria-label="关闭扫码">×</button>
      </div>
      <video id="scannerVideo" autoplay playsinline muted></video>
      <div id="scannerHint" class="scanner-foot">将条码放入画面中央</div>
    </div>
  </div>

  <script src="toast.js"></script>
  <script src="image-viewer.js"></script>
  <script src="image-cropper.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const pageParams = new URLSearchParams(location.search);
    const storeFilterId = pageParams.get("storeId") || "";
    const storeFilterName = pageParams.get("storeName") || "";
    let searchScope = pageParams.get("scope") || "all";
    let cache = [];
    let storesCache = null;
    let activeProductId = null;
    let suppressNextCardClick = false;
    let suppressNextHistoryClick = false;
    let longPressTimer = null;
    let batchMode = false;
    let developerBatchEnabled = false;
    const selectedProducts = new Set();
    let bodyScrollY = 0;
    let modalLocked = false;
    const scannerState = {
      timer: null,
      stream: null,
      detector: null,
      controls: null,
      zxingPromise: null,
      onResult: null
    };

    $("scanSearch").onclick = () => showToast("扫码搜索将在下一版接入，当前可用文本搜索。");
    $("mask").addEventListener("click", (e) => {
      if (e.target === $("mask")) closeModal();
    });
    $("scannerMask").addEventListener("click", (e) => {
      if (e.target === $("scannerMask")) stopBarcodeScanner();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && $("scannerMask").style.display === "flex") {
        stopBarcodeScanner();
        return;
      }
      if (e.key === "Escape") closeModal();
    });

    function unitPriceClass(price, minPrice) {
      if (!(price > 0) || !(minPrice > 0)) return "";
      if (price === minPrice) return "best";
      if (price > minPrice * 1.3) return "bad";
      return "";
    }

    function asMoney(v) {
      return Number.isFinite(Number(v)) ? Number(v).toFixed(0) : "-";
    }

    function asUnit(v, label) {
      if (v == null || label == null) return "-";
      const digits = String(label).includes("个") ? 0 : 2;
      return `${Number(v).toFixed(digits)} ${label}`;
    }

    function sortRecordsByDateAsc(records) {
      return records.slice().sort((a, b) =>
        String(a.recordDate || "").localeCompare(String(b.recordDate || "")) || Number(a.id || 0) - Number(b.id || 0)
      );
    }

    function sortRecordsByDateDesc(records) {
      return records.slice().sort((a, b) =>
        String(b.recordDate || "").localeCompare(String(a.recordDate || "")) || Number(b.id || 0) - Number(a.id || 0)
      );
    }

    function storeKeyOf(record) {
      return String(record.storeId ?? record.storeName ?? "");
    }

    function latestRecordsByStore(records) {
      const latest = new Map();
      sortRecordsByDateDesc(records).forEach((record) => {
        const key = storeKeyOf(record);
        if (!key || latest.has(key)) return;
        latest.set(key, record);
      });
      return Array.from(latest.values()).sort((a, b) =>
        Number(a.unitPrice || Infinity) - Number(b.unitPrice || Infinity) ||
        Number(a.priceTaxIn || Infinity) - Number(b.priceTaxIn || Infinity)
      );
    }

    function lowestRecordsByDate(records) {
      const byDate = new Map();
      records.forEach((record) => {
        if (!Number.isFinite(Number(record.priceTaxIn))) return;
        const key = record.recordDate || "-";
        const current = byDate.get(key);
        if (
          !current ||
          Number(record.priceTaxIn) < Number(current.priceTaxIn) ||
          (Number(record.priceTaxIn) === Number(current.priceTaxIn) && Number(record.id || 0) > Number(current.id || 0))
        ) {
          byDate.set(key, record);
        }
      });
      return Array.from(byDate.values());
    }

    function recordsForTrend(records, mode = "lowest", storeKey = "") {
      if (mode === "store") {
        return records.filter((record) => storeKeyOf(record) === String(storeKey));
      }
      return lowestRecordsByDate(records);
    }

    function renderTrendFilters(records, activeMode = "lowest", activeStoreKey = "") {
      const stores = latestRecordsByStore(records);
      if (!stores.length) return "";
      return `
        <div class="trend-filter-row">
          <button class="trend-filter ${activeMode === "lowest" ? "active" : ""}" type="button" data-trend-mode="lowest">最低价走势</button>
          ${stores.map((record) => {
            const key = storeKeyOf(record);
            return `<button class="trend-filter ${activeMode === "store" && String(activeStoreKey) === key ? "active" : ""}" type="button" data-trend-mode="store" data-trend-store="${escapeHtml(key)}">${escapeHtml(record.storeName || "-")}</button>`;
          }).join("")}
        </div>
      `;
    }

    function renderStoreRankings(records) {
      const rankings = latestRecordsByStore(records);
      if (!rankings.length) {
        return `<div class="trend-card"><div class="trend-empty">暂无店铺价格数据</div></div>`;
      }

      return `
        <div class="store-rank-list">
          ${rankings.map((record, index) => `
            <div class="store-rank-row ${index === 0 ? "best" : ""}" role="button" tabindex="0" data-rank-store="${escapeHtml(storeKeyOf(record))}">
              <div>
                <div class="store-rank-name">
                  ${escapeHtml(record.storeName || "-")}
                  ${index === 0 ? '<span class="rank-badge">当前最低</span>' : ""}
                </div>
                <div class="store-rank-meta">${escapeHtml(record.recordDate || "-")} · ${asUnit(record.unitPrice, record.unitPriceLabel)}</div>
              </div>
              <div class="store-rank-price">¥${asMoney(record.priceTaxIn)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderTrend(records, mode = "lowest", storeKey = "") {
      const series = sortRecordsByDateAsc(recordsForTrend(records, mode, storeKey))
        .filter((r) => Number.isFinite(Number(r.priceTaxIn)))
        .map((r) => ({
          date: r.recordDate || "-",
          value: Number(r.priceTaxIn),
          storeKey: storeKeyOf(r),
          storeName: r.storeName || "-"
        }));

      if (!series.length) {
        return `<div class="trend-card"><div class="trend-empty">暂无价格走势数据</div></div>`;
      }

      const width = 320;
      const height = 128;
      const padX = 28;
      const padY = 20;
      const values = series.map((x) => x.value);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max === min ? 1 : max - min;
      const points = series.map((item, index) => {
        const x = series.length === 1
          ? width / 2
          : padX + (index * (width - padX * 2)) / (series.length - 1);
        const y = height - padY - ((item.value - min) / range) * (height - padY * 2);
        return { ...item, x, y };
      });
      const pointsByStore = points.reduce((groups, point) => {
        const key = point.storeKey || "-";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(point);
        return groups;
      }, new Map());
      const polylines = Array.from(pointsByStore.values())
        .filter((storePoints) => storePoints.length > 1)
        .map((storePoints) => {
          const pointAttr = storePoints.map((p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
          return `<polyline points="${pointAttr}" fill="none" stroke="#0d9a7d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`;
        })
        .join("");
      const circles = points.map((p) => `
        <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="#0d9a7d">
          <title>${escapeHtml(p.storeName)} · ${escapeHtml(p.date)} · ¥${asMoney(p.value)}</title>
        </circle>
      `).join("");
      const first = points[0];
      const last = points[points.length - 1];

      return `
        <div class="trend-card">
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="税后价格走势">
            <line x1="${padX}" y1="${height - padY}" x2="${width - padX}" y2="${height - padY}" stroke="#dbe7e3" stroke-width="1" />
            <line x1="${padX}" y1="${padY}" x2="${padX}" y2="${height - padY}" stroke="#dbe7e3" stroke-width="1" />
            <text x="${padX}" y="14" fill="#607371" font-size="10">¥${asMoney(max)}</text>
            <text x="${padX}" y="${height - 4}" fill="#607371" font-size="10">¥${asMoney(min)}</text>
            ${polylines}
            ${circles}
            <text x="${padX}" y="${height - 10}" fill="#607371" font-size="10">${escapeHtml(first.date)}</text>
            <text x="${width - padX}" y="${height - 10}" fill="#607371" font-size="10" text-anchor="end">${escapeHtml(last.date)}</text>
          </svg>
        </div>
      `;
    }

    function renderHistory(records) {
      const sorted = sortRecordsByDateDesc(records);
      if (!sorted.length) {
        return `<div class="trend-card"><div class="trend-empty">暂无历史记录</div></div>`;
      }

      return `
        <div class="history-list">
          ${sorted.map((r) => `
            <div class="history-row" data-record-id="${r.id}">
              <div>
                <div class="history-date">${escapeHtml(r.recordDate || "-")}</div>
                <div class="history-actor">记录人：${escapeHtml(actorLabel(r.createdByName, r.createdBy))}</div>
              </div>
              <div>
                <div class="history-price">¥${asMoney(r.priceTaxIn)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function actorLabel(name, email, fallback = "-") {
      const cleanName = String(name || "").trim();
      const cleanEmail = String(email || "").trim();
      if (cleanName && cleanEmail && cleanName !== cleanEmail) return `${cleanName} / ${cleanEmail}`;
      return cleanName || cleanEmail || fallback;
    }

    function renderEditImages(imageUrls) {
      const preview = $("modal").querySelector("#editPhotoPreview");
      const strip = $("modal").querySelector("#editPhotoStrip");
      if (!preview || !strip) return;
      preview.classList.toggle("has-image", Boolean(imageUrls[0]));
      preview.innerHTML = imageUrls[0]
        ? `<img src="${imageUrls[0]}" alt="商品图" /><span class="edit-photo-tip">拍照/上传</span>`
        : "<span>拍照/上传</span>";
      strip.innerHTML = imageUrls.length > 1
        ? imageUrls.map((url) => `<img src="${url}" alt="商品图缩略图" />`).join("")
        : "";
    }

    function renderEditBarcode(value) {
      const display = $("modal").querySelector("#editBarcodeDisplay");
      if (!display) return;
      const barcode = String(value || "").trim();
      display.textContent = barcode ? `已记录：${barcode}` : "未记录条形码";
      display.title = barcode || "";
    }

    function stopBarcodeScanner() {
      if (scannerState.timer) {
        clearInterval(scannerState.timer);
        scannerState.timer = null;
      }
      if (scannerState.controls) {
        try {
          scannerState.controls.stop();
        } catch (_) {
          // ignore cleanup errors
        }
        scannerState.controls = null;
      }
      if (scannerState.stream) {
        scannerState.stream.getTracks().forEach((track) => track.stop());
        scannerState.stream = null;
      }
      $("scannerVideo").srcObject = null;
      $("scannerMask").style.display = "none";
    }

    function finishBarcodeScan(value) {
      const barcode = String(value || "").trim();
      if (!barcode) return;
      const onResult = scannerState.onResult;
      scannerState.onResult = null;
      stopBarcodeScanner();
      if (onResult) onResult(barcode);
    }

    async function openBarcodeScanner(onResult) {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("当前浏览器无法调用摄像头。请确认使用 https 页面，并允许相机权限。");
      }
      scannerState.onResult = onResult;
      $("scannerMask").style.display = "flex";
      $("scannerHint").textContent = "正在启动摄像头...";
      if (!("BarcodeDetector" in window)) {
        await openZxingBarcodeScanner();
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        scannerState.stream = stream;
        $("scannerVideo").srcObject = stream;
        $("scannerHint").textContent = "将条码放入画面中央";
        if (!scannerState.detector) {
          scannerState.detector = new BarcodeDetector({
            formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128", "code_39"]
          });
        }
        scannerState.timer = setInterval(async () => {
          if (!$("scannerVideo").srcObject) return;
          try {
            const codes = await scannerState.detector.detect($("scannerVideo"));
            if (!codes.length) return;
            finishBarcodeScan(codes[0].rawValue);
          } catch (_) {
            // ignore scanning frame errors
          }
        }, 280);
      } catch (err) {
        stopBarcodeScanner();
        throw err;
      }
    }

    async function openZxingBarcodeScanner() {
      $("scannerHint").textContent = "正在加载扫码组件...";
      await loadZxing();
      if (!window.ZXingBrowser?.BrowserMultiFormatReader) {
        throw new Error("扫码组件加载异常");
      }
      const reader = new window.ZXingBrowser.BrowserMultiFormatReader();
      const video = $("scannerVideo");
      $("scannerHint").textContent = "将条码放入画面中央，尽量横向对齐";
      const onFrame = (result) => {
        const value = String(result?.getText?.() || result?.text || "").trim();
        if (value) finishBarcodeScan(value);
      };
      if (reader.decodeFromConstraints) {
        scannerState.controls = await reader.decodeFromConstraints(
          {
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          },
          video,
          (result) => {
            if (result) onFrame(result);
          }
        );
      } else {
        scannerState.controls = await reader.decodeFromVideoDevice(
          undefined,
          video,
          (result) => {
            if (result) onFrame(result);
          }
        );
      }
    }

    function loadZxing() {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return Promise.resolve();
      if (scannerState.zxingPromise) return scannerState.zxingPromise;
      scannerState.zxingPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "/vendor/zxing-browser.min.js";
        script.async = true;
        script.onload = () => {
          if (window.ZXingBrowser?.BrowserMultiFormatReader) resolve();
          else reject(new Error("扫码组件加载异常"));
        };
        script.onerror = () => reject(new Error("无法加载本地扫码组件"));
        document.head.append(script);
      });
      return scannerState.zxingPromise;
    }

    async function compressImageFile(file) {
      if (!file || !file.type.startsWith("image/")) throw new Error("请选择图片文件");
      if (file.size > 8 * 1024 * 1024) throw new Error("原图超过 8MB，请先裁剪或压缩后再上传");
      const bitmap = await createImageBitmap(file);
      const maxSide = 900;
      const scale = Math.min(1, maxSide / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * scale));
      const height = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0, width, height);
      const mime = "image/jpeg";
      for (const quality of [0.78, 0.68, 0.58]) {
        const dataUrl = canvas.toDataURL(mime, quality);
        if (dataUrl.length < 900 * 1024) return dataUrl;
      }
      throw new Error("压缩后仍然太大，请裁剪图片后再上传");
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function normalizeDateInput(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const match = text.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/);
      if (!match) return "";
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(Date.UTC(year, month - 1, day));
      if (date.getUTCFullYear() !== year || date.getUTCMonth() !== month - 1 || date.getUTCDate() !== day) return "";
      return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function parsePromoNote(note) {
      const text = String(note || "");
      const match = text.match(/^\[\[promo(?::([^\]]+))?\]\]\s*/i);
      return {
        isPromo: Boolean(match),
        promoUntil: normalizeDateInput(match?.[1]) || "",
        plainNote: text.replace(/^\[\[promo(?::[^\]]+)?\]\]\s*/i, "").trim()
      };
    }

    function renderDetailNote(note) {
      const plainNote = parsePromoNote(note).plainNote;
      if (!plainNote) {
        return '<div class="detail-note empty">暂无备注</div>';
      }
      return `<div class="detail-note">${escapeHtml(plainNote)}</div>`;
    }

    function buildPromoNote(plainNote, isPromo, promoUntil) {
      const plain = String(plainNote || "").trim();
      if (!isPromo) return plain || null;
      const normalizedPromoUntil = normalizeDateInput(promoUntil);
      const prefix = normalizedPromoUntil ? `[[promo:${normalizedPromoUntil}]]` : "[[promo]]";
      return plain ? `${prefix} ${plain}` : prefix;
    }

    function deriveBeforeTaxPrice(priceTaxIn, taxRate) {
      const after = Number(priceTaxIn || 0);
      const rate = Number(taxRate ?? 0);
      if (!(after > 0)) return 0;
      if (rate === 0) return after;
      return Math.round((after / (1 + rate / 100)) * 10) / 10;
    }

    function isStoredTaxPairConsistent(priceTaxIn, priceTaxEx, taxRate) {
      const after = Number(priceTaxIn);
      const before = Number(priceTaxEx);
      const rate = Number(taxRate ?? 0);
      if (!(after > 0) || !(before > 0) || !Number.isFinite(rate)) return false;
      const expectedAfter = Math.round(before * (rate === 0 ? 1 : 1 + rate / 100) * 10) / 10;
      return Math.abs(expectedAfter - after) <= 0.11;
    }

    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        const error = new Error("接口没有返回 JSON，请刷新页面或重新登录后再试。");
        error.status = res.status;
        throw error;
      }
      const data = await res.json();
      if (!res.ok) {
        const error = new Error(data.error || "请求失败");
        error.status = res.status;
        throw error;
      }
      return data;
    }

    function isLoginError(error) {
      return Number(error?.status) === 401 || String(error?.message || "").toLowerCase().includes("login required");
    }

    async function applyBatchEdit(field, values) {
      const items = selectedProductItems();
      if (!items.length) throw new Error("没有可修改的记录。");
      const ok = confirm(`确认批量修改 ${items.length} 条当前展示记录吗？`);
      if (!ok) return;
      for (const item of items) {
        const detail = await fetchJson(`/api/products/${item.productId}`);
        const product = detail.product || {};
        const top = detail.records?.[0];
        if (!top?.id) continue;
        const promo = parsePromoNote(top.note);
        let isPromo = promo.isPromo;
        let promoUntil = promo.promoUntil;
        let plainNote = promo.plainNote;
        if (field === "promo") {
          isPromo = values.isPromo;
          promoUntil = values.promoUntil;
        }
        if (field === "note") {
          plainNote = values.note;
        }
        const payload = {
          productId: product.id,
          product: {
            id: product.id,
            nameZh: product.nameZh || "",
            nameJa: product.nameJa || "",
            barcode: product.barcode || ""
          },
          storeId: field === "store" ? Number(values.storeId) : Number(top.storeId),
          priceTaxIn: Number(top.priceTaxIn),
          specValue: Number(top.specValue),
          unit: top.unit || "g",
          recordDate: field === "date" ? values.recordDate : top.recordDate,
          priceTaxEx: top.priceTaxEx ?? null,
          taxRate: Number(top.taxRate ?? 8),
          imageUrls: Array.isArray(top.imageUrls) ? top.imageUrls : (top.imageUrl ? [top.imageUrl] : []),
          note: buildPromoNote(plainNote, isPromo, promoUntil)
        };
        await fetchJson(`/api/price-records/${top.id}`, {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
      }
      showToast(`已批量修改 ${items.length} 条记录。`, { type: "success" });
      exitBatchMode();
      await load();
    }
