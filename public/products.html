              <button id="detailDeleteRecordBtn" class="btn btn-danger" type="button">删除当前记录</button>
            </div>
          </div>
          <form id="editForm" class="edit-form">
            <p id="editModeTitle" class="edit-mode-title">修正记录</p>
            <div class="edit-top">
              <div>
                <div id="editPhotoPreview" class="edit-photo" role="button" tabindex="0" aria-label="拍照或上传商品图片"></div>
                <div class="edit-photo-tools">
                  <button id="clearEditPhoto" type="button">删除图片</button>
                </div>
                <div id="editPhotoStrip" class="edit-photo-strip"></div>
                <input id="editImageFile" type="file" accept="image/*" multiple hidden />
              </div>
              <div class="edit-name-stack">
                <div class="edit-field">
                  <label for="editNameZh">中文名称</label>
                  <input id="editNameZh" value="${escapeHtml(data.product.nameZh || "")}" />
                </div>
                <div class="edit-field">
                  <label for="editNameJa">日文名称</label>
                  <input id="editNameJa" value="${escapeHtml(data.product.nameJa || "")}" />
                </div>
                <div class="edit-field">
                  <label>条形码（可选）</label>
                  <div class="edit-barcode-row">
                    <div id="editBarcodeDisplay" class="edit-barcode-display"></div>
                    <button id="editBarcodeScanBtn" class="edit-barcode-scan" type="button">重新扫码</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="edit-group">
              <p class="edit-group-title">价格与规格</p>
              <div class="edit-field">
                <label>税率</label>
                <div id="editTaxSegment" class="edit-segment">
                  <button type="button" data-tax="8" class="${editTaxMode === 8 ? "active" : ""}">8%</button>
                  <button type="button" data-tax="10" class="${editTaxMode === 10 ? "active" : ""}">10%</button>
                  <button type="button" data-tax="0" class="${editTaxMode === 0 ? "active" : ""}">0%</button>
                </div>
              </div>

              <div class="edit-inline-grid">
                <div class="edit-field">
                  <label for="editPriceTaxEx">税前价格</label>
                  <input id="editPriceTaxEx" type="number" step="0.01" value="${Number.isFinite(initialBefore) ? initialBefore.toFixed(1) : 0}" required />
                </div>
                <div class="edit-field">
                  <label for="editPriceTaxIn">税后价格</label>
                  <input id="editPriceTaxIn" type="text" value="¥${asMoney(top.priceTaxIn)}" readonly />
                </div>
              </div>

              <div class="edit-inline-grid">
                <div class="edit-field">
                  <label for="editSpecValue">规格数值</label>
                  <input id="editSpecValue" type="number" step="0.01" value="${Number(top.specValue || 0)}" required />
                </div>
                <div class="edit-field">
                  <label>规格单位</label>
                  <div id="editUnitSegment" class="edit-segment">
                    <button type="button" data-unit="g" class="${editUnit === "g" ? "active" : ""}">g</button>
                    <button type="button" data-unit="ml" class="${editUnit === "ml" ? "active" : ""}">ml</button>
                    <button type="button" data-unit="个" class="${editUnit === "个" ? "active" : ""}">个</button>
                    <button type="button" data-unit="pack" class="${editUnit === "pack" ? "active" : ""}">pack</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="edit-unit-preview">
              <p class="k">对比单价（按税后价）</p>
              <p id="editUnitPricePreview" class="v">${asUnit(top.unitPrice, top.unitPriceLabel)}</p>
            </div>

            <div class="edit-grid">
              <div class="edit-field">
                <label for="editStoreId">购买店铺</label>
                <select id="editStoreId"><option value="">登录后加载店铺</option></select>
              </div>
              <div class="edit-field">
                <label>限时优惠</label>
                <div id="editPromoSegment" class="edit-segment">
                  <button type="button" data-promo="0" class="${editIsPromo ? "" : "active"}">否</button>
                  <button type="button" data-promo="1" class="${editIsPromo ? "active" : ""}">是</button>
                </div>
              </div>
            </div>
            <div id="editPromoUntilField" class="edit-field" style="${editIsPromo ? "" : "display:none;"}">
              <label for="editPromoUntil">优惠截止日期</label>
              <input id="editPromoUntil" type="date" value="${escapeHtml(initialPromo.promoUntil)}" ${editIsPromo ? "" : "disabled"} />
            </div>
            <input id="editPlainNote" type="hidden" value="${escapeHtml(initialPromo.plainNote)}" />
            <div class="modal-actions">
              <button id="editSubmitBtn" class="btn btn-primary" type="submit">保存修正</button>
              <button id="undoEditBtn" class="btn btn-light" type="button" style="display:none;">撤回我的修改</button>
            </div>
            <div class="modal-actions">
              <button id="deleteRecordBtn" class="btn btn-danger" type="button" style="display:none;">删除这条数据</button>
              <button id="backDetailBtn" class="btn btn-light" type="button">返回详情</button>
            </div>
            <div id="editMsg" class="modal-msg"></div>
          </form>
        </section>
      `;

      const form = modal.querySelector("#editForm");
      const modalHead = modal.querySelector("#modalHead");
      const detailView = modal.querySelector("#detailView");
      let editMode = "correction";
      const detailRecords = data.records || [];
      let editBarcode = String(data.product.barcode || "").trim();

      function updateTrend(mode = "lowest", storeKey = "") {
        modal.querySelectorAll("[data-trend-mode]").forEach((btn) => {
          const isActive = btn.dataset.trendMode === mode &&
            (mode !== "store" || String(btn.dataset.trendStore || "") === String(storeKey));
          btn.classList.toggle("active", isActive);
        });
        modal.querySelector("#trendMount").innerHTML = renderTrend(detailRecords, mode, storeKey);
      }

      modal.querySelectorAll("[data-trend-mode]").forEach((btn) => {
        btn.onclick = () => updateTrend(btn.dataset.trendMode, btn.dataset.trendStore || "");
      });
      modal.querySelectorAll("[data-view-image]").forEach((node) => {
        const src = node.dataset.viewImage;
        if (!src) return;
        node.onclick = () => window.openImageViewer?.(src);
        node.onkeydown = (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          window.openImageViewer?.(src);
        };
      });
      modal.querySelectorAll("[data-rank-store]").forEach((row) => {
        const selectStoreTrend = () => updateTrend("store", row.dataset.rankStore || "");
        row.onclick = selectStoreTrend;
        row.onkeydown = (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectStoreTrend();
          }
        };
      });

      async function loadProtectedStores() {
        const select = modal.querySelector("#editStoreId");
        try {
          const stores = await getStores();
          select.innerHTML = stores
            .map((s) => `<option value="${s.id}" ${Number(s.id) === Number(top.storeId) ? "selected" : ""}>${escapeHtml(s.name)}</option>`)
            .join("");
        } catch (err) {
          if (isLoginError(err)) {
            showToast("编辑需要登录。请刷新页面确认登录状态，或重新登录后再试。", { type: "error", sticky: true });
          } else {
            showToast(`店铺列表加载失败：${err.message || "请稍后重试"}`, { type: "error", sticky: true });
          }
          modal.querySelector("#deleteRecordBtn").style.display = "none";
          modal.querySelector("#undoEditBtn").style.display = "none";
          return false;
        }

        modal.querySelector("#deleteRecordBtn").style.display = "none";
        modal.querySelector("#undoEditBtn").style.display = "none";
        try {
          const access = await getRecordAccess(top.id);
          modal.querySelector("#deleteRecordBtn").style.display =
            editMode === "correction" && access.canDelete ? "block" : "none";
          modal.querySelector("#undoEditBtn").style.display =
            editMode === "correction" && access.canUndo ? "block" : "none";
        } catch (err) {
          if (isLoginError(err)) {
            modal.querySelector("#editMsg").textContent = "已打开编辑表单；删除和撤回需要登录状态确认，保存时会再次校验。";
          } else {
            modal.querySelector("#editMsg").textContent = `权限信息加载失败：${err.message || "请稍后重试"}。仍可先编辑并尝试保存。`;
          }
        }
        return true;
      }

      function backToDetail() {
        form.classList.remove("active");
        modalHead.classList.remove("hidden");
        detailView.classList.remove("hidden");
        modal.querySelector("#editMsg").textContent = "";
      }

      async function showRecordForm(mode) {
        editMode = mode;
        modalHead.classList.add("hidden");
        detailView.classList.add("hidden");
        form.classList.add("active");
        syncRecordFormMode();
        modal.querySelector("#editMsg").textContent = "正在检查登录状态...";
        const ok = await loadProtectedStores();
        modal.querySelector("#editSubmitBtn").disabled = !ok;
        if (ok && !isStoredTaxPairConsistent(top.priceTaxIn, top.priceTaxEx, editTaxMode)) {
          modal.querySelector("#editMsg").textContent = "这条记录原有的税率与税前/税后价格不一致，表单已按当前税率重新计算显示，请保存前再确认一次。";
          return;
        }
        if (ok && modal.querySelector("#editMsg").textContent === "正在检查登录状态...") modal.querySelector("#editMsg").textContent = "";
      }

      modal.querySelector("#addRecordBtn").onclick = () => showRecordForm("new");
      modal.querySelector("#showEditBtn").onclick = () => showRecordForm("correction");
      modal.querySelector("#detailAddRecordBtn").onclick = () => showRecordForm("new");
      modal.querySelector("#detailEditRecordBtn").onclick = () => showRecordForm("correction");
      const detailDeleteBtn = modal.querySelector("#detailDeleteRecordBtn");
      getRecordAccess(top.id)
        .then((access) => {
          detailDeleteBtn.disabled = !access.canDelete;
          detailDeleteBtn.title = access.canDelete ? "" : "只能删除自己创建的数据";
        })
        .catch(() => {
          detailDeleteBtn.disabled = true;
          detailDeleteBtn.title = "请先登录后再删除";
        });
      detailDeleteBtn.onclick = async () => {
        try {
          const deleted = await deleteRecord(top.id, "删除成功，清单已刷新。");
          if (!deleted) return;
          storesCache = null;
          closeModal();
          await load();
        } catch (err) {
          showToast(`删除失败：${err.message}`, { type: "error" });
        }
      };
      modal.querySelector("#backDetailBtn").onclick = backToDetail;
      modal.querySelector("#deleteRecordBtn").onclick = async () => {
        const editMsg = modal.querySelector("#editMsg");
        try {
          const deleted = await deleteRecord(top.id, "删除成功，清单已刷新。");
          if (!deleted) return;
          storesCache = null;
          closeModal();
          await load();
        } catch (err) {
          showToast(`删除失败：${err.message}`, { type: "error" });
        }
      };
      modal.querySelector("#undoEditBtn").onclick = async () => {
        const editMsg = modal.querySelector("#editMsg");
        try {
          await fetchJson(`/api/price-records/${top.id}/undo`, { method: "POST" });
          editMsg.textContent = "已撤回你最后一次修改。";
          storesCache = null;
          await load();
          await openDetail(id);
        } catch (err) {
          showToast(`撤回失败：${err.message}`, { type: "error" });
        }
      };

      function round1(n) {
        return Math.round(n * 10) / 10;
      }

      function setEditTaxMode(nextTaxMode) {
        editTaxMode = Number(nextTaxMode);
        modal.querySelectorAll("#editTaxSegment button").forEach((button) => {
          button.classList.toggle("active", Number(button.dataset.tax) === editTaxMode);
        });
        calcEdit();
      }

      function syncRecordFormMode() {
        const isNew = editMode === "new";
        const editTop = modal.querySelector(".edit-top");
        const groupTitle = modal.querySelector(".edit-group-title");
        const priceInput = modal.querySelector("#editPriceTaxEx");
        const promoField = modal.querySelector("#editPromoSegment")?.closest(".edit-field");
        const promoUntilField = modal.querySelector("#editPromoUntilField");
        const beforeLabel = Number.isFinite(initialBefore) && initialBefore > 0 ? `¥${initialBefore.toFixed(1)}` : `¥${asMoney(top.priceTaxIn)}`;

        modal.querySelector("#editModeTitle").textContent = isNew ? "新增价格记录" : "修正记录";
        modal.querySelector("#editSubmitBtn").textContent = isNew ? "记录新价格" : "保存修正";
        if (editTop) editTop.style.display = isNew ? "none" : "grid";
        if (groupTitle) groupTitle.textContent = isNew ? "本次价格" : "价格与规格";
        if (promoField) promoField.style.display = isNew ? "none" : "";
        if (promoUntilField) promoUntilField.style.display = isNew ? "none" : (editIsPromo ? "" : "none");

        priceInput.placeholder = isNew ? `上次税前价格 ${beforeLabel}` : "";
        priceInput.value = isNew ? "" : (Number.isFinite(initialBefore) ? initialBefore.toFixed(1) : "0");

        modal.querySelector("#editSpecValue").disabled = isNew;
        modal.querySelectorAll("#editUnitSegment button").forEach((button) => {
          button.disabled = isNew;
          button.title = isNew ? "新增价格时沿用原规格" : "";
        });
        modal.querySelector("#clearEditPhoto").disabled = isNew;
        modal.querySelector("#editPhotoPreview").style.cursor = isNew ? "default" : "pointer";

        if (isNew) {
          editImageUrls = inheritedImageUrls.slice();
          editUnit = top.unit || "g";
          modal.querySelector("#editSpecValue").value = Number(top.specValue || 0);
          setEditTaxMode(Number(top.taxRate ?? 8));
        } else {
          editImageUrls = inheritedImageUrls.slice();
          editUnit = top.unit || "g";
          setEditTaxMode(Number(top.taxRate ?? 0));
          renderEditImages(editImageUrls);
        }
        calcEdit();
      }

      function calcEdit() {
        const before = Number(modal.querySelector("#editPriceTaxEx").value || 0);
        const spec = Number(modal.querySelector("#editSpecValue").value || 0);
        const after = before * (editTaxMode === 0 ? 1 : 1 + editTaxMode / 100);
        let unitPrice = 0;
        let unitLabel = "/100g";
        if (spec > 0) {
          if (editUnit === "g" || editUnit === "ml") {
            unitPrice = (after / spec) * 100;
            unitLabel = editUnit === "g" ? "/100g" : "/100ml";
          } else {
            unitPrice = after / spec;
            unitLabel = `/${editUnit}`;
          }
        }
        modal.querySelector("#editPriceTaxIn").value = `¥${round1(after).toFixed(1)}`;
        modal.querySelector("#editUnitPricePreview").textContent = `${round1(unitPrice).toFixed(1)} ${unitLabel}`;
        return { before, after: round1(after) };
      }

      modal.querySelectorAll("#editTaxSegment button").forEach((btn) => {
        btn.onclick = () => {
          setEditTaxMode(btn.dataset.tax);
        };
      });
      modal.querySelectorAll("#editUnitSegment button").forEach((btn) => {
        btn.onclick = () => {
          editUnit = btn.dataset.unit;
          modal.querySelectorAll("#editUnitSegment button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          calcEdit();
        };
      });
      modal.querySelectorAll("#editPromoSegment button").forEach((btn) => {
        btn.onclick = () => {
          editIsPromo = btn.dataset.promo === "1";
          modal.querySelectorAll("#editPromoSegment button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const promoUntilField = modal.querySelector("#editPromoUntilField");
          const promoUntil = modal.querySelector("#editPromoUntil");
          promoUntilField.style.display = editIsPromo ? "" : "none";
          promoUntil.disabled = !editIsPromo;
          if (!editIsPromo) promoUntil.value = "";
        };
      });
      ["editPriceTaxEx", "editSpecValue"].forEach((fieldId) => {
        modal.querySelector(`#${fieldId}`).addEventListener("input", calcEdit);
      });
      renderEditImages(editImageUrls);
      renderEditBarcode(editBarcode);
      modal.querySelector("#editBarcodeScanBtn").onclick = async () => {
        const editMsg = modal.querySelector("#editMsg");
        editMsg.textContent = "请允许摄像头权限，然后对准条形码。";
        try {
          await openBarcodeScanner((barcode) => {
            editBarcode = barcode;
            renderEditBarcode(editBarcode);
            editMsg.textContent = `已识别条形码：${barcode}`;
          });
        } catch (err) {
          showToast(`无法启动扫码：${err.message || "请检查相机权限"}`, { type: "error" });
          stopBarcodeScanner();
        }
      };
      const editPhotoPreview = modal.querySelector("#editPhotoPreview");
      const chooseEditImage = () => modal.querySelector("#editImageFile").click();
      editPhotoPreview.onclick = () => {
        if (editImageUrls[0] && window.openImageActionSheet) {
          window.openImageActionSheet(editImageUrls[0], chooseEditImage);
          return;
        }
        chooseEditImage();
      };
      editPhotoPreview.onkeydown = (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          editPhotoPreview.click();
        }
      };
      modal.querySelector("#clearEditPhoto").onclick = () => {
        editImageUrls = [];
        renderEditImages(editImageUrls);
      };
      modal.querySelector("#editImageFile").onchange = async (event) => {
        const files = Array.from(event.target.files || []).slice(0, 4);
        if (!files.length) return;
        const editMsg = modal.querySelector("#editMsg");
        editMsg.textContent = "正在压缩图片...";
        try {
          editImageUrls = [];
          for (const file of files) {
            editImageUrls.push(window.cropAndCompressImageFile ? await window.cropAndCompressImageFile(file) : await compressImageFile(file));
          }
          renderEditImages(editImageUrls);
          editMsg.textContent = `已选择 ${editImageUrls.length} 张图片。`;
        } catch (err) {
          showToast(`图片处理失败：${err.message || "请重试"}`, { type: "error" });
        } finally {
          event.target.value = "";
        }
      };
      calcEdit();

      form.onsubmit = async (e) => {
        e.preventDefault();
        const editMsg = modal.querySelector("#editMsg");
        try {
          const { before, after } = calcEdit();
          const promoUntilValue = normalizeDateInput(modal.querySelector("#editPromoUntil").value);
          if (editMode === "new" && !(before > 0)) {
            editMsg.textContent = "请输入本次看到的税前价格。上次价格只作为提示，不会自动保存。";
            return;
          }
          const payload = {
            product: editMode === "new"
              ? { id: data.product.id }
              : {
                id: data.product.id,
                nameZh: modal.querySelector("#editNameZh").value.trim(),
                nameJa: modal.querySelector("#editNameJa").value.trim(),
                barcode: editBarcode
              },
            storeId: Number(modal.querySelector("#editStoreId").value),
            priceTaxIn: after,
            specValue: editMode === "new" ? Number(top.specValue) : Number(modal.querySelector("#editSpecValue").value),
            unit: editMode === "new" ? (top.unit || "g") : editUnit,
            recordDate: today(),
            priceTaxEx: before,
            taxRate: editTaxMode,
            imageUrls: editMode === "new" ? inheritedImageUrls : editImageUrls,
            note: editMode === "new"
              ? "price-change"
              : buildPromoNote(modal.querySelector("#editPlainNote").value, editIsPromo, promoUntilValue)
          };
          if (editMode !== "new" && !payload.product.nameZh && !payload.product.nameJa) {
            editMsg.textContent = "中文名称和日文名称不能同时为空。";
            return;
          }
          const saveRes = editMode === "new"
            ? await fetch("/api/price-records", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload)
            })
            : await fetch(`/api/price-records/${top.id}`, {
              method: "PUT",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                productId: data.product.id,
                ...payload
              })
            });
          const saveData = await saveRes.json();
          if (!saveRes.ok) throw new Error(saveData.error || "保存失败");
          editMsg.textContent = editMode === "new" ? "新增成功，已刷新。" : "修正成功，已刷新。";
          await load();
          storesCache = null;
          await openDetail(id);
        } catch (err) {
          showToast(`保存失败：${err.message}`, { type: "error" });
        }
      };
      openModal();
    }

    function lockBodyScroll() {
      if (modalLocked) return;
      bodyScrollY = window.scrollY || document.documentElement.scrollTop || 0;
      document.body.style.position = "fixed";
      document.body.style.top = `-${bodyScrollY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
      modalLocked = true;
    }

    function unlockBodyScroll() {
      if (!modalLocked) return;
      const y = bodyScrollY;
      document.body.style.position = "";
      document.body.style.top = "";
      document.body.style.left = "";
      document.body.style.right = "";
      document.body.style.width = "";
      modalLocked = false;
      window.scrollTo(0, y);
    }

    function openModal() {
      lockBodyScroll();
      $("mask").style.display = "flex";
    }

    function closeModal() {
      $("mask").style.display = "none";
      unlockBodyScroll();
      activeProductId = null;
    }

    window.openDetail = openDetail;
    window.closeModal = closeModal;

    $("list").addEventListener("click", async (e) => {
      const emptyAdd = e.target.closest("[data-empty-add]");
      if (emptyAdd) {
        location.href = "add.html";
        return;
      }
      const card = e.target.closest(".card[data-product-id]");
      if (!card) return;
      if (suppressNextCardClick) {
        suppressNextCardClick = false;
        return;
      }
      if (batchMode) {
        toggleBatchSelection(card.dataset.productId);
        return;
      }
      await openDetail(Number(card.dataset.productId));
    });

    $("list").addEventListener("keydown", (e) => {
      if (!e.target.closest("[data-empty-add]")) return;
      if (e.key !== "Enter" && e.key !== " ") return;
      e.preventDefault();
      location.href = "add.html";
    });

    $("list").addEventListener("mousedown", (e) => {
      const card = e.target.closest(".card[data-product-id]");
      if (!card) return;
      clearLongPress();
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        suppressNextCardClick = true;
        enterBatchMode(card.dataset.productId);
      }, 550);
    });
    $("list").addEventListener("touchstart", (e) => {
      const card = e.target.closest(".card[data-product-id]");
      if (!card) return;
      clearLongPress();
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        suppressNextCardClick = true;
        enterBatchMode(card.dataset.productId);
      }, 550);
    }, { passive: true });
    ["mouseup", "mouseleave", "touchend", "touchcancel", "touchmove"].forEach((eventName) => {
      $("list").addEventListener(eventName, clearLongPress, { passive: true });
    });

    $("modal").addEventListener("click", async (e) => {
      const row = e.target.closest(".history-row[data-record-id]");
      if (!row) return;
      if (suppressNextHistoryClick) {
        suppressNextHistoryClick = false;
      }
    });

    $("modal").addEventListener("mousedown", (e) => {
      const row = e.target.closest(".history-row[data-record-id]");
      if (!row) return;
      clearLongPress();
      longPressTimer = setTimeout(async () => {
        longPressTimer = null;
        suppressNextHistoryClick = true;
        try {
          const deleted = await deleteRecord(Number(row.dataset.recordId));
          if (deleted) {
            await load();
            if (activeProductId) {
              await openDetail(activeProductId);
            } else {
              closeModal();
            }
          }
        } catch (err) {
          showToast(err.message || "删除失败", { type: "error" });
        }
      }, 550);
    });
    $("modal").addEventListener("touchstart", (e) => {
      const row = e.target.closest(".history-row[data-record-id]");
      if (!row) return;
      clearLongPress();
      longPressTimer = setTimeout(async () => {
        longPressTimer = null;
        suppressNextHistoryClick = true;
        try {
          const deleted = await deleteRecord(Number(row.dataset.recordId));
          if (deleted) {
            await load();
            closeModal();
          }
        } catch (err) {
          showToast(err.message || "删除失败", { type: "error" });
        }
      }, 550);
    }, { passive: true });
    ["mouseup", "mouseleave", "touchend", "touchcancel", "touchmove"].forEach((eventName) => {
      $("modal").addEventListener(eventName, clearLongPress, { passive: true });
    });

    $("q").addEventListener("input", load);
    $("batchEntry").onclick = () => {
      if (!developerBatchEnabled) return;
      if (batchMode) exitBatchMode();
      else enterBatchMode();
    };
    $("batchSelectAll").onclick = () => {
      const ids = visibleProductIds();
      const allSelected = ids.length > 0 && ids.every((id) => selectedProducts.has(id));
      if (allSelected) ids.forEach((id) => selectedProducts.delete(id));
      else ids.forEach((id) => selectedProducts.add(id));
      document.querySelectorAll(".card[data-product-id]").forEach((card) => syncBatchCard(card.dataset.productId));
      updateBatchBar();
    };
    $("batchEdit").onclick = openBatchSheet;
    $("batchCancel").onclick = exitBatchMode;
    $("batchSheetMask").addEventListener("click", (e) => {
      if (e.target === $("batchSheetMask")) closeBatchSheet();
    });
    $("batchSheet").addEventListener("click", async (e) => {
      const fieldButton = e.target.closest("[data-batch-field]");
      if (fieldButton) {
        await renderBatchField(fieldButton.dataset.batchField);
        return;
      }
      if (e.target.closest("[data-batch-back]")) {
        openBatchSheet();
      }
    });
    $("batchSheet").addEventListener("submit", async (e) => {
      const form = e.target.closest("[data-batch-form]");
      if (!form) return;
      e.preventDefault();
      const field = form.dataset.batchForm;
      const submit = form.querySelector("[type='submit']");
      submit.disabled = true;
      try {
        const values = Object.fromEntries(new FormData(form).entries());
        if (field === "date") {
          values.recordDate = normalizeDateInput(values.recordDate);
          if (!values.recordDate) throw new Error("请选择正确的记录日期。");
        }
        if (field === "promo") {
          values.isPromo = values.isPromo === "1";
          values.promoUntil = values.isPromo ? normalizeDateInput(values.promoUntil) : "";
          if (values.isPromo && form.querySelector("[name='promoUntil']").value && !values.promoUntil) {
            throw new Error("优惠截止日期格式不正确。");
          }
        }
        await applyBatchEdit(field, values);
      } catch (err) {
        showToast(`批量修改失败：${err.message || "请稍后重试"}`, { type: "error", sticky: true });
      } finally {
        submit.disabled = false;
      }
    });
    $("searchScope").querySelectorAll("button").forEach((button) => {
      button.classList.toggle("active", button.dataset.scope === searchScope);
      button.onclick = () => {
        searchScope = button.dataset.scope || "all";
        $("searchScope").querySelectorAll("button").forEach((item) => {
          item.classList.toggle("active", item === button);
        });
        load();
      };
    });
    $("summaryChip").onclick = () => {
      if (!storeFilterId) return;
      const next = new URL(location.href);
      next.searchParams.delete("storeId");
      next.searchParams.delete("storeName");
      location.href = next.pathname + (next.search ? next.search : "");
    };
    load();
    setupDeveloperBatchMode();

    setupSwipeNav();

    async function setupDeveloperBatchMode() {
      const apply = (isEnabled) => {
        developerBatchEnabled = Boolean(isEnabled);
        if (!developerBatchEnabled && batchMode) exitBatchMode();
        updateBatchBar();
      };
      apply(false);
      try {
        const res = await fetch("/api/me/profile");
        const data = await res.json();
        const devMode = localStorage.getItem("priceComparisonDevMode") === "1";
        apply(Boolean(res.ok && data.isAdmin && devMode));
      } catch (_) {
        apply(false);
      }
    }

    function setupSwipeNav() {
      const nav = document.querySelector("nav[data-active]");
      if (!nav) return;
      let startX = 0;
      let startY = 0;
      nav.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        startX = touch.clientX;
        startY = touch.clientY;
      }, { passive: true });
      nav.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        if (Math.abs(dx) < 38 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
        const links = Array.from(nav.querySelectorAll("a"));
        const current = links.findIndex((link) => link.classList.contains("active"));
        const next = dx < 0 ? current + 1 : current - 1;
        if (next >= 0 && next < links.length) {
          location.href = links[next].getAttribute("href");
        }
      }, { passive: true });
    }
  </script>
  <script src="auth-nav.js"></script>
</body>
</html>
