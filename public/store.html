<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>店铺详情</title>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #fff;
      --line: #dbe7e3;
      --text: #1f2a2b;
      --muted: #607270;
      --primary: #0d9a7d;
      --primary-soft: #e2f7f1;
      --primary-deep: #06735d;
      --danger: #c93f3f;
      --warn: #a56700;
      --shadow: 0 14px 28px rgba(14, 63, 56, 0.1);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; overflow-x: hidden; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        calc(88px + env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
      background:
        radial-gradient(circle at 10% 0%, #d7f6ed 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #d8eef8 0, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(760px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .hero, .panel, .post-card, .sheet {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.05);
    }

    .hero {
      background: linear-gradient(140deg, #1aaf90, #0a7f69);
      color: #fff;
      padding: 16px;
      box-shadow: var(--shadow);
      border: 0;
    }

    .hero-top, .section-head, .stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .hero-top { align-items: flex-start; }

    .back-link, .outline-btn, .primary-btn, .ghost-btn, .danger-btn {
      min-height: 40px;
      border-radius: 999px;
      padding: 0 15px;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
    }

    .back-link {
      border: 1px solid rgba(255,255,255,.34);
      color: #fff;
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
    }

    .outline-btn {
      border: 1px solid #cae4dc;
      background: #fff;
      color: #176f60;
    }

    .ghost-btn {
      background: #edf6f3;
      color: #1a5950;
    }

    .danger-btn {
      background: #feecec;
      color: var(--danger);
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 { font-size: 22px; line-height: 1.2; }
    .hero p { margin-top: 8px; color: rgba(255,255,255,.84); font-size: 13px; line-height: 1.55; }

    .panel {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .meta-line, .empty, .status, .subtle, .post-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .stats {
      flex-wrap: wrap;
    }

    .post-tags, .post-actions, .upload-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip, .flag, .count-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }

    .chip, .count-badge {
      background: var(--primary-soft);
      color: var(--primary-deep);
    }

    .flag.expired {
      background: #fff1f1;
      color: var(--danger);
    }

    .flag.stale {
      background: #fff6e6;
      color: var(--warn);
    }

    .post-list {
      display: grid;
      gap: 12px;
    }

    .post-card {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .post-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .post-body {
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-image-grid,
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .post-image-grid.single {
      grid-template-columns: 1fr;
    }

    .post-image-item,
    .picker-item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #f7fbfa;
      min-height: 104px;
    }

    .post-image-item img,
    .picker-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
    }

    .post-image-item.single-image {
      min-height: 210px;
    }

    .post-image-item.single-image img {
      max-height: 360px;
    }

    .picker-item {
      aspect-ratio: 1 / 1;
    }

    .picker-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      background: rgba(17, 36, 33, 0.8);
      color: #fff;
      font: inherit;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .picker-remove span {
      transform: translateY(-1px);
    }

    .post-actions button {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 0;
    }

    .post-gallery-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sheet-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(7, 19, 18, 0.46);
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      z-index: 60;
    }

    .sheet-mask.show { display: flex; }

    .sheet {
      width: min(720px, calc(100vw - 20px));
      max-height: calc(100dvh - 16px);
      overflow-y: auto;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      display: grid;
      gap: 14px;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
    }

    .sheet-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .close-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: rgba(31, 42, 43, 0.72);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex: none;
    }

    .composer-form,
    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: #425956;
      font-size: 12px;
      font-weight: 700;
    }

    textarea,
    input[type="date"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px 12px;
      font: inherit;
      background: #f8fbfa;
      color: var(--text);
    }

    textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.65;
    }

    textarea:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: #76c5b1;
      box-shadow: 0 0 0 3px rgba(13, 154, 125, 0.14);
    }

    .upload-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid #d7e7e2;
      border-radius: 18px;
      background: linear-gradient(180deg, #fbfffd 0%, #f3faf7 100%);
    }

    .upload-actions .primary-btn,
    .upload-actions .ghost-btn {
      flex: 1 1 180px;
      min-height: 44px;
    }

    .input-hidden {
      display: none;
    }

    .picker-state {
      display: grid;
      gap: 10px;
    }

    .picker-empty {
      border: 2px dashed #c9ddd7;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      padding: 20px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .sheet-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .sheet-actions button {
      min-width: 104px;
      min-height: 42px;
    }

    nav {
      --active-index: 3;
      position: fixed;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8e7e1;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(13, 60, 51, 0.1);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    nav::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 20%;
      border-radius: 999px;
      background: #e9f7f3;
      transform: translateX(calc(var(--active-index) * 100%));
      z-index: 0;
    }

    nav a {
      position: relative;
      z-index: 1;
      text-align: center;
      text-decoration: none;
      color: #4f6562;
      font-size: 12px;
      line-height: 44px;
      height: 44px;
      font-weight: 600;
    }

    nav a.active { color: #0c8f72; }

    @media (max-width: 620px) {
      .post-image-grid,
      .picker-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .hero-top, .section-head, .stats, .post-head {
        display: grid;
      }

      .sheet {
        width: calc(100vw - 12px);
        padding-left: 14px;
        padding-right: 14px;
      }

      .sheet-actions {
        justify-content: stretch;
      }

      .sheet-actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1 id="storeName">店铺详情</h1>
          <p id="storeIntro">查看店铺基本信息、价格记录入口和用户投稿情报。</p>
        </div>
        <a class="back-link" href="stores.html">返回店铺列表</a>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>店铺信息</h2>
        <a id="priceEntryLink" class="outline-btn" href="products">查看该店价格记录</a>
      </div>
      <div class="stats">
        <span id="storeLocation" class="chip">位置：-</span>
        <span id="storeRecords" class="chip">价格记录：0</span>
        <span id="storePostsCount" class="chip">投稿：0</span>
      </div>
      <p id="storeNote" class="meta-line">备注：-</p>
      <p id="storeLatestRecord" class="subtle">最近价格记录：-</p>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>店铺情报投稿</h2>
          <p id="postSummary" class="subtle">正在读取投稿...</p>
        </div>
        <button id="openComposerBtn" class="primary-btn" type="button">上传店铺情报</button>
      </div>
      <div id="postList" class="post-list"></div>
    </section>

    <nav data-active="stores">
      <a href="home.html">首页</a>
      <a href="products">清单</a>
      <a href="add.html">录入</a>
      <a class="active" href="stores.html">店铺</a>
      <a href="profile.html">我的</a>
    </nav>
  </div>

  <div id="composerMask" class="sheet-mask">
    <section class="sheet" role="dialog" aria-modal="true" aria-label="上传店铺情报">
      <div class="sheet-head">
        <div>
          <h2 id="composerTitle">上传店铺情报</h2>
          <p id="composerHint" class="subtle">拍照或从相册选择，多张图片会在前端压缩后再保存。</p>
        </div>
        <button id="closeComposerBtn" class="close-btn" type="button" aria-label="关闭">×</button>
      </div>

      <form id="composerForm" class="composer-form">
        <div class="field">
          <label>图片 <span aria-hidden="true">*</span></label>
          <div class="upload-panel">
            <div class="upload-actions">
              <button id="cameraTriggerBtn" class="primary-btn" type="button">拍照上传</button>
              <button id="galleryTriggerBtn" class="ghost-btn" type="button">从相册选择</button>
            </div>
            <input id="postCameraInput" class="input-hidden" type="file" accept="image/*" capture="environment" />
            <input id="postGalleryInput" class="input-hidden" type="file" accept="image/*" multiple />
            <div class="picker-state">
              <div id="imageEmptyState" class="picker-empty">还没有选择图片，可以拍照或从相册选择。</div>
              <div id="imagePreviewGrid" class="picker-grid" hidden></div>
            </div>
            <p id="imageMeta" class="subtle">支持多图上传，图片会自动压缩为 JPEG。</p>
          </div>
        </div>

        <div class="field">
          <label for="postContent">备注/说明</label>
          <textarea id="postContent" maxlength="2000" placeholder="可选写一句备注，例如：周三双倍积分、店门口海报、会员特价。"></textarea>
        </div>

        <div class="field">
          <label for="postValidTo">活动结束日期</label>
          <input id="postValidTo" type="date" />
        </div>

        <div class="field">
          <p id="formStatus" class="status"></p>
        </div>

        <div class="sheet-actions">
          <button id="deletePostBtn" class="danger-btn" type="button" hidden>删除投稿</button>
          <button class="ghost-btn" type="button" id="cancelComposerBtn">取消</button>
          <button class="primary-btn" type="submit" id="saveComposerBtn">发布</button>
        </div>
      </form>
    </section>
  </div>

  <script src="toast.js"></script>
  <script src="image-viewer.js"></script>
  <script src="auth-nav.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const storeId = new URLSearchParams(location.search).get("id") || "";

    let currentStore = null;
    let currentPosts = [];
    let currentSession = { loggedIn: false, user: null };
    let editingPostId = "";
    let selectedImages = [];
    let isCompressing = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      if (!value) return "-";
      const text = String(value);
      return text.includes("T") ? text.slice(0, 10) : text;
    }

    function ageDays(value) {
      if (!value) return null;
      const ms = Date.now() - new Date(value).getTime();
      if (!Number.isFinite(ms)) return null;
      return Math.floor(ms / 86400000);
    }

    function validityState(post) {
      const today = new Date().toISOString().slice(0, 10);
      if (post.validTo && post.validTo < today) {
        return { text: "已过期，仅供参考", className: "expired" };
      }
      const days = ageDays(post.uploadedAt);
      if (!post.validTo && days != null && days > 30) {
        return { text: "旧情报，请注意确认", className: "stale" };
      }
      return null;
    }

    function uniqueImages(images) {
      return [...new Set((images || []).map((item) => String(item || "").trim()).filter(Boolean))];
    }

    function normalizePostImages(post) {
      const images = Array.isArray(post?.images) ? post.images : [];
      return uniqueImages([
        ...images,
        post?.imageData || "",
        post?.imageUrl || ""
      ]);
    }

    function firstDataImage(images) {
      return images.find((item) => item.startsWith("data:image/")) || "";
    }

    function firstUrlImage(images) {
      return images.find((item) => item && !item.startsWith("data:image/")) || "";
    }

    function countLabel(count) {
      return `共 ${count} 张`;
    }

    function renderImageGrid(images, mode) {
      const visibleImages = images.slice(0, 4);
      const single = images.length === 1;
      return `
        <div class="post-gallery-head">
          <span class="count-badge">${escapeHtml(countLabel(images.length))}</span>
        </div>
        <div class="post-image-grid ${single ? "single" : ""}">
          ${visibleImages.map((src, index) => {
            const remaining = images.length - visibleImages.length;
            const overlay = remaining > 0 && index === visibleImages.length - 1
              ? `<span class="count-badge" style="position:absolute;right:8px;bottom:8px;">+${remaining}</span>`
              : "";
            return `
              <div class="post-image-item ${single ? "single-image" : ""}">
                <img src="${escapeHtml(src)}" alt="店铺情报图片" data-image-src="${escapeHtml(src)}" data-image-mode="${escapeHtml(mode)}" />
                ${overlay}
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderSelectedImages() {
      const grid = $("imagePreviewGrid");
      const empty = $("imageEmptyState");
      if (!selectedImages.length) {
        grid.hidden = true;
        grid.innerHTML = "";
        empty.hidden = false;
        $("imageMeta").textContent = "支持多图上传，图片会自动压缩为 JPEG。";
        return;
      }
      empty.hidden = true;
      grid.hidden = false;
      grid.innerHTML = selectedImages.map((src, index) => `
        <div class="picker-item">
          <img src="${escapeHtml(src)}" alt="已选择图片 ${index + 1}" data-image-src="${escapeHtml(src)}" data-image-mode="composer" />
          <button class="picker-remove" type="button" data-remove-index="${index}" aria-label="移除第 ${index + 1} 张图片"><span>×</span></button>
        </div>
      `).join("");
      $("imageMeta").textContent = `已选择 ${selectedImages.length} 张图片。发布时会保存压缩后的图片数据。`;
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    async function loadSession() {
      const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname);
      if (window.priceAuth?.checkLogin) {
        currentSession = await window.priceAuth.checkLogin(isLocal);
        return;
      }
      currentSession = { loggedIn: isLocal, user: null };
    }

    function updateUploadButton() {
      $("openComposerBtn").textContent = currentSession.loggedIn ? "上传店铺情报" : "登录后投稿";
    }

    function renderStore(store) {
      currentStore = store;
      document.title = `${store.name} - 店铺详情`;
      $("storeName").textContent = store.name || "店铺详情";
      $("storeLocation").textContent = `位置：${store.location || "-"}`;
      $("storeRecords").textContent = `价格记录：${store.priceRecordCount || 0}`;
      $("storePostsCount").textContent = `投稿：${store.storePostCount || 0}`;
      $("storeNote").textContent = `备注：${store.note || "-"}`;
      $("storeLatestRecord").textContent = `最近价格记录：${formatDate(store.latestPriceRecordDate)}`;
      const productParams = new URLSearchParams({ storeId: String(store.id), storeName: store.name || "" });
      $("priceEntryLink").href = `products?${productParams.toString()}`;
    }

    function renderPosts(posts) {
      currentPosts = posts;
      $("postSummary").textContent = posts.length ? `共 ${posts.length} 条店铺投稿` : "还没有人投稿。";
      $("storePostsCount").textContent = `投稿：${posts.length}`;
      const list = $("postList");
      if (!posts.length) {
        list.innerHTML = `<div class="empty">暂无店铺情报。登录后可以上传第一条海报或公告图片。</div>`;
        return;
      }
      list.innerHTML = posts.map((post) => {
        const images = normalizePostImages(post);
        const flag = validityState(post);
        return `
          <article class="post-card">
            <div class="post-head">
              <div class="post-tags">
                ${flag ? `<span class="flag ${flag.className}">${escapeHtml(flag.text)}</span>` : ""}
              </div>
              ${(post.canEdit || post.canDelete) ? `
                <div class="post-actions">
                  ${post.canEdit ? `<button class="ghost-btn" type="button" data-action="edit" data-id="${escapeHtml(post.id)}">编辑</button>` : ""}
                  ${post.canDelete ? `<button class="danger-btn" type="button" data-action="delete" data-id="${escapeHtml(post.id)}">删除</button>` : ""}
                </div>
              ` : ""}
            </div>
            ${images.length ? renderImageGrid(images, "post") : ""}
            ${post.content ? `<div class="post-body">${escapeHtml(post.content)}</div>` : ""}
            <div class="post-meta">上传者：${escapeHtml(post.createdByName || post.createdBy || "-")}</div>
            <div class="post-meta">上传日期：${escapeHtml(formatDate(post.uploadedAt))}</div>
            ${post.validTo ? `<div class="post-meta">活动结束日期：${escapeHtml(formatDate(post.validTo))}</div>` : ""}
          </article>
        `;
      }).join("");
    }

    function resetComposer() {
      editingPostId = "";
      selectedImages = [];
      $("composerTitle").textContent = "上传店铺情报";
      $("composerHint").textContent = "拍照或从相册选择，多张图片会在前端压缩后再保存。";
      $("composerForm").reset();
      $("saveComposerBtn").textContent = "发布";
      $("deletePostBtn").hidden = true;
      $("formStatus").textContent = "";
      renderSelectedImages();
    }

    function openComposer(post = null) {
      if (!currentSession.loggedIn) {
        if (window.priceAuth?.showLoginModal) window.priceAuth.showLoginModal();
        else showToast("请先登录。", { type: "error" });
        return;
      }
      resetComposer();
      if (post) {
        editingPostId = post.id;
        selectedImages = normalizePostImages(post);
        $("composerTitle").textContent = "编辑店铺情报";
        $("composerHint").textContent = "可以更新图片、备注或活动结束日期。";
        $("saveComposerBtn").textContent = "更新";
        $("postContent").value = post.content || "";
        $("postValidTo").value = formatDate(post.validTo) === "-" ? "" : formatDate(post.validTo);
        $("deletePostBtn").hidden = !post.canDelete;
        renderSelectedImages();
      }
      $("composerMask").classList.add("show");
    }

    function closeComposer() {
      $("composerMask").classList.remove("show");
      resetComposer();
    }

    async function compressImage(file, maxWidth = 1600, quality = 0.75) {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, maxWidth / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * scale));
      const height = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d", { alpha: false });
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(bitmap, 0, 0, width, height);
      bitmap.close();
      return {
        dataUrl: canvas.toDataURL("image/jpeg", quality),
        width,
        height
      };
    }

    async function handleImageFiles(fileList) {
      const files = Array.from(fileList || []).filter((file) => file && String(file.type || "").startsWith("image/"));
      if (!files.length) return;
      isCompressing = true;
      $("formStatus").textContent = "";
      $("imageMeta").textContent = `正在压缩 ${files.length} 张图片...`;
      try {
        const compressed = [];
        for (const file of files) {
          const { dataUrl } = await compressImage(file, 1600, 0.75);
          compressed.push(dataUrl);
        }
        selectedImages = uniqueImages([...selectedImages, ...compressed]);
        renderSelectedImages();
      } finally {
        isCompressing = false;
      }
    }

    async function loadPage() {
      if (!storeId || !/^\d+$/.test(storeId)) {
        $("postSummary").textContent = "缺少店铺 id。";
        $("postList").innerHTML = `<div class="empty">请从店铺列表重新进入。</div>`;
        return;
      }
      try {
        const [store, posts] = await Promise.all([
          fetchJson(`/api/stores/${storeId}`),
          fetchJson(`/api/store-posts?storeId=${encodeURIComponent(storeId)}`)
        ]);
        renderStore(store);
        renderPosts(posts);
      } catch (error) {
        $("postSummary").textContent = "";
        $("postList").innerHTML = `<div class="empty">加载失败：${escapeHtml(error.message || "请刷新重试")}</div>`;
      }
    }

    async function submitComposer(event) {
      event.preventDefault();
      if (!currentSession.loggedIn) {
        openComposer();
        return;
      }
      if (isCompressing) {
        $("formStatus").textContent = "图片还在处理中，请稍等。";
        return;
      }
      const images = uniqueImages(selectedImages);
      const payload = {
        storeId,
        title: "店铺情报",
        type: "post",
        content: $("postContent").value.trim(),
        source: "用户上传",
        imageData: firstDataImage(images),
        imageUrl: firstUrlImage(images),
        images,
        lastConfirmedAt: "",
        validFrom: "",
        validTo: $("postValidTo").value
      };
      if (!payload.images.length) {
        $("formStatus").textContent = "请先上传至少一张图片。";
        return;
      }
      $("formStatus").textContent = "正在保存...";
      try {
        const url = editingPostId ? `/api/store-posts/${editingPostId}` : "/api/store-posts";
        const method = editingPostId ? "PUT" : "POST";
        await fetchJson(url, {
          method,
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        showToast(editingPostId ? "投稿已更新。" : "投稿已上传。", { type: "success" });
        closeComposer();
        await loadPage();
      } catch (error) {
        $("formStatus").textContent = error.message || "保存失败";
      }
    }

    async function deletePost(postId) {
      const ok = confirm("确认删除这条投稿吗？");
      if (!ok) return;
      try {
        await fetchJson(`/api/store-posts/${postId}`, { method: "DELETE" });
        showToast("投稿已删除。", { type: "success" });
        closeComposer();
        await loadPage();
      } catch (error) {
        showToast(error.message || "删除失败", { type: "error" });
      }
    }

    function bindEvents() {
      $("openComposerBtn").onclick = () => openComposer();
      $("closeComposerBtn").onclick = closeComposer;
      $("cancelComposerBtn").onclick = closeComposer;
      $("cameraTriggerBtn").onclick = () => $("postCameraInput").click();
      $("galleryTriggerBtn").onclick = () => $("postGalleryInput").click();
      $("composerMask").addEventListener("click", (event) => {
        if (event.target === $("composerMask")) closeComposer();
      });
      $("composerForm").addEventListener("submit", submitComposer);
      $("postCameraInput").addEventListener("change", async (event) => {
        try {
          await handleImageFiles(event.target.files);
          event.target.value = "";
        } catch (error) {
          showToast(error.message || "图片处理失败", { type: "error" });
        }
      });
      $("postGalleryInput").addEventListener("change", async (event) => {
        try {
          await handleImageFiles(event.target.files);
          event.target.value = "";
        } catch (error) {
          showToast(error.message || "图片处理失败", { type: "error" });
        }
      });
      $("deletePostBtn").onclick = () => {
        if (editingPostId) deletePost(editingPostId);
      };
      $("imagePreviewGrid").addEventListener("click", (event) => {
        const removeButton = event.target.closest("button[data-remove-index]");
        if (removeButton) {
          const index = Number(removeButton.dataset.removeIndex);
          selectedImages = selectedImages.filter((_, itemIndex) => itemIndex !== index);
          renderSelectedImages();
          return;
        }
        const image = event.target.closest("img[data-image-src]");
        if (image) {
          window.openImageViewer?.(image.dataset.imageSrc);
        }
      });
      $("postList").addEventListener("click", async (event) => {
        const actionButton = event.target.closest("button[data-action]");
        if (actionButton) {
          const post = currentPosts.find((item) => item.id === actionButton.dataset.id);
          if (!post) return;
          if (actionButton.dataset.action === "edit") openComposer(post);
          if (actionButton.dataset.action === "delete") await deletePost(post.id);
          return;
        }
        const image = event.target.closest("img[data-image-src]");
        if (image) {
          window.openImageViewer?.(image.dataset.imageSrc);
        }
      });
    }

    (async function init() {
      bindEvents();
      await loadSession();
      updateUploadButton();
      renderSelectedImages();
      await loadPage();
    }());
  </script>
</body>
</html>
