<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>店铺详情</title>
  <style>
    :root {
      --bg: #f2f6f5;
      --surface: #fff;
      --line: #dbe7e3;
      --text: #1f2a2b;
      --muted: #607270;
      --primary: #0d9a7d;
      --primary-soft: #e2f7f1;
      --danger: #c93f3f;
      --warn: #a56700;
      --shadow: 0 14px 28px rgba(14, 63, 56, 0.1);
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        calc(88px + env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
      background:
        radial-gradient(circle at 10% 0%, #d7f6ed 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #d8eef8 0, transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(760px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .hero, .panel, .post-card, .sheet {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 16px rgba(12, 48, 42, 0.05);
    }

    .hero {
      background: linear-gradient(140deg, #1aaf90, #0a7f69);
      color: #fff;
      padding: 16px;
      box-shadow: var(--shadow);
      border: 0;
    }

    .hero-top, .section-head, .stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .hero-top { align-items: flex-start; }

    .back-link, .outline-btn, .primary-btn, .ghost-btn, .danger-btn {
      min-height: 38px;
      border-radius: 999px;
      padding: 0 14px;
      text-decoration: none;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .back-link {
      border: 1px solid rgba(255,255,255,.34);
      color: #fff;
    }

    .primary-btn {
      border: 0;
      background: var(--primary);
      color: #fff;
    }

    .outline-btn {
      border: 1px solid #cae4dc;
      background: #fff;
      color: #176f60;
    }

    .ghost-btn {
      border: 0;
      background: #edf6f3;
      color: #1a5950;
    }

    .danger-btn {
      border: 0;
      background: #feecec;
      color: var(--danger);
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 { font-size: 22px; line-height: 1.2; }
    .hero p { margin-top: 8px; color: rgba(255,255,255,.84); font-size: 13px; line-height: 1.55; }

    .panel {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .meta-line, .empty, .status, .subtle, .post-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .stats {
      flex-wrap: wrap;
    }

    .chip-row, .post-tags, .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip, .tag, .flag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }

    .chip, .tag {
      background: var(--primary-soft);
      color: #06735d;
    }

    .flag.expired {
      background: #fff1f1;
      color: var(--danger);
    }

    .flag.stale {
      background: #fff6e6;
      color: var(--warn);
    }

    .post-list {
      display: grid;
      gap: 10px;
    }

    .post-card {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .post-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .post-body {
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-image {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #f7fbfa;
      overflow: hidden;
    }

    .post-image img {
      display: block;
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      cursor: zoom-in;
    }

    .post-actions button {
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .sheet-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 19, 18, 0.46);
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      z-index: 60;
    }

    .sheet-mask.show { display: flex; }

    .sheet {
      width: min(720px, calc(100vw - 20px));
      max-height: calc(100dvh - 20px);
      overflow-y: auto;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .close-btn {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: rgba(31, 42, 43, 0.72);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .form-grid, .field {
      display: grid;
      gap: 6px;
    }

    .form-grid { grid-template-columns: 1fr 1fr; }
    .field.full { grid-column: 1 / -1; }

    label {
      color: #425956;
      font-size: 12px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #f8fbfa;
      color: var(--text);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #76c5b1;
      box-shadow: 0 0 0 3px rgba(13, 154, 125, 0.14);
    }

    .preview-box {
      display: grid;
      gap: 8px;
    }

    .preview-box img {
      width: min(240px, 100%);
      border-radius: 14px;
      border: 1px solid var(--line);
      cursor: zoom-in;
    }

    .sheet-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    nav {
      --active-index: 3;
      position: fixed;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(520px, calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 20px));
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8e7e1;
      border-radius: 999px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(13, 60, 51, 0.1);
      backdrop-filter: blur(4px);
      z-index: 25;
    }

    nav::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 20%;
      border-radius: 999px;
      background: #e9f7f3;
      transform: translateX(calc(var(--active-index) * 100%));
      z-index: 0;
    }

    nav a {
      position: relative;
      z-index: 1;
      text-align: center;
      text-decoration: none;
      color: #4f6562;
      font-size: 12px;
      line-height: 44px;
      height: 44px;
      font-weight: 600;
    }

    nav a.active { color: #0c8f72; }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .hero-top, .section-head, .stats, .post-head { display: grid; }
      .sheet-actions { justify-content: stretch; }
      .sheet-actions button, .sheet-actions a { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1 id="storeName">店铺详情</h1>
          <p id="storeIntro">查看店铺基本信息、价格记录入口和用户投稿情报。</p>
        </div>
        <a class="back-link" href="stores.html">返回店铺列表</a>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>店铺信息</h2>
        <a id="priceEntryLink" class="outline-btn" href="products">查看该店价格记录</a>
      </div>
      <div class="stats">
        <span id="storeLocation" class="chip">位置：-</span>
        <span id="storeRecords" class="chip">价格记录：0</span>
        <span id="storePostsCount" class="chip">投稿：0</span>
      </div>
      <p id="storeNote" class="meta-line">备注：-</p>
      <p id="storeLatestRecord" class="subtle">最近价格记录：-</p>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>店铺情报投稿</h2>
          <p id="postSummary" class="subtle">正在读取投稿...</p>
        </div>
        <button id="openComposerBtn" class="primary-btn" type="button">上传店铺情报</button>
      </div>
      <div id="postList" class="post-list"></div>
    </section>

    <nav data-active="stores">
      <a href="home.html">首页</a>
      <a href="products">清单</a>
      <a href="add.html">录入</a>
      <a class="active" href="stores.html">店铺</a>
      <a href="profile.html">我的</a>
    </nav>
  </div>

  <div id="composerMask" class="sheet-mask">
    <section class="sheet" role="dialog" aria-modal="true" aria-label="上传店铺情报">
      <div class="sheet-head">
        <div>
          <h2 id="composerTitle">上传店铺情报</h2>
          <p id="composerHint" class="subtle">只需上传图片，可选补一句备注和活动结束日期。</p>
        </div>
        <button id="closeComposerBtn" class="close-btn" type="button" aria-label="关闭">×</button>
      </div>

      <form id="composerForm" class="form-grid">
        <div class="field full">
          <label for="postImageFile">图片 <span aria-hidden="true">*</span></label>
          <input id="postImageFile" type="file" accept="image/*" capture="environment" />
          <p id="imageHint" class="subtle">必填。选择或拍照后会在前端压缩成 JPEG，再保存到投稿数据。</p>
          <div id="imagePreviewBox" class="preview-box" hidden>
            <img id="imagePreview" alt="投稿图片预览" />
            <p id="imageMeta" class="subtle"></p>
          </div>
        </div>
        <div class="field">
          <label for="postContent">备注/说明</label>
          <textarea id="postContent" maxlength="2000" placeholder="可选写一句备注，例如：周三双倍积分、门口海报拍摄。"></textarea>
        </div>
        <div class="field">
          <label for="postValidTo">活动结束日期</label>
          <input id="postValidTo" type="date" />
        </div>
        <div class="field full">
          <p id="formStatus" class="status"></p>
        </div>
        <div class="field full">
          <div class="sheet-actions">
            <button id="deletePostBtn" class="danger-btn" type="button" hidden>删除投稿</button>
            <button class="ghost-btn" type="button" id="cancelComposerBtn">取消</button>
            <button class="primary-btn" type="submit" id="saveComposerBtn">发布</button>
          </div>
        </div>
      </form>
    </section>
  </div>

  <script src="toast.js"></script>
  <script src="image-viewer.js"></script>
  <script src="auth-nav.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const storeId = new URLSearchParams(location.search).get("id") || "";
    let currentStore = null;
    let currentPosts = [];
    let currentSession = { loggedIn: false, user: null };
    let editingPostId = "";
    let imageDataValue = "";
    let imageUrlValue = "";

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatDate(value) {
      if (!value) return "-";
      const text = String(value);
      return text.includes("T") ? text.slice(0, 10) : text;
    }

    function ageDays(value) {
      if (!value) return null;
      const ms = Date.now() - new Date(value).getTime();
      if (!Number.isFinite(ms)) return null;
      return Math.floor(ms / 86400000);
    }

    function validityState(post) {
      const today = new Date().toISOString().slice(0, 10);
      if (post.validTo && post.validTo < today) {
        return { text: "已过期，仅供参考", className: "expired" };
      }
      const days = ageDays(post.uploadedAt);
      if (!post.validTo && days != null && days > 30) {
        return { text: "旧情报，请注意确认", className: "stale" };
      }
      return null;
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    async function loadSession() {
      const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname);
      if (window.priceAuth?.checkLogin) {
        currentSession = await window.priceAuth.checkLogin(isLocal);
        return;
      }
      currentSession = { loggedIn: isLocal, user: null };
    }

    function updateUploadButton() {
      $("openComposerBtn").textContent = currentSession.loggedIn ? "上传店铺情报" : "登录后投稿";
    }

    function renderStore(store) {
      currentStore = store;
      document.title = `${store.name} - 店铺详情`;
      $("storeName").textContent = store.name || "店铺详情";
      $("storeLocation").textContent = `位置：${store.location || "-"}`;
      $("storeRecords").textContent = `价格记录：${store.priceRecordCount || 0}`;
      $("storePostsCount").textContent = `投稿：${store.storePostCount || 0}`;
      $("storeNote").textContent = `备注：${store.note || "-"}`;
      $("storeLatestRecord").textContent = `最近价格记录：${formatDate(store.latestPriceRecordDate)}`;
      const productParams = new URLSearchParams({ storeId: String(store.id), storeName: store.name || "" });
      $("priceEntryLink").href = `products?${productParams.toString()}`;
    }

    function renderPosts(posts) {
      currentPosts = posts;
      $("postSummary").textContent = posts.length ? `共 ${posts.length} 条店铺投稿` : "还没有人投稿。";
      $("storePostsCount").textContent = `投稿：${posts.length}`;
      const list = $("postList");
      if (!posts.length) {
        list.innerHTML = `<div class="empty">暂无店铺情报。登录后可以上传第一条海报或公告图片。</div>`;
        return;
      }
      list.innerHTML = posts.map((post) => {
        const imageSrc = post.imageData || post.imageUrl || "";
        const flag = validityState(post);
        return `
          <article class="post-card">
            <div class="post-head">
              <div class="post-tags">
                ${flag ? `<span class="flag ${flag.className}">${escapeHtml(flag.text)}</span>` : ""}
              </div>
              ${(post.canEdit || post.canDelete) ? `
                <div class="post-actions">
                  ${post.canEdit ? `<button class="ghost-btn" type="button" data-action="edit" data-id="${escapeHtml(post.id)}">编辑</button>` : ""}
                  ${post.canDelete ? `<button class="danger-btn" type="button" data-action="delete" data-id="${escapeHtml(post.id)}">删除</button>` : ""}
                </div>
              ` : ""}
            </div>
            ${imageSrc ? `
              <div class="post-image">
                <img src="${escapeHtml(imageSrc)}" alt="店铺情报图片" data-image-src="${escapeHtml(imageSrc)}" />
              </div>
            ` : ""}
            ${post.content ? `<div class="post-body">${escapeHtml(post.content)}</div>` : ""}
            <div class="post-meta">上传者：${escapeHtml(post.createdByName || post.createdBy || "-")}</div>
            <div class="post-meta">上传日期：${escapeHtml(formatDate(post.uploadedAt))}</div>
            ${post.validTo ? `<div class="post-meta">活动结束日期：${escapeHtml(formatDate(post.validTo))}</div>` : ""}
          </article>
        `;
      }).join("");
    }

    function resetComposer() {
      editingPostId = "";
      imageDataValue = "";
      imageUrlValue = "";
      $("composerTitle").textContent = "上传店铺情报";
      $("composerHint").textContent = "只需上传图片，可选补一句备注和活动结束日期。";
      $("composerForm").reset();
      $("saveComposerBtn").textContent = "发布";
      $("deletePostBtn").hidden = true;
      $("imagePreviewBox").hidden = true;
      $("imagePreview").removeAttribute("src");
      $("imageMeta").textContent = "";
      $("formStatus").textContent = "";
    }

    function openComposer(post = null) {
      if (!currentSession.loggedIn) {
        if (window.priceAuth?.showLoginModal) window.priceAuth.showLoginModal();
        else showToast("请先登录。", { type: "error" });
        return;
      }
      resetComposer();
      if (post) {
        editingPostId = post.id;
        $("composerTitle").textContent = "编辑店铺情报";
        $("composerHint").textContent = "可以更新图片、备注或活动结束日期。";
        $("saveComposerBtn").textContent = "更新";
        $("postContent").value = post.content || "";
        $("postValidTo").value = formatDate(post.validTo) === "-" ? "" : formatDate(post.validTo);
        imageDataValue = post.imageData || "";
        imageUrlValue = post.imageUrl || "";
        if (post.imageData || post.imageUrl) {
          $("imagePreviewBox").hidden = false;
          $("imagePreview").src = post.imageData || post.imageUrl;
          $("imageMeta").textContent = post.imageData ? "当前使用压缩后的内嵌图片" : "当前使用图片链接";
        }
        $("deletePostBtn").hidden = !post.canDelete;
      }
      $("composerMask").classList.add("show");
    }

    function closeComposer() {
      $("composerMask").classList.remove("show");
      resetComposer();
    }

    async function compressImage(file, maxWidth = 1200, quality = 0.76) {
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, maxWidth / Math.max(bitmap.width, bitmap.height));
      const width = Math.max(1, Math.round(bitmap.width * scale));
      const height = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d", { alpha: false });
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(bitmap, 0, 0, width, height);
      bitmap.close();
      const dataUrl = canvas.toDataURL("image/jpeg", quality);
      return { dataUrl, width, height };
    }

    async function handleImageSelect(file) {
      if (!file) return;
      $("imageMeta").textContent = "正在压缩图片...";
      $("imagePreviewBox").hidden = false;
      try {
        const { dataUrl, width, height } = await compressImage(file, 1200, 0.76);
        imageDataValue = dataUrl;
        imageUrlValue = "";
        $("imagePreview").src = dataUrl;
        $("imageMeta").textContent = `已压缩为 JPEG ${width}×${height}，约 ${(dataUrl.length * 0.75 / 1024).toFixed(0)} KB`;
      } catch (error) {
        imageDataValue = "";
        imageUrlValue = "";
        $("imagePreviewBox").hidden = true;
        throw error;
      }
    }

    async function loadPage() {
      if (!storeId || !/^\d+$/.test(storeId)) {
        $("postSummary").textContent = "缺少店铺 id。";
        $("postList").innerHTML = `<div class="empty">请从店铺列表重新进入。</div>`;
        return;
      }
      try {
        const [store, posts] = await Promise.all([
          fetchJson(`/api/stores/${storeId}`),
          fetchJson(`/api/store-posts?storeId=${encodeURIComponent(storeId)}`)
        ]);
        renderStore(store);
        renderPosts(posts);
      } catch (error) {
        $("postSummary").textContent = "";
        $("postList").innerHTML = `<div class="empty">加载失败：${escapeHtml(error.message || "请刷新重试")}</div>`;
      }
    }

    async function submitComposer(event) {
      event.preventDefault();
      if (!currentSession.loggedIn) {
        openComposer();
        return;
      }
      const payload = {
        storeId,
        title: "店铺情报",
        type: "post",
        content: $("postContent").value.trim(),
        source: "用户上传",
        imageData: imageDataValue,
        imageUrl: imageUrlValue,
        lastConfirmedAt: "",
        validFrom: "",
        validTo: $("postValidTo").value
      };
      if (!payload.imageData && !payload.imageUrl) {
        $("formStatus").textContent = "请先上传图片。";
        return;
      }
      $("formStatus").textContent = "正在保存...";
      try {
        const url = editingPostId ? `/api/store-posts/${editingPostId}` : "/api/store-posts";
        const method = editingPostId ? "PUT" : "POST";
        await fetchJson(url, {
          method,
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        showToast(editingPostId ? "投稿已更新。" : "投稿已上传。", { type: "success" });
        closeComposer();
        await loadPage();
      } catch (error) {
        $("formStatus").textContent = error.message || "保存失败";
      }
    }

    async function deletePost(postId) {
      const ok = confirm("确认删除这条投稿吗？");
      if (!ok) return;
      try {
        await fetchJson(`/api/store-posts/${postId}`, { method: "DELETE" });
        showToast("投稿已删除。", { type: "success" });
        closeComposer();
        await loadPage();
      } catch (error) {
        showToast(error.message || "删除失败", { type: "error" });
      }
    }

    function bindEvents() {
      $("openComposerBtn").onclick = () => openComposer();
      $("closeComposerBtn").onclick = closeComposer;
      $("cancelComposerBtn").onclick = closeComposer;
      $("composerMask").addEventListener("click", (event) => {
        if (event.target === $("composerMask")) closeComposer();
      });
      $("composerForm").addEventListener("submit", submitComposer);
      $("postImageFile").addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        try {
          await handleImageSelect(file);
        } catch (error) {
          showToast(error.message || "图片处理失败", { type: "error" });
        }
      });
      $("imagePreview").onclick = () => {
        if ($("imagePreview").src) window.openImageViewer?.($("imagePreview").src);
      };
      $("deletePostBtn").onclick = () => {
        if (editingPostId) deletePost(editingPostId);
      };
      $("postList").addEventListener("click", async (event) => {
        const actionButton = event.target.closest("button[data-action]");
        if (actionButton) {
          const post = currentPosts.find((item) => item.id === actionButton.dataset.id);
          if (!post) return;
          if (actionButton.dataset.action === "edit") openComposer(post);
          if (actionButton.dataset.action === "delete") await deletePost(post.id);
          return;
        }
        const image = event.target.closest("img[data-image-src]");
        if (image) {
          window.openImageViewer?.(image.dataset.imageSrc);
        }
      });
    }

    (async function init() {
      bindEvents();
      await loadSession();
      updateUploadButton();
      await loadPage();
    }());
  </script>
</body>
</html>
